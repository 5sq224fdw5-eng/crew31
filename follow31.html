<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>맞팔 명단</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
:root{
  --bg1:#fff5f8; --bg2:#ffe7f0; --bg3:#ffdbe9;
  --pink:#ff5c8a; --pink-deep:#e8407a; --pink-soft:#ffd6e3; --pink-tint:#fff0f5;
  --ink:#3d2630; --ink-soft:#8a6b76; --line:#ffd9e6; --card:#ffffff;
  --green:#1a8a3a; --green-bg:#e8f7ec; --green-line:#9bd9ab;
  --shadow:0 10px 30px -12px rgba(232,64,122,.30);
  --shadow-sm:0 4px 14px -6px rgba(232,64,122,.25);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 0% 0%, var(--bg3) 0%, transparent 55%),
    radial-gradient(120% 80% at 100% 10%, #ffe1ec 0%, transparent 50%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
  background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 48px;}
.disp{font-family:"Gowun Dodum",sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;}
input{font-family:inherit;}
.btn{background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 100%);color:#fff;font-weight:700;font-size:16px;padding:13px 18px;border-radius:14px;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s,opacity .12s;}
.btn:active{transform:scale(.96);box-shadow:none;}
.btn.block{width:100%;}
.field{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;font-size:16px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
.field:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,92,138,.12);}
.field::placeholder{color:#c9a9b6;}

#loginScreen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px;max-width:420px;margin:0 auto;}
.logo{text-align:center;margin-bottom:30px;animation:rise .6s ease both;}
.brandmark{position:relative;display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:17px;background:linear-gradient(140deg,#ff86ad 0%,#e23a76 100%);box-shadow:0 10px 20px -8px rgba(226,58,118,.5);animation:float 4.2s ease-in-out infinite;overflow:hidden;}
.brandmark::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 22% 12%, rgba(255,255,255,.38), transparent 55%);}
.bm31{position:relative;z-index:1;font-weight:900;font-size:25px;color:#fff;letter-spacing:-1.5px;line-height:1;}
.bm-heart{position:absolute;z-index:2;top:8px;right:9px;width:10px;height:10px;}
.wordmark{font-size:24px;font-weight:800;letter-spacing:-1px;margin:13px 0 5px;color:var(--ink);}
.wordmark span{color:var(--pink-deep);}
.tagline{margin:0;color:var(--ink-soft);font-size:14px;font-weight:600;letter-spacing:-.2px;}
.login-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);border-radius:26px;padding:30px 24px 26px;box-shadow:0 26px 64px -22px rgba(226,58,118,.42);animation:rise .6s .08s ease both;}
.login-card label{display:block;font-size:11px;font-weight:800;color:var(--pink-deep);letter-spacing:.5px;margin:0 0 9px 3px;}
.login-card .btn{margin-top:14px;border-radius:15px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.adminlink{display:block;text-align:center;margin-top:22px;color:var(--ink-soft);font-size:13px;text-decoration:none;font-weight:600;}
.err{color:var(--pink-deep);font-size:13px;font-weight:600;margin:10px 2px 0;min-height:16px;}

.topbar{position:sticky;top:0;z-index:20;background:rgba(255,245,248,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 16px;margin:0 -16px 18px;}
.topbar-in{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;letter-spacing:-.5px;}
.topbar .brand .h{font-size:22px;}
.who{display:flex;align-items:center;gap:8px;}
.who .name{font-size:13px;color:var(--ink-soft);font-weight:600;margin-right:2px;}
.iconbtn{background:#fff;border:1.5px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:15px;width:36px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{transform:scale(.92);}
.iconbtn.spin{animation:spin .7s linear infinite;}
.logout{background:#fff;border:1.5px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:13px;padding:8px 12px;border-radius:11px;}

.tabs{display:flex;gap:6px;background:#fff;padding:6px;border-radius:16px;box-shadow:var(--shadow-sm);margin-bottom:18px;}
.tab{flex:1;text-align:center;padding:11px 4px;border-radius:11px;font-weight:700;font-size:13px;color:var(--ink-soft);background:transparent;transition:all .15s;}
.tab.on{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;box-shadow:var(--shadow-sm);}

.section-title{font-size:14px;font-weight:800;color:var(--ink-soft);margin:4px 2px 12px;letter-spacing:-.3px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px;animation:rise .45s ease both;}
.add-row{display:flex;gap:8px;margin-bottom:18px;}
.add-row .field{flex:1;}
.add-row .btn{padding:13px 16px;font-size:15px;white-space:nowrap;}
.add-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:18px;}
.add-box .row2{display:flex;gap:8px;margin-bottom:8px;}
.add-box .row2 .field{flex:1;}

.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--pink-tint);border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 15px;font-weight:700;font-size:14px;animation:pop .3s ease both;}
.chip .x{width:22px;height:22px;border-radius:50%;background:#fff;color:var(--pink-deep);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--pink-soft);}

.week{border:1px solid var(--line);}
.week-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;gap:10px;}
.week-head .meta{display:flex;flex-direction:column;gap:3px;min-width:0;}
.week-head .wlabel{font-size:17px;font-weight:800;letter-spacing:-.4px;}
.week-head .wsub{font-size:12px;color:var(--ink-soft);font-weight:600;}
.week-head .right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.count{background:var(--pink-soft);color:var(--pink-deep);font-weight:800;font-size:12px;padding:5px 10px;border-radius:999px;}
.caret{color:var(--pink);font-size:13px;transition:transform .25s;}
.week.open .caret{transform:rotate(180deg);}
.week-body{display:none;border-top:1px dashed var(--line);padding:6px 14px 14px;}
.week.open .week-body{display:block;}

.target{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 4px 8px;}
.target .info{min-width:0;}
.target .tn{font-weight:800;font-size:15px;}
.target .ti{font-size:13px;color:var(--ink-soft);font-weight:600;}
.target .actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.go{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:linear-gradient(135deg,#ff7eb3,#ff5c8a);color:#fff;font-weight:800;font-size:13px;padding:9px 13px;border-radius:12px;box-shadow:var(--shadow-sm);transition:transform .12s;}
.go:active{transform:scale(.93);}
.del{background:#fff;border:1px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:12px;padding:8px 10px;border-radius:11px;}
.delweek{margin-top:12px;width:100%;background:#fff;border:1.5px solid #f3c4d4;color:#d23a6e;font-weight:700;font-size:13px;padding:11px;border-radius:13px;}
.tcell{border-bottom:1px solid #fbe6ee;}
.tcell:last-child{border-bottom:none;}

.checkrow{display:flex;gap:8px;padding:0 4px 13px;}
.chk{flex:1;font-size:12.5px;font-weight:800;padding:10px 8px;border-radius:11px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:transform .1s;display:flex;align-items:center;justify-content:center;gap:5px;}
.chk:active{transform:scale(.96);}
.chk.on.f{background:var(--green-bg);border-color:var(--green-line);color:var(--green);}
.chk.on.m{background:#ffe2ee;border-color:var(--pink);color:var(--pink-deep);}
.chk.on.xx{background:#fdeaea;border-color:#f0a9a9;color:#c0392b;}

.progress{font-size:11px;color:var(--ink-soft);font-weight:700;}
.tmeta{font-size:12px;color:var(--ink-soft);font-weight:700;padding:0 4px 8px;}
.lateb{display:inline-block;background:#fff3d6;color:#c08a00;font-weight:800;font-size:11px;padding:2px 7px;border-radius:999px;margin-left:4px;}
.wkpills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.wkpill{padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:700;font-size:13px;}
.wkpill.on{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;border-color:transparent;}
.modetoggle{display:flex;gap:6px;background:#fff;padding:5px;border-radius:13px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
.modetoggle button{flex:1;padding:9px 0;border-radius:9px;font-weight:700;font-size:13px;color:var(--ink-soft);background:transparent;}
.modetoggle button.on{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;}
.srow .nm{font-weight:800;font-size:15px;}
.srow .ssub{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
.mini{display:flex;gap:6px;padding:10px 4px;border-bottom:1px solid #fbe6ee;align-items:center;justify-content:space-between;}
.mini:last-child{border-bottom:none;}
.mini .mn{font-weight:700;font-size:14px;}
.mini .mbtns{display:flex;gap:6px;flex-shrink:0;}
.mini .chk{flex:0 0 auto;font-size:11px;padding:7px 10px;}
.bars{display:flex;gap:14px;margin-top:3px;}
.bars b{font-weight:800;}

.filehint{font-size:12.5px;color:var(--ink-soft);margin:0 0 12px;line-height:1.55;}
.filebtn{display:block;width:100%;background:var(--pink-tint);border:1.5px dashed var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:13.5px;padding:13px;border-radius:13px;text-align:center;margin-bottom:8px;}
.filebtn:active{transform:scale(.98);}
.fileresult{font-size:13px;line-height:1.7;margin-top:12px;color:var(--ink);font-weight:600;}

.empty{text-align:center;padding:44px 20px;color:var(--ink-soft);}
.empty .e{font-size:40px;margin-bottom:10px;opacity:.8;}
.empty p{margin:0;font-size:14px;font-weight:600;line-height:1.6;}

@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}
.stagger > *{animation:rise .4s ease both;}
.hidden{display:none !important;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">
    <div class="brandmark">
      <span class="bm31">31</span>
      <svg class="bm-heart" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21C5.5 15.8 2 12 2 7.8 2 4.6 4.6 2.4 7.5 3.6 9.2 4.3 10.8 5.9 12 7.4 13.2 5.9 14.8 4.3 16.5 3.6 19.4 2.4 22 4.6 22 7.8 22 12 18.5 15.8 12 21Z" fill="rgba(255,255,255,.92)"/></svg>
    </div>
    <h1 class="wordmark">맞팔 <span>31</span></h1>
    <p class="tagline">매주 맞팔, 한눈에 정리</p>
  </div>
  <div class="login-card">
    <label for="loginName">닉네임</label>
    <input id="loginName" class="field" type="text" placeholder="닉네임을 입력하세요" autocomplete="off">
    <button id="loginBtn" class="btn block">들어가기</button>
    <div id="loginErr" class="err"></div>
    <a id="toAdmin" class="adminlink" href="#">관리자 로그인 &rarr;</a>
    <div id="adminBox" class="hidden" style="margin-top:14px">
      <input id="adminPw" class="field" type="password" inputmode="numeric" placeholder="관리자 비밀번호" autocomplete="off">
      <button id="adminLoginBtn" class="btn block" style="margin-top:10px">관리자 들어가기</button>
      <div id="adminErr" class="err"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand"><span class="h">&#128151;</span><span class="disp">맞팔 명단</span></div>
      <div class="who">
        <span class="name" id="whoName"></span>
        <button class="iconbtn" id="refreshBtn" title="새로고침">&#8635;</button>
        <button class="logout" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="adminTabs" class="tabs hidden">
      <button class="tab on" data-tab="weeks">&#128197; 주차</button>
      <button class="tab" data-tab="status">&#128202; 현황</button>
      <button class="tab" data-tab="members">&#128101; 멤버</button>
    </div>

    <div id="viewMembers" class="hidden">
      <div class="section-title">사원 닉네임 등록</div>
      <div class="add-row">
        <input id="memberName" class="field" type="text" placeholder="사원 닉네임" autocomplete="off">
        <button id="addMemberBtn" class="btn">추가</button>
      </div>
      <div class="section-title">등록된 사원 <span id="memberCount"></span></div>
      <div id="memberList" class="chips"></div>
    </div>

    <div id="viewWeeks">
      <div id="addWeekBox" class="add-box hidden">
        <div class="section-title" style="margin-top:0">새 주차 만들기</div>
        <div class="add-row" style="margin-bottom:0">
          <input id="weekLabel" class="field" type="text" placeholder="예: 6월 1주차" autocomplete="off">
          <button id="addWeekBtn" class="btn">추가</button>
        </div>
      </div>
      <div id="fileBox" class="add-box hidden">
        <div class="section-title" style="margin-top:0">&#128194; 팔로우 파일로 자동 확인</div>
        <p class="filehint">인스타 &#8594; 내 정보 다운로드(JSON)로 받은 파일을 올리면, 이번 맞팔 명단과 자동 대조해요. 파일은 이 폰 안에서만 읽고 저장하지 않아요.</p>
        <label class="filebtn"><span id="fName1">&#128229; 팔로워 파일 선택 (followers)</span><input id="fFollowers" type="file" accept=".json,application/json" style="display:none"></label>
        <label class="filebtn"><span id="fName2">&#128229; 팔로잉 파일 선택 (following · 선택)</span><input id="fFollowing" type="file" accept=".json,application/json" style="display:none"></label>
        <button id="applyFileBtn" class="btn block" style="margin-top:8px">자동 확인하기</button>
        <div id="fileResult" class="fileresult"></div>
      </div>
      <div id="weekList" class="stagger"></div>
    </div>

    <div id="viewStatus" class="hidden">
      <div id="statusWeekPills" class="wkpills"></div>
      <div class="modetoggle">
        <button id="modeTarget" class="on" data-mode="target">대상자별</button>
        <button id="modeMember" data-mode="member">사원별</button>
      </div>
      <div id="statusList" class="stagger"></div>
    </div>
  </div>
</div>

<script>
window.onerror=function(msg,src,line,col){try{var d=document.createElement("div");d.style.cssText="position:fixed;top:0;left:0;right:0;z-index:99999;background:#d23a6e;color:#fff;padding:12px;font:13px monospace;white-space:pre-wrap;";d.textContent="JS 에러: "+msg+" (줄 "+line+":"+col+")";(document.body||document.documentElement).appendChild(d);}catch(_){}return false;};

/* ===== follow31 : crew31과 동일한 REST 방식 ===== */
const DB = 'https://gacha-31-default-rtdb.firebaseio.com/follow31';
const ADMIN_PW = "1234";

async function dbGet(p){ try{ const r=await fetch(DB+"/"+p+".json"); return await r.json(); }catch(e){ return null; } }
async function dbPush(p,d){ try{ const r=await fetch(DB+"/"+p+".json",{method:'POST',body:JSON.stringify(d)}); return await r.json(); }catch(e){ return null; } }
async function dbSet(p,d){ try{ await fetch(DB+"/"+p+".json",{method:'PUT',body:JSON.stringify(d)}); }catch(e){} }
async function dbDel(p){ try{ await fetch(DB+"/"+p+".json",{method:'DELETE'}); }catch(e){} }

const state = { role:null, name:null, mid:null, members:[], weeks:[], checks:{}, expanded:new Set(), tab:"weeks", statusWid:null, statusMode:"target", efilter:"all", fMap:null, gMap:null };

function $(id){ return document.getElementById(id); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
function getKSTDate(){ const n=new Date(); return new Date(n.getTime()+n.getTimezoneOffset()*60000+9*3600000); }
function suggestWeekLabel(){ const d=getKSTDate(); return (d.getMonth()+1)+"월 "+Math.ceil(d.getDate()/7)+"주차"; }
function cleanHandle(h){ return (h||"").trim().replace(/^@+/,"").replace(/\s+/g,""); }
function instaUrl(h){ return "https://www.instagram.com/"+encodeURIComponent(cleanHandle(h))+"/"; }
function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function ck(wid,tid,mid){ try{ return state.checks[wid][tid][mid] || {}; }catch(e){ return {}; } }
function fmtTs(sec){ if(!sec) return ""; const u=new Date(sec*1000); const k=new Date(u.getTime()+(9*60+u.getTimezoneOffset())*60000); return (k.getMonth()+1)+"/"+k.getDate()+" "+("0"+k.getHours()).slice(-2)+":"+("0"+k.getMinutes()).slice(-2); }
function fmtDeadline(ms){ if(!ms) return ""; const u=new Date(ms); const k=new Date(u.getTime()+(9*60+u.getTimezoneOffset())*60000); return (k.getMonth()+1)+"/"+k.getDate()+" "+("0"+k.getHours()).slice(-2)+":"+("0"+k.getMinutes()).slice(-2); }
function dlInputValue(ms){ if(!ms) return ""; const u=new Date(ms); const k=new Date(u.getTime()+(9*60+u.getTimezoneOffset())*60000); return k.getFullYear()+"-"+("0"+(k.getMonth()+1)).slice(-2)+"-"+("0"+k.getDate()).slice(-2)+"T"+("0"+k.getHours()).slice(-2)+":"+("0"+k.getMinutes()).slice(-2); }

async function refreshAll(){
  const btn=$("refreshBtn"); if(btn) btn.classList.add("spin");
  const mraw=await dbGet("members");
  const wraw=await dbGet("weeks");
  const craw=await dbGet("checks");
  const mv=mraw||{};
  state.members=Object.keys(mv).map(function(id){ return {id:id,name:mv[id].name}; })
    .sort(function(a,b){ return (a.name||"").localeCompare(b.name||"","ko"); });
  const wv=wraw||{};
  state.weeks=Object.keys(wv).map(function(id){
    const w=wv[id]; const t=w.targets||{};
    return { id:id, label:w.label||"(제목 없음)", createdAt:w.createdAt||0, deadline:w.deadline||0,
      targets:Object.keys(t).map(function(tid){ return {id:tid,name:t[tid].name,insta:t[tid].insta,createdAt:t[tid].createdAt||0}; })
                   .sort(function(a,b){ return a.createdAt-b.createdAt; }) };
  }).sort(function(a,b){ return b.createdAt-a.createdAt; });
  state.checks=craw||{};
  if(btn) btn.classList.remove("spin");
  if(state.role==="employee"){
    const me=state.members.filter(function(m){ return (m.name||"").trim()===state.name; })[0];
    if(me){ state.mid=me.id; } else { doLogout(true); return; }
  }
  if(state.statusWid===null && state.weeks.length){ state.statusWid=state.weeks[0].id; }
  if(state.statusWid && !state.weeks.some(function(w){return w.id===state.statusWid;})){ state.statusWid=state.weeks.length?state.weeks[0].id:null; }
  renderMembers(); renderWeeks(); renderStatus();
}

async function doEmployeeLogin(name){
  const n=(name||"").trim();
  if(!n){ $("loginErr").textContent="닉네임을 입력해 주세요."; return; }
  $("loginErr").textContent="확인 중...";
  const mraw=await dbGet("members"); const mv=mraw||{};
  const hit=Object.keys(mv).filter(function(id){ return (mv[id].name||"").trim()===n; })[0];

function extractEntries(j, isFollowing){
  let arr=[];
  if(isFollowing){ arr=(j && j.relationships_following) || (Array.isArray(j)?j:[]); }
  else { arr=Array.isArray(j) ? j : ((j && (j.relationships_followers||j.relationships_following)) || []); }
  const out=[];
  for(var i=0;i<arr.length;i++){
    var sld=arr[i] && arr[i].string_list_data;
    if(sld && sld.length){
      var v=sld[0].value;
      if(!v && sld[0].href){ var p=sld[0].href.split("instagram.com/"); v=p[1]||""; }
      if(v) out.push([cleanHandle(v).toLowerCase(), sld[0].timestamp||0]);
    }
  }
  return out;
}
function parseFileToMap(file, isFollowing, cb){
  const r=new FileReader();
  r.onload=function(){ try{ cb(new Map(extractEntries(JSON.parse(r.result), isFollowing))); }catch(e){ cb(null); } };
  r.onerror=function(){ cb(null); };
  r.readAsText(file);
}
async function applyFile(){
  const res=$("fileResult");
  if(!state.fMap && !state.gMap){ res.innerHTML='<span style="color:var(--pink-deep)">먼저 파일을 선택해 주세요.</span>'; return; }
  res.innerHTML="대조 중...";
  const writes=[]; let mutual=0, onlyMe=0, none=0, late=0, dropped=[], lateList=[];
  state.weeks.forEach(function(w){
    const dl=w.deadline||0;
    w.targets.forEach(function(t){
      const id=cleanHandle(t.insta).toLowerCase();
      const prev=ck(w.id,t.id,state.mid);
      let f=!!prev.f, m=!!prev.m, x=false, ft=prev.ft||0, mt=prev.mt||0;
      if(state.gMap){ f=state.gMap.has(id); ft=f?(state.gMap.get(id)||0):0; }
      if(state.fMap){ const has=state.fMap.has(id); if(prev.m===true && has===false){ x=true; dropped.push(t.name); } m=has; mt=has?(state.fMap.get(id)||0):0; }
      const next={ f:!!f, m:!!m, x:!!x, ft:ft, mt:mt };
      if(!!prev.f!==next.f || !!prev.m!==next.m || !!prev.x!==next.x || (prev.ft||0)!==ft || (prev.mt||0)!==mt){
        if(!state.checks[w.id]) state.checks[w.id]={};
        if(!state.checks[w.id][t.id]) state.checks[w.id][t.id]={};
        state.checks[w.id][t.id][state.mid]=next;
        writes.push(dbSet("checks/"+w.id+"/"+t.id+"/"+state.mid, next));
      }
      if(next.m){ mutual++; if(dl && mt && mt*1000>dl){ late++; lateList.push(t.name); } } else if(next.f){ onlyMe++; } else { none++; }
    });
  });
  renderWeeks();
  await Promise.all(writes);
  let msg='<b>&#10003; 자동 확인 완료</b><br>맞팔 '+mutual+'명 · 나만 선팔 '+onlyMe+'명 · 안 함 '+none+'명';
  if(!state.gMap){ msg+='<br><span style="color:var(--ink-soft)">(팔로잉 파일은 없어서 "맞팔 여부"만 갱신했어요)</span>'; }
  if(late){ msg+='<br><br><span style="color:#c08a00">&#9201; 마감 후 맞팔(지각) '+late+'명: '+lateList.map(esc).join(", ")+'</span>'; }
  if(dropped.length){ msg+='<br><br><span style="color:#c0392b">&#9888;&#65039; 지난번 맞팔이었는데 이번에 빠짐: '+dropped.map(esc).join(", ")+'</span>'; }
  res.innerHTML=msg;
}

}

async function toggleCheck(wid,tid,mid,field){
  const cur=ck(wid,tid,mid); const next={ f:!!cur.f, m:!!cur.m, x:!!cur.x }; next[field]=!next[field];
  if(next.m){ next.x=false; } if(next.x){ next.m=false; }
  if(!state.checks[wid]) state.checks[wid]={};
  if(!state.checks[wid][tid]) state.checks[wid][tid]={};
  state.checks[wid][tid][mid]=next;
  renderWeeks(); renderStatus();
  await dbSet("checks/"+wid+"/"+tid+"/"+mid, next);
}

  else if(act==="delMember"){ removeMember(el.dataset.id, el.dataset.name); }
  else if(act==="addTarget"){ addTarget(el.dataset.week); }
  else if(act==="delTarget"){ removeTarget(el.dataset.week, el.dataset.id); }
  else if(act==="delWeek"){ removeWeek(el.dataset.id, el.dataset.label); }
  else if(act==="chk"){ toggleCheck(el.dataset.w, el.dataset.t, el.dataset.m, el.dataset.field); }
  else if(act==="efilter"){ state.efilter=el.dataset.f; renderWeeks(); }
  else if(act==="setDeadline"){ setDeadline(el.dataset.id); }
  else if(act==="pickWeek"){ state.statusWid=el.dataset.id; renderStatus(); }
});

restoreSession();
</script>
