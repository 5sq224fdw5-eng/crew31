<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>맞팔 명단</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
:root{
  --bg1:#fff5f8;
  --bg2:#ffe7f0;
  --bg3:#ffdbe9;
  --pink:#ff5c8a;
  --pink-deep:#e8407a;
  --pink-soft:#ffd6e3;
  --pink-tint:#fff0f5;
  --ink:#3d2630;
  --ink-soft:#8a6b76;
  --line:#ffd9e6;
  --card:#ffffff;
  --shadow:0 10px 30px -12px rgba(232,64,122,.30);
  --shadow-sm:0 4px 14px -6px rgba(232,64,122,.25);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 0% 0%, var(--bg3) 0%, transparent 55%),
    radial-gradient(120% 80% at 100% 10%, #ffe1ec 0%, transparent 50%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 48px;}
.disp{font-family:"Gowun Dodum",sans-serif;}

button{font-family:inherit;cursor:pointer;border:none;}
input{font-family:inherit;}
.btn{
  background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 100%);
  color:#fff;font-weight:700;font-size:16px;
  padding:13px 18px;border-radius:14px;
  box-shadow:var(--shadow-sm);
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
}
.btn:active{transform:scale(.96);box-shadow:none;}
.btn.ghost{background:#fff;color:var(--pink-deep);border:1.5px solid var(--pink-soft);box-shadow:none;}
.btn.block{width:100%;}
.btn:disabled{opacity:.5;}
.field{
  width:100%;background:#fff;border:1.5px solid var(--line);
  border-radius:14px;padding:13px 15px;font-size:16px;color:var(--ink);
  outline:none;transition:border-color .15s, box-shadow .15s;
}
.field:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,92,138,.12);}
.field::placeholder{color:#c9a9b6;}

#loginScreen{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:24px;max-width:420px;margin:0 auto;
}
.logo{text-align:center;margin-bottom:30px;animation:rise .6s ease both;}
.logo .heart{font-size:50px;line-height:1;filter:drop-shadow(0 6px 10px rgba(232,64,122,.35));}
.logo h1{font-size:34px;margin:12px 0 4px;letter-spacing:-1px;}
.logo p{margin:0;color:var(--ink-soft);font-size:14px;}
.login-card{
  background:var(--card);border-radius:var(--radius);padding:26px 22px;
  box-shadow:var(--shadow);animation:rise .6s .08s ease both;
}
.login-card label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:0 0 8px 2px;}
.login-card .btn{margin-top:14px;}
.adminlink{
  display:block;text-align:center;margin-top:22px;color:var(--ink-soft);
  font-size:13px;text-decoration:none;font-weight:600;
}
.adminlink:active{color:var(--pink-deep);}
.err{color:var(--pink-deep);font-size:13px;font-weight:600;margin:10px 2px 0;min-height:16px;}

.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(255,245,248,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:14px 16px;margin:0 -16px 18px;
}
.topbar-in{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;letter-spacing:-.5px;}
.topbar .brand .h{font-size:22px;}
.who{display:flex;align-items:center;gap:8px;}
.who .name{font-size:13px;color:var(--ink-soft);font-weight:600;margin-right:2px;}
.iconbtn{background:#fff;border:1.5px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:15px;width:36px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.iconbtn:active{transform:scale(.92);}
.iconbtn.spin{animation:spin .7s linear infinite;}
.logout{background:#fff;border:1.5px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:13px;padding:8px 12px;border-radius:11px;}
.logout:active{transform:scale(.95);}

.tabs{display:flex;gap:8px;background:#fff;padding:6px;border-radius:16px;box-shadow:var(--shadow-sm);margin-bottom:18px;}
.tab{flex:1;text-align:center;padding:11px 0;border-radius:11px;font-weight:700;font-size:14px;color:var(--ink-soft);background:transparent;transition:all .15s;}
.tab.on{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;box-shadow:var(--shadow-sm);}

.section-title{font-size:14px;font-weight:800;color:var(--ink-soft);margin:4px 2px 12px;letter-spacing:-.3px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px;animation:rise .45s ease both;}
.add-row{display:flex;gap:8px;margin-bottom:18px;}
.add-row .field{flex:1;}
.add-row .btn{padding:13px 16px;font-size:15px;white-space:nowrap;}
.add-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:18px;}
.add-box .row2{display:flex;gap:8px;margin-bottom:8px;}
.add-box .row2 .field{flex:1;}

.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  display:inline-flex;align-items:center;gap:8px;background:var(--pink-tint);
  border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 15px;
  font-weight:700;font-size:14px;animation:pop .3s ease both;
}
.chip .x{
  width:22px;height:22px;border-radius:50%;background:#fff;color:var(--pink-deep);
  font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--pink-soft);
}
.chip .x:active{transform:scale(.85);}

.week{border:1px solid var(--line);}
.week-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;gap:10px;}
.week-head .meta{display:flex;flex-direction:column;gap:3px;min-width:0;}
.week-head .wlabel{font-size:17px;font-weight:800;letter-spacing:-.4px;}
.week-head .wsub{font-size:12px;color:var(--ink-soft);font-weight:600;}
.week-head .right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.count{background:var(--pink-soft);color:var(--pink-deep);font-weight:800;font-size:12px;padding:5px 10px;border-radius:999px;}
.caret{color:var(--pink);font-size:13px;transition:transform .25s;}
.week.open .caret{transform:rotate(180deg);}
.week-body{display:none;border-top:1px dashed var(--line);padding:6px 14px 14px;}
.week.open .week-body{display:block;}

.target{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 4px;border-bottom:1px solid #fbe6ee;animation:rise .35s ease both;}
.target:last-child{border-bottom:none;}
.target .info{min-width:0;}
.target .tn{font-weight:800;font-size:15px;}
.target .ti{font-size:13px;color:var(--ink-soft);font-weight:600;}
.target .actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.go{
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  background:linear-gradient(135deg,#ff7eb3,#ff5c8a);color:#fff;font-weight:800;font-size:13px;
  padding:9px 13px;border-radius:12px;box-shadow:var(--shadow-sm);transition:transform .12s;
}
.go:active{transform:scale(.93);}
.del{background:#fff;border:1px solid var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:12px;padding:8px 10px;border-radius:11px;}
.del:active{transform:scale(.9);}
.delweek{margin-top:12px;width:100%;background:#fff;border:1.5px solid #f3c4d4;color:#d23a6e;font-weight:700;font-size:13px;padding:11px;border-radius:13px;}
.delweek:active{transform:scale(.97);}

.empty{text-align:center;padding:44px 20px;color:var(--ink-soft);}
.empty .e{font-size:40px;margin-bottom:10px;opacity:.8;}
.empty p{margin:0;font-size:14px;font-weight:600;line-height:1.6;}

@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}
.stagger > *{animation:rise .4s ease both;}
.hidden{display:none !important;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">
    <div class="heart">&#128151;</div>
    <h1 class="disp">맞팔 명단</h1>
    <p>이번 주 맞팔 대상을 확인하고 팔로우해요</p>
    <p id="vmark" style="margin-top:6px;font-size:12px;color:var(--pink-deep);font-weight:800;">버전 v5</p>
  </div>
  <div class="login-card">
    <label for="loginName">닉네임</label>
    <input id="loginName" class="field" type="text" placeholder="닉네임을 입력하세요" autocomplete="off">
    <button id="loginBtn" class="btn block">들어가기</button>
    <div id="loginErr" class="err"></div>
    <a id="toAdmin" class="adminlink" href="#">관리자 로그인 &rarr;</a>
    <div id="adminBox" class="hidden" style="margin-top:14px">
      <input id="adminPw" class="field" type="password" inputmode="numeric" placeholder="관리자 비밀번호" autocomplete="off">
      <button id="adminLoginBtn" class="btn block" style="margin-top:10px">관리자 들어가기</button>
      <div id="adminErr" class="err"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand"><span class="h">&#128151;</span><span class="disp">맞팔 명단</span></div>
      <div class="who">
        <span class="name" id="whoName"></span>
        <button class="iconbtn" id="refreshBtn" title="새로고침">&#8635;</button>
        <button class="logout" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="adminTabs" class="tabs hidden">
      <button class="tab on" data-tab="weeks">&#128197; 주차별 맞팔</button>
      <button class="tab" data-tab="members">&#128101; 멤버 관리</button>
    </div>

    <div id="viewMembers" class="hidden">
      <div class="section-title">사원 닉네임 등록</div>
      <div class="add-row">
        <input id="memberName" class="field" type="text" placeholder="사원 닉네임" autocomplete="off">
        <button id="addMemberBtn" class="btn">추가</button>
      </div>
      <div class="section-title">등록된 사원 <span id="memberCount"></span></div>
      <div id="memberList" class="chips"></div>
    </div>

    <div id="viewWeeks">
      <div id="addWeekBox" class="add-box hidden">
        <div class="section-title" style="margin-top:0">새 주차 만들기</div>
        <div class="add-row" style="margin-bottom:0">
          <input id="weekLabel" class="field" type="text" placeholder="예: 6월 1주차" autocomplete="off">
          <button id="addWeekBtn" class="btn">추가</button>
        </div>
      </div>
      <div id="weekList" class="stagger"></div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   follow31  —  crew31/game31과 동일한 REST 방식 (Firebase SDK 불필요)
   crew31:  .../crew31   /   follow31:  .../follow31  로 경로만 분리
   ============================================================ */
window.onerror=function(msg,src,line,col){try{var d=document.createElement("div");d.style.cssText="position:fixed;top:0;left:0;right:0;z-index:99999;background:#d23a6e;color:#fff;padding:12px;font:13px monospace;white-space:pre-wrap;";d.textContent="JS 에러: "+msg+" (줄 "+line+":"+col+")";(document.body||document.documentElement).appendChild(d);}catch(_){}return false;};

const DB = 'https://gacha-31-default-rtdb.firebaseio.com/follow31';

/* 관리자 비밀번호 (원하는 값으로 바꾸세요) */
const ADMIN_PW = "1234";

/* ---------- REST 헬퍼 (crew31과 동일) ---------- */
async function dbGet(p){ try{ const r=await fetch(DB+"/"+p+".json"); return await r.json(); }catch(e){ return null; } }
async function dbPush(p,d){ try{ const r=await fetch(DB+"/"+p+".json",{method:'POST',body:JSON.stringify(d)}); return await r.json(); }catch(e){ return null; } }
async function dbDel(p){ try{ await fetch(DB+"/"+p+".json",{method:'DELETE'}); }catch(e){} }

/* ---------- 상태 ---------- */
const state = { role:null, name:null, members:[], weeks:[], expanded:new Set() };

/* ---------- 헬퍼 ---------- */
function $(id){ return document.getElementById(id); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
function getKSTDate(){ const n=new Date(); return new Date(n.getTime()+n.getTimezoneOffset()*60000+9*3600000); }
function suggestWeekLabel(){ const d=getKSTDate(); return (d.getMonth()+1)+"월 "+Math.ceil(d.getDate()/7)+"주차"; }
function cleanHandle(h){ return (h||"").trim().replace(/^@+/,"").replace(/\s+/g,""); }
function instaUrl(h){ return "https://www.instagram.com/"+encodeURIComponent(cleanHandle(h))+"/"; }
function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

/* ---------- 데이터 새로고침 ---------- */
async function refreshAll(){
  const btn=$("refreshBtn"); if(btn) btn.classList.add("spin");
  const mraw = await dbGet("members");
  const wraw = await dbGet("weeks");
  const mv = mraw || {};
  state.members = Object.keys(mv).map(function(id){ return {id:id,name:mv[id].name}; })
    .sort(function(a,b){ return (a.name||"").localeCompare(b.name||"","ko"); });
  const wv = wraw || {};
  state.weeks = Object.keys(wv).map(function(id){
    const w=wv[id]; const t=w.targets||{};
    return {
      id:id, label:w.label||"(제목 없음)", createdAt:w.createdAt||0,
      targets:Object.keys(t).map(function(tid){ return {id:tid,name:t[tid].name,insta:t[tid].insta,createdAt:t[tid].createdAt||0}; })
                   .sort(function(a,b){ return a.createdAt-b.createdAt; })
    };
  }).sort(function(a,b){ return b.createdAt-a.createdAt; });
  if(btn) btn.classList.remove("spin");
  renderMembers(); renderWeeks();
  if(state.role==="employee" && !state.members.some(function(m){return (m.name||"").trim()===state.name;})){ doLogout(true); }
}

/* ---------- 인증 ---------- */
async function doEmployeeLogin(name){
  const n=(name||"").trim();
  if(!n){ $("loginErr").textContent="닉네임을 입력해 주세요."; return; }
  $("loginErr").textContent="확인 중...";
  const mraw = await dbGet("members"); const mv = mraw || {};
  const found = Object.keys(mv).some(function(id){ return (mv[id].name||"").trim()===n; });
  if(found){
    state.role="employee"; state.name=n;
    save("follow31_role","employee"); save("follow31_name",n);
    enterApp();
  } else {
    $("loginErr").textContent="등록된 사원 명단에 없는 닉네임이에요.";
  }
}
function doAdminLogin(){
  const pw = ($("adminPw").value||"");
  if(pw===ADMIN_PW){
    state.role="admin"; state.name="관리자";
    save("follow31_role","admin"); save("follow31_name","관리자");
    $("adminPw").value=""; $("adminErr").textContent="";
    enterApp();
  } else { $("adminErr").textContent="비밀번호가 올바르지 않습니다."; }
}
function doLogout(silent){
  state.role=null; state.name=null;
  save("follow31_role",""); save("follow31_name","");
  $("app").classList.add("hidden");
  $("loginScreen").classList.remove("hidden");
  $("loginName").value="";
  $("loginErr").textContent = silent ? "명단이 변경되어 다시 로그인해 주세요." : "";
}
function restoreSession(){
  const r=load("follow31_role"), n=load("follow31_name");
  if(r==="admin"){ state.role="admin"; state.name="관리자"; enterApp(); }
  else if(r==="employee" && n){ state.role="employee"; state.name=n; enterApp(); }
}

/* ---------- 데이터 조작 ---------- */
async function addMember(){
  const el=$("memberName"); const name=(el.value||"").trim();
  if(!name) return;
  el.value="";
  await dbPush("members",{name:name,createdAt:Date.now()});
  await refreshAll(); el.focus();
}
async function removeMember(id,name){
  if(confirm("'"+name+"' 사원을 삭제할까요?")){ await dbDel("members/"+id); await refreshAll(); }
}
async function addWeek(){
  const el=$("weekLabel"); const label=(el.value||"").trim() || suggestWeekLabel();
  el.value="";
  await dbPush("weeks",{label:label,createdAt:Date.now()});
  await refreshAll();
}
async function removeWeek(id,label){
  if(confirm("'"+label+"' 주차를 통째로 삭제할까요?\n안의 대상자 명단도 함께 사라져요.")){ await dbDel("weeks/"+id); await refreshAll(); }
}
async function addTarget(weekId){
  const nEl=$("tn_"+weekId), iEl=$("ti_"+weekId);
  const name=(nEl.value||"").trim(); const insta=cleanHandle(iEl.value);
  if(!name){ nEl.focus(); return; }
  if(!insta){ iEl.focus(); return; }
  nEl.value=""; iEl.value="";
  await dbPush("weeks/"+weekId+"/targets",{name:name,insta:insta,createdAt:Date.now()});
  state.expanded.add(weekId);
  await refreshAll();
  const f=$("tn_"+weekId); if(f) f.focus();
}
async function removeTarget(weekId,tid){
  await dbDel("weeks/"+weekId+"/targets/"+tid);
  await refreshAll();
}

/* ---------- 화면 전환 ---------- */
function enterApp(){
  $("loginScreen").classList.add("hidden");
  $("app").classList.remove("hidden");
  const isAdmin = state.role==="admin";
  $("whoName").textContent = isAdmin ? "관리자" : (state.name+"님");
  $("adminTabs").classList.toggle("hidden", !isAdmin);
  $("addWeekBox").classList.toggle("hidden", !isAdmin);
  if(isAdmin){
    $("weekLabel").value="";
    $("weekLabel").setAttribute("placeholder","예: "+suggestWeekLabel());
    switchTab("weeks");
  } else {
    $("viewMembers").classList.add("hidden");
    $("viewWeeks").classList.remove("hidden");
  }
  refreshAll();
}
function switchTab(tab){
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.toggle("on", t.dataset.tab===tab); });
  $("viewMembers").classList.toggle("hidden", tab!=="members");
  $("viewWeeks").classList.toggle("hidden", tab!=="weeks");
}

/* ---------- 렌더 ---------- */
function renderMembers(){
  if(state.role!=="admin") return;
  $("memberCount").textContent = state.members.length ? "("+state.members.length+"명)" : "";
  const box=$("memberList");
  if(!state.members.length){
    box.innerHTML='<div class="empty" style="width:100%"><div class="e">&#128100;</div><p>아직 등록된 사원이 없어요.<br>위에서 추가해 주세요.</p></div>';
    return;
  }
  box.innerHTML = state.members.map(function(m){
    return '<span class="chip">'+esc(m.name)+'<button class="x" data-act="delMember" data-id="'+m.id+'" data-name="'+esc(m.name)+'">&#10005;</button></span>';
  }).join("");
}
function renderWeeks(){
  const box=$("weekList");
  const isAdmin = state.role==="admin";
  if(!state.weeks.length){
    box.innerHTML='<div class="empty"><div class="e">&#128197;</div><p>'+(isAdmin?"아직 주차가 없어요.<br>위에서 새 주차를 만들어 주세요.":"아직 등록된 맞팔 주차가 없어요.<br>관리자가 등록하면 여기에 보여요.")+'</p></div>';
    return;
  }
  box.innerHTML = state.weeks.map(function(w, idx){
    const open = state.expanded.has(w.id);
    const cnt = w.targets.length;
    let body="";
    if(cnt){
      body += w.targets.map(function(t){
        return '<div class="target">'+
          '<div class="info"><div class="tn">'+esc(t.name)+'</div><div class="ti">@'+esc(cleanHandle(t.insta))+'</div></div>'+
          '<div class="actions">'+
            '<a class="go" href="'+instaUrl(t.insta)+'" target="_blank" rel="noopener">팔로우 &rarr;</a>'+
            (isAdmin?'<button class="del" data-act="delTarget" data-week="'+w.id+'" data-id="'+t.id+'">삭제</button>':'')+
          '</div></div>';
      }).join("");
    } else {
      body += '<div class="empty" style="padding:26px 10px"><p>'+(isAdmin?"아래에서 대상자를 추가해 주세요.":"아직 등록된 대상자가 없어요.")+'</p></div>';
    }
    if(isAdmin){
      body += '<div class="add-box" style="margin:12px 0 0;box-shadow:none;border:1px dashed var(--line)">'+
        '<div class="row2">'+
          '<input id="tn_'+w.id+'" class="field" type="text" placeholder="신입 닉네임" autocomplete="off">'+
          '<input id="ti_'+w.id+'" class="field" type="text" placeholder="인스타 @아이디" autocomplete="off">'+
        '</div>'+
        '<button class="btn block" data-act="addTarget" data-week="'+w.id+'">대상자 추가</button>'+
        '<button class="delweek" data-act="delWeek" data-id="'+w.id+'" data-label="'+esc(w.label)+'">이 주차 삭제</button>'+
      '</div>';
    }
    return '<div class="card week'+(open?' open':'')+'" style="animation-delay:'+(idx*0.04)+'s">'+
      '<div class="week-head" data-act="toggle" data-id="'+w.id+'">'+
        '<div class="meta"><div class="wlabel">'+esc(w.label)+'</div><div class="wsub">맞팔 대상 '+cnt+'명</div></div>'+
        '<div class="right"><span class="count">'+cnt+'</span><span class="caret">&#9660;</span></div>'+
      '</div>'+
      '<div class="week-body">'+body+'</div>'+
    '</div>';
  }).join("");
}

/* ---------- 이벤트 ---------- */
$("loginBtn").addEventListener("click", function(){ doEmployeeLogin($("loginName").value); });
$("loginName").addEventListener("keydown", function(e){ if(e.key==="Enter") doEmployeeLogin($("loginName").value); });
$("toAdmin").addEventListener("click", function(e){ e.preventDefault(); const box=$("adminBox"); box.classList.toggle("hidden"); if(!box.classList.contains("hidden")) $("adminPw").focus(); });
$("adminLoginBtn").addEventListener("click", doAdminLogin);
$("adminPw").addEventListener("keydown", function(e){ if(e.key==="Enter") doAdminLogin(); });
$("logoutBtn").addEventListener("click", function(){ doLogout(false); });
$("refreshBtn").addEventListener("click", function(){ refreshAll(); });
$("addMemberBtn").addEventListener("click", addMember);
$("memberName").addEventListener("keydown", function(e){ if(e.key==="Enter") addMember(); });
$("addWeekBtn").addEventListener("click", addWeek);
$("weekLabel").addEventListener("keydown", function(e){ if(e.key==="Enter") addWeek(); });
document.querySelectorAll(".tab").forEach(function(t){ t.addEventListener("click", function(){ switchTab(t.dataset.tab); }); });

$("app").addEventListener("click", function(e){
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act=el.dataset.act;
  if(act==="toggle"){
    const id=el.dataset.id;
    if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
    renderWeeks();
  } else if(act==="delMember"){ removeMember(el.dataset.id, el.dataset.name); }
  else if(act==="addTarget"){ addTarget(el.dataset.week); }
  else if(act==="delTarget"){ removeTarget(el.dataset.week, el.dataset.id); }
  else if(act==="delWeek"){ removeWeek(el.dataset.id, el.dataset.label); }
});
