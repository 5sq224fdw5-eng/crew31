<script>
/* ▌당겨서 새로고침 (pull-to-refresh) — #mainBody 최상단에서 아래로 당기면 forceReload ▌ */
(function(){
  var sc=document.getElementById('mainBody');
  if(!sc) return;
  var ind=document.createElement('div');
  ind.id='ptrInd';
  ind.style.cssText='position:fixed;top:0;left:50%;transform:translate(-50%,-44px);background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.16);border-radius:20px;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;z-index:790;opacity:0;pointer-events:none;font-size:12.5px;color:#FF7BA0;font-weight:800';
  ind.textContent='↓ 당겨서 새로고침';
  document.body.appendChild(ind);
  var startY=0,dist=0,pulling=false,busy=false;
  var TH=70,MAX=80;
  sc.addEventListener('touchstart',function(e){
    if(busy) return;
    if(sc.scrollTop<=0){ startY=e.touches[0].clientY; pulling=true; dist=0; } else pulling=false;
  },{passive:true});
  sc.addEventListener('touchmove',function(e){
    if(!pulling||busy) return;
    dist=e.touches[0].clientY-startY;
    if(dist>0 && sc.scrollTop<=0){
      var d=Math.min(dist*0.5,MAX);
      ind.style.transform='translate(-50%,'+Math.min(d-44,14)+'px)';
      ind.style.opacity=Math.min(dist/TH,1);
      ind.textContent= dist>TH ? '↑ 놓으면 새로고침' : '↓ 당겨서 새로고침';
    } else pulling=false;
  },{passive:true});
  sc.addEventListener('touchend',function(){
    if(!pulling||busy){ pulling=false; return; }
    pulling=false;
    if(dist>TH){
      busy=true;
      ind.innerHTML='<span class="ptrSpin"></span><span>최신 버전 불러오는 중</span>';
      ind.style.opacity='1';
      ind.style.transform='translate(-50%,14px)';
      try{ forceReload(true); }catch(e){}
      setTimeout(function(){
        ind.textContent='↓ 당겨서 새로고침';
        ind.style.transform='translate(-50%,-44px)';
        ind.style.opacity='0';
        busy=false;
      },1100);
    } else {
      ind.style.transform='translate(-50%,-44px)';
      ind.style.opacity='0';
    }
  });
})();
</script>
<script>
/* ▌바로가기 하트 FAB — 손가락으로 끌어서 위치 이동 + 위치 기억. 살짝 탭하면 메뉴 토글 ▌ */
window._hfMoved=false;
function hfTrigTap(){
  // 방금 드래그로 옮긴 경우엔 메뉴를 열지 않음 (한 번만 무시)
  if(window._hfMoved){ window._hfMoved=false; return; }
  var f=document.getElementById('heartFab');
  if(f) f.classList.toggle('open');
}
(function(){
  function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
  function init(){
    var fab=document.getElementById('heartFab');
    var trig=fab&&fab.querySelector('.hfTrig');
    if(!fab||!trig){ setTimeout(init,500); return; }
    // 저장된 위치 복원
    try{
      var saved=JSON.parse(localStorage.getItem('heartFabPos')||'null');
      if(saved && typeof saved.left==='number' && typeof saved.bottom==='number'){
        fab.style.left=saved.left+'px'; fab.style.bottom=saved.bottom+'px'; fab.style.right='auto';
      }
    }catch(e){}
    trig.style.touchAction='none'; // 드래그 중 화면 스크롤 방지
    var TW=60, TH=54, THRESH=8;
    var dragging=false, sx=0, sy=0, moved=false;
    trig.addEventListener('pointerdown',function(e){
      dragging=true; moved=false; sx=e.clientX; sy=e.clientY;
      try{ trig.setPointerCapture(e.pointerId); }catch(_){}
    });
    trig.addEventListener('pointermove',function(e){
      if(!dragging) return;
      var dx=e.clientX-sx, dy=e.clientY-sy;
      if(!moved && (Math.abs(dx)+Math.abs(dy))<THRESH) return;
      moved=true; window._hfMoved=true;
      if(e.cancelable) e.preventDefault();
      var vw=window.innerWidth, vh=window.innerHeight;
      var left=clamp(e.clientX - TW/2, 6, vw - TW - 6);
      var bottom=clamp(vh - e.clientY - TH/2, 8, vh - 90);
      fab.style.left=left+'px'; fab.style.bottom=bottom+'px'; fab.style.right='auto';
    });
    function end(e){
      if(!dragging) return;
      dragging=false;
      try{ trig.releasePointerCapture(e.pointerId); }catch(_){}
      if(moved){
        var left=parseFloat(fab.style.left)||0, bottom=parseFloat(fab.style.bottom)||0;
        try{ localStorage.setItem('heartFabPos', JSON.stringify({left:left,bottom:bottom})); }catch(_){}
      }
    }
    trig.addEventListener('pointerup',end);
    trig.addEventListener('pointercancel',end);
  }
  if(document.readyState!=='loading') init(); else document.addEventListener('DOMContentLoaded',init);
})();
</script>
