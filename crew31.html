async function toggleChatLock(type,id){
  if(CU?.role!=='admin'){showToast('관리자만 가능합니다');return;}
  if(type==='dept'){
    const g=groups[id];if(!g)return;
    if(g.lock){
      openGroupLockModal(id,'unlock');
    }else{
      openGroupLockModal(id,'lock');
    }
  }else if(type==='all'){
    const cur=await dbGet('chatLock/all');
    if(cur){await dbSet('chatLock/all',null);showToast('🔓 전체 채팅 잠금 해제');}
    else{await dbSet('chatLock/all',true);showToast('🔒 전체 채팅 잠금');}
    loadChatTab();
  }
}

// ── CALENDAR ──
// ══════════════════════════════════════════════
let _calGroup = 'all'; // 선택된 캘린더 그룹

async function renderCalendar(){
  if(!calY||!calM&&calM!==0){
    calY=new Date().getFullYear();
    calM=new Date().getMonth();
    calSel=calSel||new Date().toISOString().slice(0,10);
  }
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';
  const y=calY,m=calM;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  // 공지 이벤트 + 출석 데이터 동시 로드 (전체 한 번에)
  const [evts, allAttendance] = await Promise.all([
    dbGet('calEvents'),
    dbGet('attendance')  // 관리자/사원 모두 전체 로드 (캐시 효율)
  ]);
  const evList=Object.entries(evts||{}).filter(([k,e])=>!e.deleted);

  const monthStr = `${y}-${String(m+1).padStart(2,'0')}`;
  const dateAttMap = {};

  if(allAttendance){
    Object.entries(allAttendance).forEach(([gid, weeks])=>{
      const gname = groups[gid]?.name || gid;
      // 그룹 필터 적용
      if(_calGroup !== 'all' && gid !== _calGroup) return;
      Object.entries(weeks).forEach(([wk, members])=>{
        Object.entries(members).forEach(([mname, dates])=>{
          if(!isAdmin && mname !== CU?.name) return;
          Object.entries(dates).forEach(([date, result])=>{
            if(!date.startsWith(monthStr)) return;
            if(!dateAttMap[date]) dateAttMap[date]=[];
            dateAttMap[date].push({name:mname, result, group:gname, gid});
          });
        });
      });
    });
  }

  const resultColor={'완료':'#5DB88A','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b'};

  let html='<div style="padding-bottom:60px">';
  // 그룹 필터 탭
  html+=`<div style="display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none">`;
  html+=`<button onclick="setCalGroup('all')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${_calGroup==='all'?'#FF85C1':'#FFE8F3'};color:${_calGroup==='all'?'white':'#FF85C1'}">전체</button>`;
  Object.entries(groups).forEach(([gid,g])=>{
    const isActive = _calGroup===gid;
    html+=`<button onclick="setCalGroup('${gid}')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${isActive?'#f87286':'#fde8eb'};color:${isActive?'white':'#f87286'}">${escH(g.name)}</button>`;
  });
  html+=`</div>`;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px">`;
  html+=`<button onclick="calNav(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">‹</button>`;
  html+=`<div style="font-size:16px;font-weight:800">${y}년 ${m+1}월</div>`;
  html+=`<button onclick="calNav(1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">›</button>`;
  html+=`</div>`;
  html+=`<div class="cal-head">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    html+=`<div class="cal-dh" style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'}">${d}</div>`;
  });
  html+=`</div>`;
  // 그룹 색상 범례
  const sortedGroupsLegend = Object.entries(groups).sort((a,b)=>(a[1].order??999)-(b[1].order??999));
  html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 8px">`;
  sortedGroupsLegend.forEach(([gid,g])=>{
    const c=g.color||'var(--accent)';
    html+=`<div style="display:flex;align-items:center;gap:4px">`;
    html+=`<div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>`;
    html+=`<span style="font-size:10px;color:var(--text3);font-weight:600">${escH(g.name)}</span>`;
    html+=`</div>`;
  });
  html+=`</div>`;

  html+=`<div class="cal-grid">`;
  for(let i=0;i<first;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===calSel;
    const dayEvts=evList.filter(([k,e])=>e.date===ds);
    const dayAtt=dateAttMap[ds]||[];
    const dow=(first+d-1)%7;
    html+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" onclick="calSelect('${ds}')">`;
    html+=`<div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>`;
    if(dayEvts.length) html+=`<div class="cal-dot"></div>`;
    // 출석 도트 (그룹별 색상)
    if(dayAtt.length>0){
      if(!isAdmin){
        const r=dayAtt[0]?.result||'';
        const gid=dayAtt[0]?.gid||'';
        const c=groups[gid]?.color||resultColor[r]||'var(--accent)';
        html+=`<div style="width:6px;height:6px;border-radius:50%;background:${c};margin:1px auto"></div>`;
      } else {
        // 관리자: 그룹별 색 도트들
        const gids=[...new Set(dayAtt.map(a=>a.gid).filter(Boolean))];
        html+=`<div style="display:flex;gap:2px;justify-content:center;flex-wrap:wrap">`;
        gids.forEach(gid=>{
          const c=groups[gid]?.color||'var(--accent)';
          html+=`<div style="width:5px;height:5px;border-radius:50%;background:${c}"></div>`;
        });
        html+=`</div>`;
      }
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 선택 날짜 상세
  if(calSel){
    const selEvts=evList.filter(([k,e])=>e.date===calSel);
    const selAtt=dateAttMap[calSel]||[];
    html+=`<div style="padding:0 14px 10px">`;
    html+=`<div style="font-size:13px;font-weight:800;color:var(--text2);margin:8px 0">${calSel}</div>`;

    // 출석 내역
    if(selAtt.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">📋 출석 현황</div>`;
      if(!isAdmin){
        selAtt.forEach(a=>{
          const gid=a.gid||'';
          const c=groups[gid]?.color||resultColor[a.result]||'#ccc';
          const gName=groups[gid]?.name||'';
          html+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:${c}22;border-radius:10px;margin:0 4px 4px 0">`;
          html+=`<div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>`;
          html+=`<span style="font-size:12px;font-weight:700;color:${c}">${gName}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3)">${a.result}</span>`;
          html+=`</div>`;
        });
      } else {
        // 관리자: 그룹별 집계
        const byGroup={};
        selAtt.forEach(a=>{
          if(!byGroup[a.group]) byGroup[a.group]={};
          if(!byGroup[a.group][a.result]) byGroup[a.group][a.result]=[];
          byGroup[a.group][a.result].push(a.name);
        });
        Object.entries(byGroup).forEach(([gname, results])=>{
          const gid = Object.keys(groups).find(id=>groups[id].name===gname);
          const gcolor = groups[gid]?.color || '#FF85C1';
          const totalCount = Object.values(results).reduce((s,n)=>s+n.length,0);
          html+=`<div style="margin-bottom:10px;background:white;border-radius:12px;padding:10px 12px;border:1px solid var(--border)">`;
          html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">`;
          html+=`<span style="width:10px;height:10px;border-radius:50%;background:${gcolor};display:inline-block"></span>`;
          html+=`<span style="font-size:16px;font-weight:800">${gname}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3);margin-left:auto">총 ${totalCount}명</span>`;
          html+=`</div>`;
          // 표시 순서 통일: 참여 → 완료 → 프패 → 공게 → 지각 → 봉사 → 노피드 → 투피드 → 확인증 → 기타
          const _order=['참여','완료','당직','프패','공게','지각','봉사','노피드','투피드','확인증'];
          const sortedResults=Object.entries(results).sort((a,b)=>{
            let ia=_order.indexOf(a[0]); let ib=_order.indexOf(b[0]);
            if(ia<0)ia=999; if(ib<0)ib=999;
            return ia-ib;
          });
          sortedResults.forEach(([result, names])=>{
            const c=resultColor[result]||'#ccc';
            html+=`<div style="margin-bottom:6px">`;
            html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">`;
            html+=`<span style="background:${c}22;color:${c};padding:2px 8px;border-radius:8px;font-weight:700;font-size:11px">${result} ${names.length}명</span>`;
            html+=`</div>`;
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
            names.forEach(name=>{
              html+=`<span style="background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${escH(name)}</span>`;
            });
            html+=`</div></div>`;
            // 참여 다음에 구분선 (참여 = 시작만, 아래 = 완료처리 그룹)
            if(result==='참여'){
              html+=`<div style="border-top:1.5px dashed var(--border);margin:8px 0"></div>`;
            }
          });
          html+=`</div>`;
        });
      }
    }

    // 공지 이벤트
    if(selEvts.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin:8px 0 6px">📢 일정</div>`;
      selEvts.forEach(([eid,e])=>{
        html+=`<div style="background:white;border-radius:12px;padding:10px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">`;
        html+=`<div><div style="font-size:14px;font-weight:700">${escH(e.title||'')}</div>`;
        if(e.desc)html+=`<div style="font-size:11px;color:var(--text3)">${escH(e.desc)}</div>`;
        html+=`</div>`;
        if(isAdmin)html+=`<button class="vbtn del" onclick="delCalEvent('${eid}')">🗑</button>`;
        html+=`</div>`;
      });
    }

    if(selEvts.length===0&&selAtt.length===0){
      html+=`<div style="font-size:13px;color:var(--text3);padding:8px 0">일정 없음</div>`;
    }

    if(isAdmin){
      html+=`<div style="margin-top:8px;display:flex;gap:8px">`;
      html+=`<input id="calEvtTitle" class="fi" placeholder="일정 제목" style="flex:1;padding:8px 12px">`;
      html+=`<button class="btn-sm pri" onclick="addCalEvent()">추가</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+='</div>';
  mb.innerHTML=html;
}

// 해당 월의 주 월요일 키 목록
function getMonthWeekKeys(y, m){
  const keys=new Set();
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    keys.add(getWeekKey(ds));
  }
  return [...keys];
}

// ══════════════════════════════════════════════
// ── DEPT PAGE ──
// ══════════════════════════════════════════════
async function loadDeptPage(gid){
  try{
  const mb=document.getElementById('mainBody');
  // 스크롤 보존: 같은 그룹을 다시 그릴 때(저장·제출 등)는 위치 유지, 다른 그룹/탭 이동이면 맨 위
  const _sameView = (window._lastRenderedGid === gid);
  const _savedScroll = (_sameView && mb) ? mb.scrollTop : 0;
  const _restoreScroll = async ()=>{ window._lastRenderedGid = gid; try{ await _reopenVotes(); }catch(e){} if(mb){ requestAnimationFrame(()=>requestAnimationFrame(()=>{ try{ mb.scrollTop = _savedScroll; }catch(e){} })); } };
  // 잠금 가드: 잠긴 그룹이고 아직 안 풀었으면 내용 표시 금지
  const gLock = groups[gid];
  if(gLock?.groupLock && CU?.role!=='admin' && !localStorage.getItem('groupUnlocked_'+gid)){
    mb.innerHTML=`<div class="empty" style="padding:60px 20px"><div class="empty-icon">🔒</div><div style="margin:10px 0 16px;color:var(--text3)">${escH(gLock.name||'')} 그룹은 잠겨있습니다.</div><button onclick="openGroupEntryLockModal('${gid}','unlock')" style="padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer">🔓 비밀번호 입력</button></div>`;
    return;
  }
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const isAdmin=CU?.role==='admin';
  const votes=await dbGetVotesForGroup(gid);
  let rawList=votes
    ?Object.entries(votes)
      .filter(([k,v])=>!v.deleted&&(v.group===gid||v.group==='all'))
      .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0))
    :[];
  // ── 중복 투표 표 합치기 (같은 그룹+제목) ── 데이터는 그대로 두고, 화면 표시용으로만 응답/링크/이미지를 병합
  // 같은 (group+title) 투표가 여러 개면 표가 갈라져 보이는 문제 방지. 대표 1개에 나머지 표를 합쳐서 보여줌.
  const mergeMap={};
  rawList.forEach(([vid,v])=>{
    const mkey=`${v.group}__${v.title}`;
    if(!mergeMap[mkey]) mergeMap[mkey]=[];
    mergeMap[mkey].push([vid,v]);
  });
  const list=[];
  Object.values(mergeMap).forEach(group=>{
    if(group.length===1){ list.push(group[0]); return; }
    // 대표 = 가장 최근(이미 정렬됨 → 첫 번째). 나머지 표를 대표에 병합한 사본 생성
    const [repVid, repV]=group[0];
    const merged={...repV,
      responses:{...(repV.responses||{})},
      responseTimes:{...(repV.responseTimes||{})},
      links:{...(repV.links||{})},
      images:{...(repV.images||{})},
      leaveUsed:{...(repV.leaveUsed||{})}
    };
    for(let i=1;i<group.length;i++){
      const ov=group[i][1];
      Object.assign(merged.responses, ov.responses||{});
      Object.assign(merged.responseTimes, ov.responseTimes||{});
      Object.assign(merged.links, ov.links||{});
      Object.assign(merged.images, ov.images||{});
      Object.assign(merged.leaveUsed, ov.leaveUsed||{});
    }
    list.push([repVid, merged]);
  });
  // 원래 정렬 유지
  list.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  // 그룹 색 → 연한 배경 (어느 그룹인지 한눈에)
  const _gColor = groups[gid]?.color || '#FF85C1';
  const _hex = _gColor.replace('#','');
  const _r = parseInt(_hex.slice(0,2),16), _gg = parseInt(_hex.slice(2,4),16), _b = parseInt(_hex.slice(4,6),16);
  const _bgTint = `rgba(${_r},${_gg},${_b},0.10)`;
  const _gName = groups[gid]?.name || '';
  let html=`<div style="padding:0 0 80px;background:${_bgTint};min-height:100vh">`;
  // 현재 그룹 표시 띠
  html+=`<div style="background:${_gColor};padding:11px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:5">`;
  html+=`<span style="font-size:16px">📍</span><span style="font-size:14px;font-weight:800;color:white">${escH(_gName)} 그룹</span></div>`;
  html+=`<div style="padding:14px 0">`;
  // ── 공지 슬라이드 배너 (사원만 표시, 이 그룹 + 전체 공지) ──
  if(!isAdmin) try{
    const allNotices = await dbGet('notices');
    const noticeList = allNotices

          .filter(([k,n])=>n && !n.deleted && (!n.group || n.group==='all' || n.group===gid))

      : [];
    if(noticeList.length>0){
      html+=`<div style="padding:0 14px 10px">`;

      noticeList.forEach(([nid,n],i)=>{
        const body=(n.body||'').replace(/\n/g,' ');

        html+=`<div class="noticeSlide_${gid}" data-idx="${i}" onclick="goNoticeTab()" style="display:${i===0?'flex':'none'};align-items:center;gap:8px;padding:13px 14px;cursor:pointer">`;
        html+=`<span style="font-size:18px;flex-shrink:0">📢</span>`;
        html+=`<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:800;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(n.title||'공지')}</div>`;
        html+=`<div style="font-size:11px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(preview)}</div></div>`;
        if(noticeList.length>1) html+=`<span style="font-size:10px;color:white;background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:10px;flex-shrink:0">${i+1}/${noticeList.length}</span>`;
        html+=`</div>`;
      });
      html+=`</div></div>`;
      if(noticeList.length>1) _startNoticeSlide(gid, noticeList.length);
    }
  }catch(e){}
  if(isAdmin){
    html+=`<div style="padding:0 14px 10px;display:flex;gap:8px">`;
    html+=`<button onclick="openVoteModal(null,'${gid}','start')" style="flex:1;background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌅 업무 시작</button>`;
    html+=`<button onclick="openVoteModal(null,'${gid}','end')" style="flex:1;background:#f87286;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌙 업무 완료</button>`;
    html+=`</div>`;
  }
  if(list.length===0){
    mb.innerHTML=html+'<div class="empty"><div class="empty-icon">📋</div>이 부서의 투표가 없습니다</div></div>';_restoreScroll();return;
  }
  // 내가 시작 투표에서 연차(프패) 쓴 날짜 모음 → 완료 도장에 사용
  const myNameForLeave = CU?.name||'';
  const myLeaveDays = new Set();
  list.forEach(([,sv])=>{
    if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')) return;
    if(!sv.responses || sv.responses[myNameForLeave]===undefined) return;
    const opt = ((sv.options||[])[sv.responses[myNameForLeave]]||'').toLowerCase();
    if(opt.includes('연차')||opt.includes('프패')||opt.includes('당직')){
      const m=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
      if(m) myLeaveDays.add(`${m[1]}월${m[2]}일`);
    }
  });
  list.forEach(([vid2,v2])=>{
    const isClosed2 = v2.closed||(v2.date&&v2.time&&Date.now()>new Date(v2.date+'T'+v2.time).getTime());
    let resCount = v2.imageUpload 
      ? Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url!=='연차';}).length + Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url==='연차';}).length
      : Object.keys(v2.responses||{}).length;
    // 완료 투표: 연차/당직자도 자동 포함
    if((v2.title||'').includes('완료')||(v2.title||'').includes('퇴근')){
      const startVote = list.find(([_,v])=>v.title===(v2.title||'').replace('퇴근','출근'));
      if(startVote && startVote[1]){
        const _svOpts = startVote[1].options||[];
        const _leaveNames = new Set(
          Object.entries(startVote[1].responses||{})
            .filter(([_,idx])=>{ const o=(_svOpts[idx]||''); return o.includes('연차')||o.includes('당직'); })
            .map(([nm])=>nm)
        );
        const _curRespSet = new Set(Object.keys(v2.responses||{}));
        _leaveNames.forEach(nm=>_curRespSet.add(nm));
        resCount = _curRespSet.size;
      }
    }
    const isEnd2 = (v2.title||'').includes('완료')||(v2.title||'').includes('퇴근')||v2.imageUpload;
    const badge = isEnd2 ? '🌙' : '🌅';
    // 내 참여 여부 → 출근/퇴근 완료 도장 (연차 쓴 날의 완료 투표도 퇴근완료 처리)
    const myNameKey = CU?.name||'';
    const _vDayM = (v2.title||'').match(/(\d+)월\s*(\d+)일/);
    const _vDay = _vDayM ? `${_vDayM[1]}월${_vDayM[2]}일` : null;
    const iLeaveThisDay = isEnd2 && _vDay && myLeaveDays.has(_vDay);
    const iJoined = iLeaveThisDay || (v2.imageUpload
      ? !!(v2.images && v2.images[myNameKey] && v2.images[myNameKey].length>0)
      : !!(v2.responses && v2.responses[myNameKey]!==undefined));
    let stampHtml = '';
    if(iJoined){
      const stampText = isEnd2 ? '퇴근완료' : '출근완료';
      const stampColor = isEnd2 ? '#5B9BD5' : '#f0454f';
      stampHtml = `<span style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;border:2.5px solid ${stampColor};color:${stampColor};font-size:10px;font-weight:900;line-height:1.1;text-align:center;transform:rotate(-12deg);margin-left:8px;letter-spacing:-0.5px">${stampText}</span>`;
    }
    html+=`<div style="background:white;border-radius:14px;margin:0 14px 8px;overflow:hidden;border:1px solid var(--border)">`;
    html+=`<div onclick="toggleVoteDetail('${vid2}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer">`;
    html+=`<div style="flex:1;min-width:0">`;
    html+=`<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${badge} ${escH(v2.title||'')}</div>`;
    html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${isClosed2?'🔒 마감':'⏰ 진행중'} · ${resCount}명 참여</div>`;
    html+=`</div>${stampHtml}<span style="color:var(--text3);font-size:12px;margin-left:8px">▼</span>`;
    html+=`</div>`;
    html+=`<div id="voteDetail_${vid2}" style="display:none;border-top:1px solid var(--border)"></div>`;
    html+=`</div>`;
  });
  html+='</div>'; // padding:14px div
  html+='</div>'; // 그룹 색 배경 div
  mb.innerHTML=html;
  _restoreScroll();
  }catch(e){console.error('loadDeptPage error',e);const _mb=document.getElementById('mainBody');if(_mb)_mb.innerHTML='<div style="padding:20px;color:red">오류: '+e.message+'</div>';}
}

// 공지 자동 슬라이드 (위→아래로 순환)
let _noticeSlideTimers={};
function _startNoticeSlide(gid, count){
  if(_noticeSlideTimers[gid]) clearInterval(_noticeSlideTimers[gid]);
  let idx=0;
  _noticeSlideTimers[gid]=setInterval(()=>{
    const slides=document.querySelectorAll('.noticeSlide_'+gid);
    if(!slides.length){ clearInterval(_noticeSlideTimers[gid]); return; }
    slides.forEach(s=>s.style.display='none');
    idx=(idx+1)%count;
    if(slides[idx]) slides[idx].style.display='flex';
  }, 3500);
}

async function toggleVoteDetail(vid){
  const el = document.getElementById(`voteDetail_${vid}`);
  if(!el) return;
  window._openVotes = window._openVotes || {};
  if(el.style.display==='none'){
    el.style.display='block';
    window._openVotes[vid]=true;
    el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
    const v = await dbGet(`votes/${vid}`);
    try{ el.innerHTML = await renderVoteCard(vid, v); }
    catch(e){ el.innerHTML=`<div style="padding:10px;color:red">오류: ${e.message}</div>`; }
  } else {
    el.style.display='none';
    delete window._openVotes[vid];
  }
}

// 재렌더 후, 직전에 펼쳐져 있던 투표 상세를 다시 펼침 (저장·제출해도 그 자리에서 결과 바로 확인)
async function _reopenVotes(){
  const open = window._openVotes ? Object.keys(window._openVotes) : [];
  for(const vid of open){
    const el=document.getElementById(`voteDetail_${vid}`);
    if(!el){ delete window._openVotes[vid]; continue; }
    el.style.display='block';
    try{ const v=await dbGet(`votes/${vid}`); el.innerHTML=await renderVoteCard(vid,v); }catch(e){}
  }
}

// ══════════════════════════════════════════════
// ── VOTE CARD ──
// ══════════════════════════════════════════════
async function renderVoteCard(vid,v){
  try {
  const isAdmin=CU?.role==='admin';
  const opts=v.options||[];
  const responses=v.responses||{};
  const myKey=CU?.name||CU?.key||'admin'; // 이름 기반
  const myVote=responses[myKey];
  const hasVoted = myVote !== undefined && myVote !== null;
  const totalVotes=Object.keys(responses).length;
  const now=Date.now();
  const deadline=(v.date&&v.time)?new Date(v.date+'T'+v.time).getTime():0;
  const isClosed=v.closed||(deadline&&now>deadline);
  const gName=v.group==='all'?'전체':(groups[v.group]?.name||v.group||'전체');
  const gColor=groups[v.group]?.color||'var(--accent)';
  const isEndVote = (v.title||'').includes('완료')||(v.title||'').includes('퇴근')||(v.title||'').includes('마감')||v.imageUpload===true;
  const isImageVote = v.imageUpload === true;

  let html=`<div class="card" style="margin:0 14px 16px;${isClosed?'opacity:0.75;background:#f8f8f8;':''}">` ;
  html+=`<div style="padding:14px 14px 10px;border-bottom:1px solid var(--border)">`;
  html+=`<div style="display:flex;align-items:flex-start;gap:8px">`;
  html+=`<div style="flex:1">`;
  const respCount = isImageVote
    ? Object.keys(v.images||{}).filter(k=>{const im=v.images[k];return im&&im.length>0;}).length
    : Object.keys(responses).length;
  html+=`<div style="font-size:15px;font-weight:800">${escH(v.title||'')} <span style="font-size:10px;color:#f00">[응답${respCount}·링크${Object.keys(v.links||{}).length}]</span></div>`;
  // 시작/완료 배지
  const titleLow = (v.title||'').toLowerCase();
  if(titleLow.includes('시작')||titleLow.includes('출근')||titleLow.includes('start')){
    html+=`<span style="background:#FFE8F3;color:#FF85C1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌅 업무시작</span>`;
  } else if(titleLow.includes('완료')||titleLow.includes('end')||titleLow.includes('퇴근')){
    html+=`<span style="background:#fde8eb;color:#f87286;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌙 업무완료</span>`;
  }
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:3px">`;
  html+=`<span style="background:${gColor}22;color:${gColor};padding:2px 8px;border-radius:10px;font-weight:700;margin-right:6px">${escH(gName)}</span>`;
  if(v.date)html+=`📅 ${v.date}`;
  if(v.time)html+=` ${v.time} 마감`;
  html+=`</div></div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openVoteModal('${vid}')">✏️</button>`;
    html+=`<button class="vbtn ${isClosed?'open':'close'}" onclick="toggleVoteClose('${vid}',${!isClosed})">${isClosed?'열기':'닫기'}</button>`;
    html+=`<button class="vbtn del" onclick="delVote('${vid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div></div>`;
  html+=`<div style="padding:12px 14px">`;

  // 완료 투표 → 그룹 대표 인스타 계정 미션 버튼
  if(isEndVote){
    const rep = groups[v.group]?.repAccount;
    if(rep){
      html+=`<a href="${escH(rep)}" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;box-sizing:border-box;padding:11px;margin-bottom:12px;background:linear-gradient(135deg,#FF85C1,#f87286);color:white;border-radius:12px;font-size:13px;font-weight:800;text-decoration:none">📷 ${escH(gName)} 대표계정 미션하러 가기</a>`;
    }
  }

  // 완료 투표(선택지형, 이미지투표 아님) → 같은 날 시작 참여자 목록 (완료자 색 채움) — 관리자만
  if(isEndVote && !isImageVote && CU?.role==='admin'){
    try{
      const _allV = await dbGet('votes');
      if(_allV){
        const _dm = (v.title||'').match(/(\d+)월\s*(\d+)일/);
        const _dl = _dm ? `${_dm[1]}월${_dm[2]}일` : null;
        const _sv = Object.values(_allV).find(sv=>{
          if(sv.deleted || sv.group!==v.group || !sv.responses) return false;
          if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')) return false;
          const _sm = (sv.title||'').match(/(\d+)월\s*(\d+)일/);
          const _sl = _sm ? `${_sm[1]}월${_sm[2]}일` : null;
          return _dl && _sl && _dl===_sl;
        });
        if(_sv && _sv.responses){
          const _started = Object.keys(_sv.responses);
          const _done = new Set(Object.keys(v.responses||{}));
          const _svOpts = _sv.options||[];
          // 시작 투표에서 연차(프패)/당직 선택한 사람 = 완료 안 해도 완료 간주
          const _leaveSet = new Set(_started.filter(nm=>{
            const opt = (_svOpts[_sv.responses[nm]]||'').toLowerCase();
            return opt.includes('연차')||opt.includes('프패');
          }));
          const _dutySet = new Set(_started.filter(nm=>{
            const opt = (_svOpts[_sv.responses[nm]]||'').toLowerCase();
            return opt.includes('당직');
          }));
          const _doneCnt = _started.filter(n=>_done.has(n)||_leaveSet.has(n)||_dutySet.has(n)).length;
          html+=`<div style="background:var(--surface2);border-radius:12px;padding:10px 12px;margin-bottom:12px">`;
          html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">✅ 완료 체크 (${_doneCnt}/${_started.length}) · <span style="color:#C3B0F0">■</span> 연차 <span style="color:#7EC8E3">■</span> 당직</div>`;
          html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
          _started.forEach(nm=>{
            const isLeave=_leaveSet.has(nm);
            const isDuty=_dutySet.has(nm);
            const ok=_done.has(nm);
            let bg, col, bd;
            if(isDuty){ bg='#7EC8E3'; col='white'; bd='#7EC8E3'; }         // 당직 = 하늘색
            else if(isLeave){ bg='#C3B0F0'; col='white'; bd='#C3B0F0'; }   // 연차 = 연한 보라
            else if(ok){ bg=gColor; col='white'; bd=gColor; }             // 완료 = 그룹색
            else { bg='var(--surface)'; col='var(--text3)'; bd='var(--border)'; } // 미완료 = 회색
            html+=`<span style="background:${bg};color:${col};padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;border:1px solid ${bd}">${escH(nm)}</span>`;
          });
          html+=`</div></div>`;
        }
      }
    }catch(e){}
  }

  if(isImageVote){
    // 이미지 업로드 투표 - 시작 투표 참여자 버튼 목록
    const allImages = v.images||{};

    // 같은 날짜 시작 투표 찾기
    let startVoters = [];
    let leaveSet = new Set();
    let bonusSet = new Set();
    let totalCount = 0;
    try{
      const allVotes = await dbGet('votes');
      if(allVotes && v.group){
        const titleDate = getTitleDate(v);
        const startV = Object.values(allVotes).find(sv=>{
          if(sv.deleted||sv.group!==v.group) return false;
          if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')&&!(sv.title||'').includes('참여')) return false;
          const t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
          const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
          if(t1&&t2) return t1[1]===t2[1]&&t1[2]===t2[2];
          return getTitleDate(sv)===titleDate;
        });
        if(startV){
          const svOpts=startV.options||[];
          const svResp=startV.responses||{};
          startVoters = Object.keys(svResp);
          startVoters.forEach(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            if(opt.includes('프패')||opt.includes('연차')||opt.includes('프리패스')) leaveSet.add(nick);
            else if(opt.includes('봉사')||opt.includes('열정페이')) bonusSet.add(nick);
          });
          // 노피드(재능기부) 세트 — 피드 없음 → 분모 제외
          const nopidSet = new Set(startVoters.filter(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            return opt.includes('노피드')||opt.includes('재능기부');
          }));
          // 총 인증 수 = 봉사·노피드 제외(연차는 분모 포함), 투피드는 2장
          const tupideSet = new Set(startVoters.filter(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            return opt.includes('투피드')||opt.includes('두배');
          }));
          totalCount = startVoters.filter(nick=>!bonusSet.has(nick)&&!nopidSet.has(nick)).reduce((sum,nick)=>{
            return sum + (tupideSet.has(nick) ? 2 : 1);
          }, 0);
        }
      }
    }catch(e){}

    if(startVoters.length===0 && Object.keys(allImages).length===0){
      // 시작 투표도 없고 이미지도 없으면 본인 업로드 버튼만 표시
      if(!isClosed){
        html+=`<div style="border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;margin-bottom:10px">`;
        html+=`<div style="font-size:24px;margin-bottom:6px">📸</div>`;
        html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
        html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">📎 이미지 선택</button>`;
        html+=`</div>`;
      }
    } else {
      if(startVoters.length===0) startVoters = Object.keys(allImages);
    }
    if(totalCount===0) totalCount = startVoters.length;

    window._voteGal = window._voteGal || {};

// 인스타 아이디 정규화·검사: @ 제거, 한글/이상문자 차단 (영문·숫자·밑줄·마침표만)
function normalizeIgId(raw){
  let s=(raw||'').trim();
  if(!s) return {ok:false, err:'empty'};
  s=s.replace(/^@+/,'').trim();
  if(/[\u3131-\u318E\uAC00-\uD7A3]/.test(s)) return {ok:false, err:'korean'};
  if(!/^[A-Za-z0-9._]+$/.test(s)) return {ok:false, err:'format'};
  return {ok:true, id:s};
}
function showIgIdError(err){
  if(err==='empty') showBigAlert('✍️','아이디를 입력해 주세요','링크와 함께 인스타그램 아이디를\n꼭 입력해 주세요.\n(예: narin_a.to)');
  else if(err==='korean') showBigAlert('🚫','아이디를 확인해 주세요','한글 닉네임이 아니라\n인스타그램 아이디(영문)를\n입력해 주세요. (예: narin_a.to)');
  else showBigAlert('🚫','아이디 형식 오류','인스타그램 아이디는 영문·숫자·\n밑줄(_)·마침표(.)만 가능해요.\n(예: narin_a.to)');
}
async function submitVoteLinkNew(vid, silent, preData){
  const nick=CU?.name||'익명';
  const key=CU?.key||'admin';
  // preData가 있으면 DOM 대신 그 값을 사용 (castVote가 화면을 다시 그려도 안전)
  const type = preData ? (preData.type||'normal') : (document.getElementById(`linkType_${vid}`)?.value||'normal');
  const linkId = preData ? (preData.id||'') : (document.getElementById(`linkId_${vid}`)?.value.trim()||'');
  const displayNick=nick;
  const displayId=linkId;
  const isTupide=type==='tupide';

  if(isTupide){
    const url1 = preData ? (preData.url1||'') : (document.getElementById(`linkUrl_${vid}_1`)?.value.trim());
    const note1= preData ? (preData.note1||'') : (document.getElementById(`linkNote_${vid}_1`)?.value.trim()||'');
    const url2 = preData ? (preData.url2||'') : (document.getElementById(`linkUrl_${vid}_2`)?.value.trim());
    const note2= preData ? (preData.note2||'') : (document.getElementById(`linkNote_${vid}_2`)?.value.trim()||'');
    if(!url1&&!url2){ if(!silent) showToast('링크를 입력하세요'); return;}
    if(url1){
      const ex1=await dbGet(`votes/${vid}/links/${key}_1`);
      await dbSet(`votes/${vid}/links/${key}_1`,{nick:displayNick,id:displayId,url:cleanUrl(url1),note:note1,type,time:ex1?.time||Date.now()});
    }
    if(url2){
      const ex2=await dbGet(`votes/${vid}/links/${key}_2`);
      await dbSet(`votes/${vid}/links/${key}_2`,{nick:displayNick,id:displayId,url:cleanUrl(url2),note:note2,type,time:ex2?.time||(Date.now()+1)});
    }
  } else {
    const url = preData ? (preData.url||'') : (document.getElementById(`linkUrl_${vid}`)?.value.trim());
    const note= preData ? (preData.note||'') : (document.getElementById(`linkNote_${vid}`)?.value.trim()||'');
    if(!url){ if(!silent) showToast('URL을 입력하세요'); return;}
    const ex=await dbGet(`votes/${vid}/links/${key}`);
    await dbSet(`votes/${vid}/links/${key}`,{nick:displayNick,id:displayId,url:cleanUrl(url),note,type,time:ex?.time||Date.now()});
  }
  if(!silent){
    showToast('✅ 링크 제출됨!');
    if(_currentTab==='home')loadHome();
    else if(_currentTab==='dept')loadDeptPage(_currentDept);
  }
}

function cleanUrl(url){

async function adminSetSaveCount(vid, key, nick){

}

// 캡쳐 OCR → 시작투표 링크(아이디) 대조 → 누락(안 뜬 리포) URL 표시
async function runRepostCheck(vid, nick){
  const sanitized = nick.replace(/[\.#$\/\[\]\s]/g,'_');
  const myKey2 = (CU?.name||'').replace(/[\.#$\/\[\]\s]/g,'_');
  const isMine = (nick===(CU?.name||'') || sanitized===myKey2);
  let m = document.getElementById('repostModal');
  if(!m){ m=document.createElement('div'); m.id='repostModal'; m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10050;display:flex;align-items:center;justify-content:center;padding:20px'; document.body.appendChild(m); }
  const card = (inner)=>`<div style="background:#fff;border-radius:18px;max-width:380px;width:100%;padding:20px;margin:auto;max-height:88vh;overflow-y:auto">${inner}</div>`;
  const titleTxt = isMine ? '🔍 내 누락 확인' : `🔍 ${escH(nick)} 누락 확인`;
  const header = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:16px;font-weight:900">${titleTxt}</div><button onclick="closeRepostModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3)">✕</button></div>`;
  const setBody = (h)=>{ const b=document.getElementById('repostBody'); if(b) b.innerHTML=h; };
  m.innerHTML = card(header + `<div id="repostBody" style="font-size:13px;color:var(--text2);text-align:center;padding:20px 0">캡쳐를 읽는 중… <span id="repostProg"></span><div style="font-size:11px;color:var(--text3);margin-top:8px">처음엔 인식기를 받느라 조금 걸려요</div></div>`);
  m.style.display='flex';

  try{
    const [v, allVotes] = await Promise.all([ dbGet(`votes/${vid}`), dbGet('votes') ]);
    if(!v){ setBody('투표를 불러오지 못했어요.'); return; }
    // 같은 그룹·같은 날짜의 시작 투표 링크(아이디+URL)를 기준으로
    let refLinks = [];
    if(allVotes && v.group){
      const startV = Object.values(allVotes).find(sv=>{
        if(sv.deleted||sv.group!==v.group) return false;
        if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')&&!(sv.title||'').includes('참여')) return false;
        const t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
        const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
        if(t1&&t2) return t1[1]===t2[1]&&t1[2]===t2[2];
        return getTitleDate(sv)===getTitleDate(v);
      });
      if(startV && startV.links) refLinks = Object.values(startV.links).filter(l=>l && (l.id||l.url));
    }
    if(refLinks.length===0){ setBody('시작 투표의 제출 링크(아이디)를 찾지 못했어요.<br>링크 제출 시 <b>아이디</b>를 같이 적어야 검사할 수 있어요.'); return; }

    const imgsSan = await dbGet(`votes/${vid}/images/${sanitized}`);
    const imgsRaw = imgsSan || await dbGet(`votes/${vid}/images/${nick}`);
    const imgs = (imgsRaw||[]).filter(x=>x?.url && x.url!=='연차');
    if(imgs.length===0){ setBody('이 사람이 올린 캡쳐가 없어요.'); return; }

    const { default: Tesseract } = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/+esm');
    const worker = await Tesseract.createWorker('eng');
    let ocrText='', unreadable=0;
    for(let i=0;i<imgs.length;i++){
      const prog=document.getElementById('repostProg'); if(prog) prog.textContent=`(${i+1}/${imgs.length})`;
      const url = imgs[i].url.includes('/upload/') ? imgs[i].url.replace('/upload/','/upload/q_auto,f_auto,w_1000/') : imgs[i].url;
      try{
        const { data:{ text } } = await worker.recognize(url);
        const norm=(text||'').toLowerCase();
        if(norm.replace(/[^a-z0-9]/g,'').length < 3) unreadable++;
        ocrText += '\n'+norm;
      }catch(e){ unreadable++; }
    }
    await worker.terminate();

    const textNorm = ocrText.replace(/[^a-z0-9]/g,'');
    const found=[], missing=[];
    refLinks.forEach(l=>{
      const idRaw=(l.id||'').replace(/^@/,'');
      const refNorm=idRaw.toLowerCase().replace(/[^a-z0-9]/g,'');
      const ok = refNorm.length>=3 && textNorm.includes(refNorm);
      (ok?found:missing).push(l);
    });

    let body='';
    body+=`<div style="font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.6">인사팀 리포 ${refLinks.length}개 · 내 캡쳐 ${imgs.length}장<br>⚠️ 자동판독은 100%가 아니에요. 아래 목록을 <b>한 번 더 직접 확인</b>하세요.</div>`;
    const missTitle = isMine ? '📌 아직 안 올린 게시물 — 캡쳐해서 추가하세요' : '❌ 누락/안 뜸';
    body+=`<div style="font-weight:800;color:#E5484D;font-size:13px;margin:6px 0">${missTitle} (${missing.length})</div>`;
    if(missing.length===0){ body+=`<div style="font-size:12px;color:#2E9E5B;font-weight:700;margin-bottom:8px">${isMine?'다 올렸어요! 👍':'없음 👍'}</div>`; }
    else {
      missing.forEach(l=>{
        const idTxt = l.id ? ('@'+String(l.id).replace(/^@/,'')) : '(아이디 없음)';
        body+=`<div style="background:#FFF0F0;border:1px solid #FFD0D0;border-radius:10px;padding:10px;margin-bottom:6px">`;
        body+=`<div style="font-weight:700;font-size:13px">${escH(l.nick||'')} <span style="color:var(--text3);font-weight:500">${escH(idTxt)}</span></div>`;
        if(l.url) body+=`<div style="font-size:11px;color:#3B6FD4;word-break:break-all;margin-top:3px"><a href="${escH(l.url)}" target="_blank" style="color:#3B6FD4">${escH(l.url)}</a></div>`;
        body+=`</div>`;
      });
      window._repostMissUrls = missing.map(l=>l.url).filter(Boolean).join('\n');
      if(window._repostMissUrls) body+=`<button onclick="copyRepostMissing()" style="width:100%;background:#FFE0E0;color:#E5484D;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:10px">📋 안 올린 게시물 URL 복사</button>`;
    }
    body+=`<div style="font-weight:800;color:#2E9E5B;font-size:13px;margin:10px 0 6px">✅ 이미 올린 것 (${found.length})</div>`;
    body+=`<div style="font-size:12px;color:var(--text2);line-height:1.7;word-break:break-all">${found.map(l=>escH('@'+String(l.id||'').replace(/^@/,''))).join(', ')||'없음'}</div>`;
    if(unreadable>0) body+=`<div style="font-size:11px;color:#C98A00;margin-top:10px">❓ 아이디를 못 읽은 캡쳐 ${unreadable}장 있음 → 그만큼 잘못 잡혔을 수 있으니 직접 확인하세요.</div>`;
    setBody(body);
  }catch(e){
    setBody('검사 중 오류가 났어요. 인터넷 연결을 확인하고 다시 시도해 주세요.<br><span style="font-size:11px;color:#aaa">'+escH(String(e&&e.message||e))+'</span>');
  }
}

async function copyAllLinks(vid){
  const v = await dbGet(`votes/${vid}`);
  if(!v){showToast('링크 없음');return;}
  // 화면 목록과 동일한 순서/넘버링 재현 (열정페이·노피드·연차 + 링크 그룹핑)
  const respTimes = v.responseTimes || {};
  const bonusVoters=[];
  if(v.responses && v.options){
    Object.entries(v.responses).forEach(([k,optIdx])=>{
      const optText=(v.options[optIdx]||'').toLowerCase();
      const t = respTimes[k] || 0;
      if(optText.includes('봉사')||optText.includes('열정페이')){
        bonusVoters.push({nick:k, type:'열정페이', time:t});
      }else if(optText.includes('노피드')||optText.includes('재능기부')){
        bonusVoters.push({nick:k, type:'재능기부', time:t});
      }else if(optText.includes('프패')||optText.includes('연차')||optText.includes('프리패스')){
        bonusVoters.push({nick:k, type:'연차', time:t});
      }else if(optText.includes('당직')){
        bonusVoters.push({nick:k, type:'당직', time:t});
      }
    });
  }
  const sortedLinks = (v.links?Object.entries(v.links):[]).sort((a,b)=>{
    const ta=a[1].time||0, tb=b[1].time||0;
    if(ta&&tb) return ta-tb;
    return a[0]<b[0]?-1:1;
  }).map(([,l])=>l);
  const grouped={};
  sortedLinks.forEach(l=>{const nick=l.nick||'';if(!grouped[nick])grouped[nick]={nick,links:[],firstTime:l.time||0};grouped[nick].links.push(l);});

  // 링크를 낸 사람은 bonus 줄에서 제외 (링크 줄에 [연차] 등으로 표시되므로 중복 방지)
  const linkNicks = new Set(Object.keys(grouped));
  const bonusFiltered = bonusVoters.filter(b=>!linkNicks.has(b.nick));

  // 닉네임별 선택지 → 유형 라벨 매핑 (투피드/연차 표시용)
  function _optTextOf(nick){
    if(!v.responses||!v.options) return '';
    const idx=v.responses[nick];
    if(idx===undefined||idx===null) return '';
    return (v.options[idx]||'').toLowerCase();
  }
  function _typeLabel(nick, links){
    const t=_optTextOf(nick);
    if(t.includes('투피드')||t.includes('두배')) return '투피드';
    if(t.includes('프패')||t.includes('연차')||t.includes('프리패스')) return '연차';
    // 선택지 정보가 없으면 링크 개수로 보조 판단(투피드는 보통 링크 2개)
    if((links?.length||0)>=2) return '투피드';
    return '';
  }

  const allEntries=[
    ...bonusFiltered.map(b=>({type:'bonus',nick:b.nick,label:b.type,time:b.time||0})),
    ...Object.values(grouped).map(g=>({type:'link',nick:g.nick,links:g.links,time:g.firstTime}))
  ].sort((a,b)=>a.time-b.time);
  if(allEntries.length===0){showToast('복사할 내용 없음');return;}
  let num=1;
  const lines=[];
  allEntries.forEach(entry=>{
    if(entry.type==='bonus'){
      lines.push(`${num++}. ${entry.nick} ${entry.label}`);
    }else{
      const fl=entry.links[0];
      const label=_typeLabel(entry.nick, entry.links);
      const head=`${num++}. ${fl.nick||''}${fl.id?` @${fl.id}`:''}${label?` [${label}]`:''}`;
      const parts=[head];
      entry.links.forEach((l,i)=>{
        if(l.url) parts.push(entry.links.length>1?`(${i+1}) ${l.url}`:l.url);
        if(l.note) parts.push('ㄴ'+l.note);
      });
      lines.push(parts.join('\n'));
    }
  });
  const dateStr = getTitleDate(v) || v.date || '';
  let dateHeader = '';
  if(dateStr){
    const _wd=['일','월','화','수','목','금','토'];
    const _m=dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(_m){
      const _d=new Date(Number(_m[1]),Number(_m[2])-1,Number(_m[3]));
      dateHeader = `${dateStr} ${_wd[_d.getDay()]}요일`;
    } else {
      dateHeader = dateStr;
    }
  }
  const text = (dateHeader?`${dateHeader}\n\n`:'') + lines.join('\n');
  await navigator.clipboard.writeText(text);
  showToast('📋 전체 복사됨');
}

const CLOUDINARY_CLOUD = 'ds9vkwlse';
const CLOUDINARY_PRESET = 'crew31_upload'; // unsigned preset 이름

// 저장 개수 인식: OCR("게시물 N개")과 격자 셀 세기 중 큰 값
function _loadImgEl(src){ return new Promise((res,rej)=>{ const img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>res(img); img.onerror=rej; img.src=(src instanceof Blob)?URL.createObjectURL(src):src; }); }
async function _ocrSavedCount(src){
  try{
    const { default: Tesseract } = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/+esm');
    const worker = await Tesseract.createWorker('kor');
    const { data:{ text } } = await worker.recognize(src);
    await worker.terminate();
    const m = text.match(/게시물\s*(\d+)\s*개/) || text.match(/(\d+)\s*개/) || text.match(/(\d+)\s*posts?/i);
    return m ? (parseInt(m[1],10)||0) : 0;
  }catch(e){ console.warn('ocrCount',e); return 0; }
}
async function _gridSavedCount(src){
  try{
    const img=await _loadImgEl(src);
    const W=300, scale=W/img.width, H=Math.round(img.height*scale);
    const c=document.createElement('canvas'); c.width=W; c.height=H;
    const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,W,H);
    const data=ctx.getImageData(0,0,W,H).data;
    const cols=3, cellW=W/cols, cellH=cellW, rows=Math.floor(H/cellH);
    let filled=0, started=false;
    for(let r=0;r<rows;r++){
      let rowFilled=0;
      for(let col=0;col<cols;col++){
        let sum=0,sum2=0,cnt=0;
        const x0=Math.floor(col*cellW+cellW*0.2), x1=Math.floor(col*cellW+cellW*0.8);
        const y0=Math.floor(r*cellH+cellH*0.2), y1=Math.floor(r*cellH+cellH*0.8);
        for(let y=y0;y<y1;y+=3) for(let x=x0;x<x1;x+=3){ const i=(y*W+x)*4; const g=(data[i]+data[i+1]+data[i+2])/3; sum+=g; sum2+=g*g; cnt++; }
        if(cnt){ const mean=sum/cnt, varr=sum2/cnt-mean*mean; const blank=(mean>243 && varr<60); if(!blank) rowFilled++; }
      }
      if(!started){ if(rowFilled>=3) started=true; else continue; } // 헤더 텍스트 행 건너뜀
      if(rowFilled===0) break; // 빈 행에서 종료
      filled+=rowFilled;
    }
    return filled;
  }catch(e){ console.warn('gridCount',e); return 0; }
}
async function countSavedPosts(src){
  const [ocr, grid] = await Promise.all([ _ocrSavedCount(src), _gridSavedCount(src) ]);
  // OCR("게시물 N개")이 정확 → 우선. OCR 실패(0)일 때만 격자 추정 사용(보조).
  const n = ocr>0 ? ocr : grid;
  return { ocr, grid, n };
}
// 여러 장 캡쳐 처리: OCR 엔진 1회만 띄워 전부 인식. 헤더 'N개'는 총개수라 최댓값, 없으면 격자 합산.
async function countSavedPostsMulti(files){
  let ocrMax=0, gridSum=0, worker=null;
  try{
    const { default: Tesseract } = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/+esm');
    worker = await Tesseract.createWorker('kor');
  }catch(e){ console.warn('ocrWorker',e); }
  for(const f of files){
    if(worker){
      try{
        const { data:{ text } } = await worker.recognize(f);
        const m = text.match(/게시물\s*(\d+)\s*개/) || text.match(/(\d+)\s*개/) || text.match(/(\d+)\s*posts?/i);
        const nn = m ? (parseInt(m[1],10)||0) : 0;
        if(nn>ocrMax) ocrMax=nn;
      }catch(e){}
    }
    try{ gridSum += await _gridSavedCount(f); }catch(e){}
  }
  if(worker){ try{ await worker.terminate(); }catch(e){} }
  return { ocr:ocrMax, grid:gridSum, n: ocrMax>0?ocrMax:gridSum };
}
// 참여자 수 = 같은 그룹·날짜 시작투표 응답자 중 연차(프패) 제외
async function getParticipantCount(v){
  try{
    const allV=await dbGet('votes');
    const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
    const sv=Object.values(allV||{}).find(s=>{
      if(!s||s.deleted||s.group!==v.group)return false;
      if(!(s.title||'').includes('시작')&&!(s.title||'').includes('출근')&&!(s.title||'').includes('참여'))return false;
      const t1=(s.title||'').match(/(\d+)월\s*(\d+)일/);
      if(t1&&t2)return t1[1]===t2[1]&&t1[2]===t2[2];
      return getTitleDate(s)===getTitleDate(v);
    });
    if(!sv) return 0;
    let p=0;
    Object.entries(sv.responses||{}).forEach(([nm,idx])=>{ const opt=(sv.options?.[idx]||'').toLowerCase(); if(opt.includes('연차')||opt.includes('프패')||opt.includes('프리패스'))return; p++; });
    return p;
  }catch(e){ return 0; }
}

async function uploadImages(vid, input){
  const files = Array.from(input.files);
  if(!files.length) return;
  // 마감 체크
  const vCheck = await dbGet(`votes/${vid}`);
  if(vCheck?.closed){ showToast('마감된 투표입니다'); input.value=''; return; }
  showToast('⏳ 업로드 중...');

  const myKey = (CU?.name || '').replace(/[\.\#\$\/\[\]\s]/g, '_');
  if(!myKey){showToast('로그인 정보 오류');return;}

  // 만료 시간 계산 (다음날 오후 1시 10분)
  const now = new Date();
  const expire = new Date(now);
  if(now.getHours() >= 22){
    expire.setDate(expire.getDate() + 1);
  }
  expire.setHours(13, 10, 0, 0);
  const expireAt = expire.getTime();

  const compressImg = (file) => new Promise(resolve=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const maxW = 1200;
      const scale = Math.min(1, maxW / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob=>resolve(blob||file), 'image/jpeg', 0.82);
    };
    img.onerror = ()=>resolve(file);
    img.src = url;
  });

  const uploaded = [];
  const uploadOne = (file, retry=0) => new Promise(async resolve=>{
    // 원본이 비정상적으로 클 때만 차단 (50MB), 보통 사진은 아래에서 압축
    if(file.size > 50 * 1024 * 1024){ showToast(`${file.name} 너무 큽니다 (50MB 초과)`); return resolve(null); }
    let compressed = await compressImg(file);
    // 압축 후에도 10MB 넘으면 한 번 더 강하게 압축
    if(compressed && compressed.size > 10 * 1024 * 1024){
      compressed = await compressImg(compressed) || compressed;
    }
    if(compressed && compressed.size > 10 * 1024 * 1024){ showToast(`${file.name} 압축 후에도 큼`); return resolve(null); }
    const fd = new FormData();
    fd.append('file', compressed, 'photo.jpg');
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('folder', `crew31/${vid}`);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable) showToast(`⏳ 업로드 중... ${Math.round(e.loaded/e.total*100)}%`);
    };
    xhr.onload = ()=>{
      try{
        const data = JSON.parse(xhr.responseText);
        if(data.secure_url){
          const optimUrl = data.secure_url.replace('/upload/','/upload/q_auto,f_auto,w_600/');
          resolve({url:optimUrl, publicId:data.public_id, uploadedAt:Date.now(), expireAt});
        } else {
          if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1));
          else{ showToast(`업로드 오류: ${data.error?.message||'알 수 없는 오류'}`); resolve(null); }
        }
      }catch(e){ resolve(null); }
    };
    xhr.onerror = ()=>{ if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1)); else{ showToast('업로드 실패'); resolve(null); } };
    xhr.ontimeout = ()=>{ if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1)); else{ showToast('업로드 시간 초과'); resolve(null); } };
    xhr.timeout = 30000;
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
    xhr.send(fd);
  });
  const results = await Promise.all(files.map(f=>uploadOne(f)));
  uploaded.push(...results.filter(Boolean));

  if(uploaded.length === 0){ showToast('업로드 실패'); return; }

  // Firebase에 저장
  try{
    const existing = await dbGet(`votes/${vid}/images/${myKey}`) || [];
    const merged = [...existing, ...uploaded];
    await dbSet(`votes/${vid}/images/${myKey}`, merged);
  }catch(e){
    showToast(`저장 실패: ${e.message}`);
    return;
  }

  // 출석 자동 기록 — recordAttendance 규칙으로 통일 (시작+완료 둘 다 해야 완료)
  const v = await dbGet(`votes/${vid}`);
  if(v && v.group && v.date){
    // 이미지 제출도 하나의 응답으로 보고, 그 투표의 내 선택지(없으면 완료로 간주)로 기록 처리
    const myIdx = v.responses?.[myKey];
    await recordAttendance(vid, (myIdx!==undefined?myIdx:0), myKey);
  }

  input.value = '';
  showSubmitDonePopup(groups[v?.group]?.name||'', _voteKindOf(v), uploaded.length);

  // 시크릿 등 이미지 완료투표: 저장 개수 인식 → 참여자(연차제외) 비교
  if(v && v.imageUpload){
    try{
      showToast('🔎 저장 개수 인식 중...');
      const [cnt, P] = await Promise.all([ countSavedPostsMulti(files), getParticipantCount(v) ]);
      if(cnt.ocr>0){
        // 'N개' 글자 인식됨(헤더 총개수) → 자동 판정
        const ok = (P===0) || (cnt.ocr>=P);
        await dbSet(`votes/${vid}/saveCount/${myKey}`, { n:cnt.ocr, ocr:cnt.ocr, grid:cnt.grid, P, ok, status:'auto', caps:files.length, by:CU?.name||'', at:Date.now() });
        if(!ok){
          showBigAlert('⚠️','저장 개수 부족', `인식된 저장 개수: ${cnt.ocr}개\n참여자(연차 제외): ${P}명\n\n저장 개수가 참여자 수보다 적어요.\n다시 확인해 주세요. (제출은 됐어요)`);
        } else {
          showToast(`✅ 저장 ${cnt.ocr}개 / 참여자 ${P}명 · 충족`);
        }
      } else {
        // 'N개' 글자 없음 → 자동 판정 보류, 관리자 확인 필요 (격자 합산은 참고로 저장)
        await dbSet(`votes/${vid}/saveCount/${myKey}`, { n:0, ocr:0, grid:cnt.grid, P, ok:null, status:'review', caps:files.length, by:CU?.name||'', at:Date.now() });
        showBigAlert('🔎','관리자 확인 필요', `'저장된 게시물 N개' 글자가 안 보여서\n개수를 자동 인식하지 못했어요.\n(올린 캡쳐 ${files.length}장 · 격자 추정 ${cnt.grid}개)\n\n관리자가 직접 확인할 거예요.\n('게시물 N개'가 보이게 캡쳐하면\n자동으로 확인돼요)`);
      }
    }catch(e){ console.warn('saveCount',e); }
  }

  // 화면 새로고침
  if(_currentTab==='home') loadHome();
  else if(_currentTab==='dept') loadDeptPage(_currentDept);
}

// 임의 멤버(targetKey) 대상 투표 취소 — 경품/연차 복구 + 현황 재계산까지 동일 처리
async function cancelVoteFor(vid, myKey, linkKey){
  const key = linkKey || myKey;
  const v=await dbGet(`votes/${vid}`);
  if(!v || v.responses?.[myKey]===undefined) {
    // 응답이 없으면 링크만 정리하고 종료
    if(v){ await dbDelete(`votes/${vid}/links/${key}`); await dbDelete(`votes/${vid}/links/${key}_1`); await dbDelete(`votes/${vid}/links/${key}_2`); }
    return;
  }
  let wasLeave=false, wasTupide=false;
  const usedDate = getTitleDate(v)||todayStr;
  const prevOptText=(v.options?.[v.responses[myKey]]||'').toLowerCase();
  wasLeave=prevOptText.includes('프패')||prevOptText.includes('연차')||prevOptText.includes('프리패스');
  wasTupide=prevOptText.includes('투피드')||prevOptText.includes('두배');

  if(wasLeave){
    try{
      const gmKey=await _gameKeyFor(myKey, v.group);
      if(gmKey){
        const usedType = v.leaveUsed?.[myKey];
        if(usedType==='prize'){
          const prizesRaw=await gameGet(`memberPrizes/${gmKey}`);
          if(Array.isArray(prizesRaw)){
            const idx=prizesRaw.findIndex(p=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
            if(idx>=0){const arr=[...prizesRaw];arr[idx]={...arr[idx],deducted:false,usedDate:null};await gameSet(`memberPrizes/${gmKey}`,arr);}
          }else if(prizesRaw){
            const found=Object.entries(prizesRaw).find(([k,p])=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
            if(found){await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,null);}
          }
          showToast('↩️ 경품 연차 복구됨');
        }else{
          const cur=await gameGet(`memberLeave/${gmKey}`)||0;
          await gameSet(`memberLeave/${gmKey}`,cur+1);
          await gamePush(`leaveLog/${gmKey}`,{type:'give',amount:1,date:usedDate,memo:'출석 취소 연차 복구',time:Date.now()});
          showToast('↩️ 연차 복구됨');
        }
        await dbDelete(`votes/${vid}/leaveUsed/${myKey}`);
      }
    }catch(e){}
  }

  await dbDelete(`votes/${vid}/responses/${myKey}`);
  // 취소 이력 보존 (관리자 확인용): 삭제 전 링크·선택지 기록
  try{
    const _prevLinks=[];
    [key, key+'_1', key+'_2'].forEach(k=>{ const L=v.links?.[k]; if(L&&L.url) _prevLinks.push({url:L.url, id:L.id||'', type:L.type||'normal'}); });
    const _logId=String(myKey).replace(/[^a-zA-Z0-9가-힣]/g,'')+'_'+Date.now();
    await dbSet(`votes/${vid}/cancelLog/${_logId}`, { nick:myKey, opt:(v.options?.[v.responses?.[myKey]]||prevOptText||''), links:_prevLinks, at:Date.now(), by:(CU?.name||'?') });
  }catch(e){ console.warn('cancelLog',e); }
  // 취소 기록 — 이 투표 재선택은 노피드만 허용 (연차 차감/복구와 무관, 비관리자만)
  if(CU?.role!=='admin'){ try{ const _pc=v.canceled?.[myKey]; await dbSet(`votes/${vid}/canceled/${myKey}`, { count:((_pc&&_pc.count)||0)+1, at:Date.now() }); }catch(e){} }
  await dbDelete(`votes/${vid}/links/${key}`);
  await dbDelete(`votes/${vid}/links/${key}_1`);
  await dbDelete(`votes/${vid}/links/${key}_2`);

  if(wasTupide){ await reconcileTupide(v.group, usedDate, myKey); }
  await recomputeAttendance(v.group, getTitleDate(v), myKey);

  if(!wasLeave && !wasTupide) showToast('투표 취소됨');
  if(_currentTab==='home') loadHome();
  else if(_currentTab==='dept') loadDeptPage(_currentDept);
}

async function diagAtt(gid, mname){

  Object.entries(votes).forEach(([vid,v])=>{

    const myK = keys.find(k=>v.responses?.[k]!==undefined);

    out += `• [${kind}] ${t}\n  응답: ${myK?('('+(v.options||[])[v.responses[myK]]+')'):'없음'}${myImg?' +이미지':''}\n\n`;

    if(mem[mname]?.[targetDate]!==undefined) out += `attendance값 = ${mem[mname][targetDate]}\n`;
  });
  alert(out);
}

async function recomputeAttendance(gid, date, myKey){
  try{
    if(!gid||!date) return;
    const mondayStr = getWeekKey(date);
    const allVotes = await dbGet('votes') || {};
    let startResult=null, endResult=null;
    let startVoteExists=false; // 그날 그룹에 시작투표가 존재하는지
    for(const sv of Object.values(allVotes)){
      if(!sv || sv.deleted || sv.group!==gid) continue;
      let sdate = getTitleDate(sv) || sv.date;
      if(sdate!==date) continue;
      const idx = sv.responses?.[myKey];
      const sImgs = sv.images?.[myKey] || [];
      const title=sv.title||'';
      const sIsStart=title.includes('시작')||title.includes('출근');
      const sIsEnd=!sIsStart && (title.includes('완료')||title.includes('퇴근')||title.includes('마감'));
      if(sIsStart) startVoteExists=true;
      let r=(idx!==undefined&&idx!==null)?mapVoteResult((sv.options||[])[idx]||''):null;
      if(sIsEnd && sImgs.length>0 && !r) r='완료';
      if(sIsStart && r!==null) startResult=r;
      if(sIsEnd && r!==null) endResult=r;
    }
    let finalResult;
    if(startResult==='프패'||endResult==='프패') finalResult='프패';
    else if(startResult && endResult){
      const special=['봉사','노피드','투피드'].find(s=>s===endResult||s===startResult);
      finalResult=special||'완료';
    } else if(endResult && !startVoteExists){
      // 시작투표가 아예 없는 날(옛 방식: 완료투표 단독) → 완료투표만으로 완료 인정
      const special=['봉사','노피드','투피드'].find(s=>s===endResult);
      finalResult=special||'완료';
    } else if(startResult||endResult){
      finalResult='참여'; // 시작/완료 중 하나만 (둘 다 있어야 하는 날)
    } else finalResult=null;
    if(finalResult) await dbSet(`attendance/${gid}/${mondayStr}/${myKey}/${date}`, finalResult);
    else await dbDelete(`attendance/${gid}/${mondayStr}/${myKey}/${date}`);
  }catch(e){}
}

// 오락실 멤버 키 찾기 (그룹명+닉네임 매칭)
async function _gameKeyFor(myKey, group){
  const gameMembers = await gameGet('members');
  if(!gameMembers) return null;
  const gName = groups[group]?.name||'';
  const entries = Object.entries(gameMembers);
  let hit = entries.find(([k,m])=>{
    const clean=(m.name||'').replace(/^\*/,'');
    return clean===(gName+myKey);
  });
  if(!hit) hit = entries.find(([k,m])=>{
    const clean=(m.name||'').replace(/^\*/,'');
    return clean===myKey;
  });
  return hit?hit[0]:null;
}

// 연차 현황: 수동(memberLeave 숫자) + 경품 연차(memberPrizes 중 이름에 '연차') 합산.
// 가장 오래 적립된 출처를 판별해서 차감 순서를 정함.
async function _leaveInfo(gmKey){
  const [manualRaw, prizesRaw, logRaw] = await Promise.all([
    gameGet(`memberLeave/${gmKey}`),
    gameGet(`memberPrizes/${gmKey}`),
    gameGet(`leaveLog/${gmKey}`)
  ]);
  const manual = manualRaw||0;
  const isArr = Array.isArray(prizesRaw);
  const prizeUnits = prizesRaw
    ? (isArr ? prizesRaw.map((p,i)=>({p,ref:i})) : Object.entries(prizesRaw).map(([k,p])=>({p,ref:k})))
    : [];
  const leavePrizes = prizeUnits
    .filter(x=>x.p&&!x.p.deducted&&(x.p.name||'').includes('연차'))
    .sort((a,b)=>(a.p.time||0)-(b.p.time||0)); // 오래된 순
  const oldestPrizeTime = leavePrizes.length ? (leavePrizes[0].p.time||0) : Infinity;
  // 수동 연차 최초 적립 시각(give 로그 중 가장 이른 것). 기록 없으면 0(가장 오래된 것으로 간주)
  let manualRepTime = Infinity;
  if(manual>0){
    manualRepTime = 0;
    if(logRaw){
      const gives = Object.values(logRaw).filter(l=>l&&l.type==='give'&&l.time);
      if(gives.length) manualRepTime = Math.min(...gives.map(l=>l.time));
    }
  }
  return {manual, isArr, prizesRaw, leavePrizes, oldestPrizeTime, manualRepTime, total: manual + leavePrizes.length};
}

// 투피드 경품 정합: 같은 날(dayKey)·같은 그룹에서 이 멤버가 투피드를 고른 투표가
// 하나라도 있으면 경품 1개만 차감(usedDate=dayKey), 하나도 없으면 그날 차감분 복구.
// → 시작/완료 둘 다 골라도 1개만 차감됨.
async function reconcileTupide(group, dayKey, myKey){
  try{
    const allV = await dbGet('votes') || {};
    let active = false;
    for(const sv of Object.values(allV)){
      if(!sv || sv.deleted || sv.group!==group) continue;
      if(getTitleDate(sv)!==dayKey) continue;
      const idx = sv.responses?.[myKey];
      if(idx===undefined||idx===null) continue;
      const t=(sv.options?.[idx]||'').toLowerCase();
      if(t.includes('투피드')||t.includes('두배')){ active=true; break; }
    }
    const gmKey = await _gameKeyFor(myKey, group);
    if(!gmKey) return;
    const prizesRaw = await gameGet(`memberPrizes/${gmKey}`);
    if(!prizesRaw) return;
    if(Array.isArray(prizesRaw)){
      const arr=[...prizesRaw];
      const deductedIdxs=arr.map((p,i)=>({p,i})).filter(x=>x.p&&x.p.deducted&&(x.p.name||'').includes('투피드')&&x.p.usedDate===dayKey).map(x=>x.i);
      if(active && deductedIdxs.length===0){
        const idx=arr.findIndex(p=>p&&!p.deducted&&(p.name||'').includes('투피드'));
        if(idx>=0){arr[idx]={...arr[idx],deducted:true,usedDate:dayKey};await gameSet(`memberPrizes/${gmKey}`,arr);showToast('☕ 투피드 경품 1개 사용 처리됨');}
      } else if(!active && deductedIdxs.length>0){
        deductedIdxs.forEach(i=>{arr[i]={...arr[i],deducted:false,usedDate:null};});
        await gameSet(`memberPrizes/${gmKey}`,arr);
        showToast('↩️ 투피드 경품 복구됨');
      } else if(active && deductedIdxs.length>1){
        // 혹시 그날 2개 이상 차감돼 있으면 1개만 남기고 복구
        deductedIdxs.slice(1).forEach(i=>{arr[i]={...arr[i],deducted:false,usedDate:null};});
        await gameSet(`memberPrizes/${gmKey}`,arr);
      }
    } else {
      const entriesArr=Object.entries(prizesRaw);
      const deductedKeys=entriesArr.filter(([k,p])=>p&&p.deducted&&(p.name||'').includes('투피드')&&p.usedDate===dayKey).map(([k])=>k);
      if(active && deductedKeys.length===0){
        const found=entriesArr.find(([k,p])=>p&&!p.deducted&&(p.name||'').includes('투피드'));
        if(found){await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,true);await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,dayKey);showToast('☕ 투피드 경품 1개 사용 처리됨');}
      } else if(!active && deductedKeys.length>0){
        for(const k of deductedKeys){await gameSet(`memberPrizes/${gmKey}/${k}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${k}/usedDate`,null);}
        showToast('↩️ 투피드 경품 복구됨');
      } else if(active && deductedKeys.length>1){
        for(const k of deductedKeys.slice(1)){await gameSet(`memberPrizes/${gmKey}/${k}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${k}/usedDate`,null);}
      }
    }
  }catch(e){}
}

// 선택지 클릭: 봉사/노피드는 즉시 저장, 그 외(참여/완료/연차/투피드)는 임시선택만
async function pickVoteOption(vid, optIdx){
  const v = await dbGet(`votes/${vid}`);
  if(!v){ showToast('투표를 찾을 수 없습니다'); return; }
  const optText = (v.options?.[optIdx]||'').toLowerCase();
  const isBonusOnly = optText.includes('봉사')||optText.includes('열정페이')||optText.includes('노피드')||optText.includes('재능기부');
  // 완료(마감) 투표는 링크 없이 선택지만 → 누르면 바로 저장
  const isEndVote = (v.title||'').includes('완료')||(v.title||'').includes('퇴근')||(v.title||'').includes('마감');
  if(isBonusOnly || isEndVote){
    // 링크 불필요 → 바로 저장
    await castVote(vid, optIdx);
    if(window._pendingVote) delete window._pendingVote[vid];
    if(window._castVoteOK !== false){
      showSubmitDonePopup(groups[v?.group]?.name||'', _voteKindOf(v), 0);
    }
    return;
  }
  // 임시 선택만 (화면 표시). [투표 제출] 눌러야 실제 저장
  window._pendingVote = window._pendingVote || {};
  window._pendingVote[vid] = optIdx;
  try{
    // 입력해둔 아이디/링크 값 보존 (카드를 다시 그리면 입력칸이 비워지는 문제 방지)
    const _ids=[`linkId_${vid}`,`linkUrl_${vid}`,`linkUrl_${vid}_1`,`linkUrl_${vid}_2`];
    const _keep={};
    _ids.forEach(id=>{ const e=document.getElementById(id); if(e) _keep[id]=e.value; });
    const el=document.getElementById(`voteDetail_${vid}`);
    if(el){ el.innerHTML = await renderVoteCard(vid, v); }
    // 다시 그린 뒤 값 복원
    _ids.forEach(id=>{ const e=document.getElementById(id); if(e && _keep[id]) e.value=_keep[id]; });
  }catch(e){}
  showToast('선택됨 · 링크 입력 후 [투표 제출]을 눌러주세요');
}

// 최종 제출: 임시선택(선택지) + 링크를 한 번에 저장
async function submitVote(vid){
  const pending = window._pendingVote ? window._pendingVote[vid] : undefined;
  const v = await dbGet(`votes/${vid}`);
  if(!v){ showToast('투표를 찾을 수 없습니다'); return; }
  const myKey = CU?.name||CU?.key||'admin';
  // 이미 저장된 선택이 있고 새 임시선택이 없으면 → 링크만 제출
  const already = v.responses?.[myKey];
  const optIdx = (pending!==undefined) ? pending : already;
  if(optIdx===undefined || optIdx===null){
    showToast('⚠️ 먼저 선택지를 골라주세요'); return;
  }
  const optText = (v.options?.[optIdx]||'').toLowerCase();
  const isBonusOnly = optText.includes('봉사')||optText.includes('열정페이')||optText.includes('노피드')||optText.includes('재능기부');

  // 링크 값을 먼저 다 읽어둔다 (castVote가 화면을 다시 그려도 값이 안 날아가게)
  let preData = null;
  if(!isBonusOnly){
    // 선택지로 링크 타입 자동 판단 (드랍박스 제거됨)
    let type='normal';
    if(optText.includes('투피드')||optText.includes('두배')) type='tupide';
    else if(optText.includes('연차')||optText.includes('프패')||optText.includes('프리패스')) type='leave';
    else if(optText.includes('봉사')||optText.includes('열정페이')) type='bonus';
    else if(optText.includes('당직')) type='duty';
    const isTup = type==='tupide';
    if(isTup){
      const u1=document.getElementById(`linkUrl_${vid}_1`)?.value.trim()||'';
      const u2=document.getElementById(`linkUrl_${vid}_2`)?.value.trim()||'';
      if(!u1&&!u2){ showToast('⚠️ 링크를 입력해주세요 (선택지+링크 둘 다 필요해요)'); return; }
      preData = {
        type:'tupide',
        id: document.getElementById(`linkId_${vid}`)?.value.trim()||'',
        url1:u1, note1:document.getElementById(`linkNote_${vid}_1`)?.value.trim()||'',
        url2:u2, note2:document.getElementById(`linkNote_${vid}_2`)?.value.trim()||''
      };
    } else {
      const u=document.getElementById(`linkUrl_${vid}`)?.value.trim()||'';
      if(!u){ showToast('⚠️ 링크를 입력해주세요 (선택지+링크 둘 다 필요해요)'); return; }
      preData = {
        type: type||'normal',
        id: document.getElementById(`linkId_${vid}`)?.value.trim()||'',
        url:u, note:document.getElementById(`linkNote_${vid}`)?.value.trim()||''
      };
    }
  }

  // 아이디 검사 (저장 전) — 비었거나 한글/이상문자면 막고 안내, @는 떼고 저장
  if(!isBonusOnly && preData){
    const _idChk = normalizeIgId(preData.id);
    if(!_idChk.ok){ showIgIdError(_idChk.err); return; }
    preData.id = _idChk.id;
  }

  // 1) 선택지 저장 (임시선택이 있을 때만)
  if(pending!==undefined){
    await castVote(vid, optIdx);
    if(window._pendingVote) delete window._pendingVote[vid];
    // castVote가 정원초과·연차소진 등으로 막혔으면 → 링크 저장도, 완료 팝업도 하지 않음
    if(window._castVoteOK === false){
      return;
    }
  }
  // 2) 링크 저장 (미리 읽어둔 preData 사용 — DOM이 사라져도 안전)
  if(!isBonusOnly && preData){
    await submitVoteLinkNew(vid, true, preData);
  }
  const _gn = groups[v?.group]?.name || '';
  showSubmitDonePopup(_gn, _voteKindOf(v), 0);
  if(_currentTab==='home')loadHome(); else if(_currentTab==='dept')loadDeptPage(_currentDept);
}

function _voteKindOf(v){
  const t=(v&&v.title)||'';
  if(t.includes('시작')||t.includes('출근')) return 'start';
  if(t.includes('완료')||t.includes('마감')||t.includes('퇴근')) return 'end';
  if(v&&v.imageUpload) return 'end';
  return null;
}

  if(!enough){ h += `<div style="text-align:center;font-size:11px;color:#E8927C;margin-top:8px">최소 인원(${_drawMinCount}명)에 미달해서 추첨할 수 없어요</div>`; }

  // 카드 영역 + 결과
  h += `<div id="drawCardArea" style="margin-top:16px"></div>`;
  h += `<div id="drawResult" style="margin-top:14px"></div>`;

  // 최소 인원 설정 (관리자용 작은 링크)
  h += `<div style="text-align:center;margin-top:14px"><span onclick="setDrawMin()" style="font-size:11px;color:var(--text3);text-decoration:underline;cursor:pointer">⚙️ 최소 인원 설정 (현재 ${_drawMinCount}명)</span></div>`;

  h += `</div>`;
  m.innerHTML = h;
}

async function runCardDraw(){
  const cntEl=document.getElementById('drawPickCount');
  let pick=parseInt(cntEl?.value)||1;
  // 최근 N회(같은 그룹) 당첨자 제외 — 같은 사람 반복 당첨 방지
  const RECENT_N = 3;
  let _excludeRecent = new Set();
  try{
    const hist = await dbGet('drawHistory');
    if(hist){
      const arr = Object.values(hist).filter(h=>h && h.group===_drawGroup).sort((a,b)=>(b.at||0)-(a.at||0));
      arr.slice(0, RECENT_N).forEach(h=>(h.winners||[]).forEach(w=>_excludeRecent.add(w)));
    }
  }catch(e){}
  // 제외 적용. 단 후보가 1명 미만으로 줄면 제외 해제(안전장치)
  let baseCands = _drawCands.filter(n=>!_excludeRecent.has(n));
  if(baseCands.length < 1) baseCands = [..._drawCands];
  pick=Math.max(1,Math.min(pick, baseCands.length));
  // 당첨자 랜덤 선정 (Fisher-Yates)
  const pool=[...baseCands];
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const winners=pool.slice(0,pick);
  const winSet=new Set(winners);

  // 카드 깔기 (다 뒷면)
  const area=document.getElementById('drawCardArea');
  const resEl=document.getElementById('drawResult');
  if(resEl) resEl.innerHTML='';
  if(!area)return;
  let cardsHtml=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:7px">`;
  _drawCands.forEach((n,i)=>{
    cardsHtml+=`<div id="dcard_${i}" style="aspect-ratio:3/4;border-radius:8px;background:linear-gradient(135deg,#A78BFA,#FF85C1);display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform 0.4s;transform-style:preserve-3d;position:relative">`;
    cardsHtml+=`<span class="dcback" style="position:absolute">🂠</span>`;
    cardsHtml+=`<span class="dcfront" style="position:absolute;display:none;font-size:10px;font-weight:800;color:#fff;text-align:center;padding:2px;line-height:1.1">${escH(n)}</span>`;
    cardsHtml+=`</div>`;
  });
  cardsHtml+=`</div>`;
  area.innerHTML=cardsHtml;

  // 셔플 흔들기 애니메이션 후 당첨 카드 뒤집기
  const allCards=_drawCands.map((n,i)=>({n,i}));
  // 살짝 흔들기
  allCards.forEach(({i})=>{ const c=document.getElementById('dcard_'+i); if(c){ c.style.transform='scale(0.92)'; } });
  await new Promise(r=>setTimeout(r,350));
  allCards.forEach(({i})=>{ const c=document.getElementById('dcard_'+i); if(c){ c.style.transform='scale(1)'; } });
  await new Promise(r=>setTimeout(r,300));

  // 당첨 카드만 순서대로 뒤집기
  for(let i=0;i<_drawCands.length;i++){
    if(winSet.has(_drawCands[i])){
      const c=document.getElementById('dcard_'+i);
      if(c){
        c.style.transform='rotateY(180deg) scale(1.1)';
        c.style.background='linear-gradient(135deg,#FFD86E,#FF9F43)';
        c.style.boxShadow='0 4px 14px rgba(255,159,67,0.5)';
        const back=c.querySelector('.dcback'); const front=c.querySelector('.dcfront');
        if(back)back.style.display='none';
        if(front){ front.style.display='block'; front.style.transform='rotateY(180deg)'; }
        await new Promise(r=>setTimeout(r,400));
        c.style.transform='rotateY(180deg) scale(1)';
      }
    } else {
      const c=document.getElementById('dcard_'+i);
      if(c){ c.style.opacity='0.35'; }
    }
  }

  // 결과 표시
  if(resEl){
    let rh=`<div style="background:linear-gradient(135deg,#FFF4D6,#FFE0EC);border-radius:14px;padding:16px;text-align:center">`;
    rh+=`<div style="font-size:13px;font-weight:700;color:#FF9F43;margin-bottom:8px">🎉 당첨!</div>`;
    rh+=`<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">`;
    winners.forEach(w=>{ rh+=`<span style="background:#fff;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:900;color:#FF6B9D;box-shadow:0 2px 6px rgba(0,0,0,0.1)">✨ ${escH(w)}</span>`; });
    rh+=`</div></div>`;
    resEl.innerHTML=rh;
  }
  // 당첨자 기록 저장 (설정 → 당첨 기록에서 확인)
  try{
    const rec = { at:Date.now(), group:_drawGroup, winners, by:CU?.name||'' };
    await dbPush('drawHistory', rec);
  }catch(e){}
  // 당첨자 확인 팝업 (스크롤·깜빡 방지)
  setTimeout(()=>showWinnerPopup(_drawGroup, winners), 1200);
}
