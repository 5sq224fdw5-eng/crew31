// ── CHAT LOCK (관리자) ──
// ══════════════════════════════════════════════
async function toggleChatLock(type,id){
  if(CU?.role!=='admin'){showToast('관리자만 가능합니다');return;}
  if(type==='dept'){
    const g=groups[id];if(!g)return;
    if(g.lock){
      openGroupLockModal(id,'unlock');
    }else{
      openGroupLockModal(id,'lock');
    }
  }else if(type==='all'){
    const cur=await dbGet('chatLock/all');
    if(cur){await dbSet('chatLock/all',null);showToast('🔓 전체 채팅 잠금 해제');}
    else{await dbSet('chatLock/all',true);showToast('🔒 전체 채팅 잠금');}
    loadChatTab();
  }
}

async function sendDM(){
  const inp=document.getElementById('dmInput');
  const body=inp?.value.trim();
  if(!body||!_currentChatRoom)return;
  inp.value='';
  const msg={body,senderName:CU.name,senderKey:CU.key||'admin',senderRole:CU.role,time:Date.now()};
  const path=getChatPath(_currentChatRoom);
  await dbPush(path,msg);
  fetchChatMessages();
}

// ── CALENDAR ──
// ══════════════════════════════════════════════
let _calGroup = 'all'; // 선택된 캘린더 그룹

async function renderCalendar(){
  if(!calY||!calM&&calM!==0){
    calY=new Date().getFullYear();
    calM=new Date().getMonth();
    calSel=calSel||new Date().toISOString().slice(0,10);
  }
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';
  const y=calY,m=calM;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  // 공지 이벤트 + 출석 데이터 동시 로드 (전체 한 번에)
  const [evts, allAttendance] = await Promise.all([
    dbGet('calEvents'),
    dbGet('attendance')  // 관리자/사원 모두 전체 로드 (캐시 효율)
  ]);
  const evList=Object.entries(evts||{}).filter(([k,e])=>!e.deleted);

  const monthStr = `${y}-${String(m+1).padStart(2,'0')}`;
  const dateAttMap = {};

  if(allAttendance){
    Object.entries(allAttendance).forEach(([gid, weeks])=>{
      const gname = groups[gid]?.name || gid;
      // 그룹 필터 적용
      if(_calGroup !== 'all' && gid !== _calGroup) return;
      Object.entries(weeks).forEach(([wk, members])=>{
        Object.entries(members).forEach(([mname, dates])=>{
          if(!isAdmin && mname !== CU?.name) return;
          Object.entries(dates).forEach(([date, result])=>{
            if(!date.startsWith(monthStr)) return;
            if(!dateAttMap[date]) dateAttMap[date]=[];
            dateAttMap[date].push({name:mname, result, group:gname, gid});
          });
        });
      });
    });
  }

  const resultColor={'완료':'#5DB88A','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b'};

  let html='<div style="padding-bottom:60px">';
  // 그룹 필터 탭
  html+=`<div style="display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none">`;
  html+=`<button onclick="setCalGroup('all')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${_calGroup==='all'?'#FF85C1':'#FFE8F3'};color:${_calGroup==='all'?'white':'#FF85C1'}">전체</button>`;
  Object.entries(groups).forEach(([gid,g])=>{
    const isActive = _calGroup===gid;
    html+=`<button onclick="setCalGroup('${gid}')" style="flex:0 0 auto;padding:5px 12px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:${isActive?'#f87286':'#fde8eb'};color:${isActive?'white':'#f87286'}">${escH(g.name)}</button>`;
  });
  html+=`</div>`;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px">`;
  html+=`<button onclick="calNav(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">‹</button>`;
  html+=`<div style="font-size:16px;font-weight:800">${y}년 ${m+1}월</div>`;
  html+=`<button onclick="calNav(1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px">›</button>`;
  html+=`</div>`;
  html+=`<div class="cal-head">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    html+=`<div class="cal-dh" style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--text3)'}">${d}</div>`;
  });
  html+=`</div>`;
  // 그룹 색상 범례
  const sortedGroupsLegend = Object.entries(groups).sort((a,b)=>(a[1].order??999)-(b[1].order??999));
  html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 8px">`;
  sortedGroupsLegend.forEach(([gid,g])=>{
    const c=g.color||'var(--accent)';
    html+=`<div style="display:flex;align-items:center;gap:4px">`;
    html+=`<div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>`;
    html+=`<span style="font-size:10px;color:var(--text3);font-weight:600">${escH(g.name)}</span>`;
    html+=`</div>`;
  });
  html+=`</div>`;

  html+=`<div class="cal-grid">`;
  for(let i=0;i<first;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===calSel;
    const dayEvts=evList.filter(([k,e])=>e.date===ds);
    const dayAtt=dateAttMap[ds]||[];
    const dow=(first+d-1)%7;
    html+=`<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}" onclick="calSelect('${ds}')">`;
    html+=`<div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>`;
    if(dayEvts.length) html+=`<div class="cal-dot"></div>`;
    // 출석 도트 (그룹별 색상)
    if(dayAtt.length>0){
      if(!isAdmin){
        const r=dayAtt[0]?.result||'';
        const gid=dayAtt[0]?.gid||'';
        const c=groups[gid]?.color||resultColor[r]||'var(--accent)';
        html+=`<div style="width:6px;height:6px;border-radius:50%;background:${c};margin:1px auto"></div>`;
      } else {
        // 관리자: 그룹별 색 도트들
        const gids=[...new Set(dayAtt.map(a=>a.gid).filter(Boolean))];
        html+=`<div style="display:flex;gap:2px;justify-content:center;flex-wrap:wrap">`;
        gids.forEach(gid=>{
          const c=groups[gid]?.color||'var(--accent)';
          html+=`<div style="width:5px;height:5px;border-radius:50%;background:${c}"></div>`;
        });
        html+=`</div>`;
      }
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 선택 날짜 상세
  if(calSel){
    const selEvts=evList.filter(([k,e])=>e.date===calSel);
    const selAtt=dateAttMap[calSel]||[];
    html+=`<div style="padding:0 14px 10px">`;
    html+=`<div style="font-size:13px;font-weight:800;color:var(--text2);margin:8px 0">${calSel}</div>`;

    // 출석 내역
    if(selAtt.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">📋 출석 현황</div>`;
      if(!isAdmin){
        selAtt.forEach(a=>{
          const gid=a.gid||'';
          const c=groups[gid]?.color||resultColor[a.result]||'#ccc';
          const gName=groups[gid]?.name||'';
          html+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:${c}22;border-radius:10px;margin:0 4px 4px 0">`;
          html+=`<div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>`;
          html+=`<span style="font-size:12px;font-weight:700;color:${c}">${gName}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3)">${a.result}</span>`;
          html+=`</div>`;
        });
      } else {
        // 관리자: 그룹별 집계
        const byGroup={};
        selAtt.forEach(a=>{
          if(!byGroup[a.group]) byGroup[a.group]={};
          if(!byGroup[a.group][a.result]) byGroup[a.group][a.result]=[];
          byGroup[a.group][a.result].push(a.name);
        });
        Object.entries(byGroup).forEach(([gname, results])=>{
          const gid = Object.keys(groups).find(id=>groups[id].name===gname);
          const gcolor = groups[gid]?.color || '#FF85C1';
          const totalCount = Object.values(results).reduce((s,n)=>s+n.length,0);
          html+=`<div style="margin-bottom:10px;background:white;border-radius:12px;padding:10px 12px;border:1px solid var(--border)">`;
          html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">`;
          html+=`<span style="width:8px;height:8px;border-radius:50%;background:${gcolor};display:inline-block"></span>`;
          html+=`<span style="font-size:12px;font-weight:800">${gname}</span>`;
          html+=`<span style="font-size:11px;color:var(--text3);margin-left:auto">총 ${totalCount}명</span>`;
          html+=`</div>`;
          Object.entries(results).forEach(([result, names])=>{
            const c=resultColor[result]||'#ccc';
            html+=`<div style="margin-bottom:6px">`;
            html+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">`;
            html+=`<span style="background:${c}22;color:${c};padding:2px 8px;border-radius:8px;font-weight:700;font-size:11px">${result} ${names.length}명</span>`;
            html+=`</div>`;
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
            names.forEach(name=>{
              html+=`<span style="background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${escH(name)}</span>`;
            });
            html+=`</div></div>`;
          });
          html+=`</div>`;
        });
      }
    }

    // 공지 이벤트
    if(selEvts.length>0){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin:8px 0 6px">📢 일정</div>`;
      selEvts.forEach(([eid,e])=>{
        html+=`<div style="background:white;border-radius:12px;padding:10px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">`;
        html+=`<div><div style="font-size:14px;font-weight:700">${escH(e.title||'')}</div>`;
        if(e.desc)html+=`<div style="font-size:11px;color:var(--text3)">${escH(e.desc)}</div>`;
        html+=`</div>`;
        if(isAdmin)html+=`<button class="vbtn del" onclick="delCalEvent('${eid}')">🗑</button>`;
        html+=`</div>`;
      });
    }

    if(selEvts.length===0&&selAtt.length===0){
      html+=`<div style="font-size:13px;color:var(--text3);padding:8px 0">일정 없음</div>`;
    }

    if(isAdmin){
      html+=`<div style="margin-top:8px;display:flex;gap:8px">`;
      html+=`<input id="calEvtTitle" class="fi" placeholder="일정 제목" style="flex:1;padding:8px 12px">`;
      html+=`<button class="btn-sm pri" onclick="addCalEvent()">추가</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+='</div>';
  mb.innerHTML=html;
}

// 해당 월의 주 월요일 키 목록
function getMonthWeekKeys(y, m){
  const keys=new Set();
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    keys.add(getWeekKey(ds));
  }
  return [...keys];
}

function toggleNonVoterDrop(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById(id+'_arrow');
  if(!el)return;
  const open=el.style.display==='none'||el.style.display==='';
  el.style.display=open?'block':'none';
  if(arrow)arrow.textContent=open?'▾':'▸';
}

function setCalGroup(gid){
  _calGroup = gid;
  renderCalendar();
}

function calNav(dir){
  calM+=dir;
  if(calM>11){calM=0;calY++;}
  else if(calM<0){calM=11;calY--;}
  renderCalendar();
}
function calSelect(ds){calSel=ds;renderCalendar();}
async function addCalEvent(){
  const title=document.getElementById('calEvtTitle')?.value.trim();
  if(!title||!calSel){showToast('제목을 입력하세요');return;}
  await dbPush('calEvents',{title,date:calSel,createdBy:CU.name,createdAt:Date.now()});
  showToast('✅ 일정 추가됨');renderCalendar();
}
async function delCalEvent(eid){
  if(!confirm('삭제하시겠습니까?'))return;

// ══════════════════════════════════════════════
// ── DEPT PAGE ──
// ══════════════════════════════════════════════
async function loadDeptPage(gid){
  try{
  const mb=document.getElementById('mainBody');
  // 잠금 가드: 잠긴 그룹이고 아직 안 풀었으면 내용 표시 금지
  const gLock = groups[gid];
  if(gLock?.groupLock && CU?.role!=='admin' && !localStorage.getItem('groupUnlocked_'+gid)){
    mb.innerHTML=`<div class="empty" style="padding:60px 20px"><div class="empty-icon">🔒</div><div style="margin:10px 0 16px;color:var(--text3)">${escH(gLock.name||'')} 그룹은 잠겨있습니다.</div><button onclick="openGroupEntryLockModal('${gid}','unlock')" style="padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer">🔓 비밀번호 입력</button></div>`;
    return;
  }
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const isAdmin=CU?.role==='admin';
  const votes=await dbGet('votes');
  let rawList=votes
    ?Object.entries(votes)
      .filter(([k,v])=>!v.deleted&&(v.group===gid||v.group==='all'))
      .sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0))
    :[];
  // ── 중복 투표 표 합치기 (같은 그룹+제목) ── 데이터는 그대로 두고, 화면 표시용으로만 응답/링크/이미지를 병합
  // 같은 (group+title) 투표가 여러 개면 표가 갈라져 보이는 문제 방지. 대표 1개에 나머지 표를 합쳐서 보여줌.
  const mergeMap={};
  rawList.forEach(([vid,v])=>{
    const mkey=`${v.group}__${v.title}`;
    if(!mergeMap[mkey]) mergeMap[mkey]=[];
    mergeMap[mkey].push([vid,v]);
  });
  const list=[];
  Object.values(mergeMap).forEach(group=>{
    if(group.length===1){ list.push(group[0]); return; }
    // 대표 = 가장 최근(이미 정렬됨 → 첫 번째). 나머지 표를 대표에 병합한 사본 생성
    const [repVid, repV]=group[0];
    const merged={...repV,
      responses:{...(repV.responses||{})},
      responseTimes:{...(repV.responseTimes||{})},
      links:{...(repV.links||{})},
      images:{...(repV.images||{})},
      leaveUsed:{...(repV.leaveUsed||{})}
    };
    for(let i=1;i<group.length;i++){
      const ov=group[i][1];
      Object.assign(merged.responses, ov.responses||{});
      Object.assign(merged.responseTimes, ov.responseTimes||{});
      Object.assign(merged.links, ov.links||{});
      Object.assign(merged.images, ov.images||{});
      Object.assign(merged.leaveUsed, ov.leaveUsed||{});
    }
    list.push([repVid, merged]);
  });
  // 원래 정렬 유지
  list.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  // 그룹 색 → 연한 배경 (어느 그룹인지 한눈에)
  const _gColor = groups[gid]?.color || '#FF85C1';
  const _hex = _gColor.replace('#','');
  const _r = parseInt(_hex.slice(0,2),16), _gg = parseInt(_hex.slice(2,4),16), _b = parseInt(_hex.slice(4,6),16);
  const _bgTint = `rgba(${_r},${_gg},${_b},0.10)`;
  const _gName = groups[gid]?.name || '';
  let html=`<div style="padding:0 0 80px;background:${_bgTint};min-height:100vh">`;
  // 현재 그룹 표시 띠
  html+=`<div style="background:${_gColor};padding:11px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:5">`;
  html+=`<span style="font-size:16px">📍</span><span style="font-size:14px;font-weight:800;color:white">${escH(_gName)} 그룹</span></div>`;
  html+=`<div style="padding:14px 0">`;
  // ── 공지 슬라이드 배너 (사원만 표시, 이 그룹 + 전체 공지) ──
  if(!isAdmin) try{
    const allNotices = await dbGet('notices');
    const noticeList = allNotices
      ? Object.entries(allNotices)
          .filter(([k,n])=>n && !n.deleted && (!n.group || n.group==='all' || n.group===gid))
          .sort((a,b)=>(b[1].time||0)-(a[1].time||0))
      : [];
    if(noticeList.length>0){
      html+=`<div style="padding:0 14px 10px">`;
      html+=`<div id="noticeSlider_${gid}" style="background:#FF85C1;border-radius:12px;overflow:hidden">`;
      noticeList.forEach(([nid,n],i)=>{
        const body=(n.body||'').replace(/\n/g,' ');
        const preview=body.length>50?body.slice(0,50)+'...':body;
        html+=`<div class="noticeSlide_${gid}" data-idx="${i}" onclick="goNoticeTab()" style="display:${i===0?'flex':'none'};align-items:center;gap:8px;padding:13px 14px;cursor:pointer">`;
        html+=`<span style="font-size:18px;flex-shrink:0">📢</span>`;
        html+=`<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:800;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(n.title||'공지')}</div>`;
        html+=`<div style="font-size:11px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(preview)}</div></div>`;
        if(noticeList.length>1) html+=`<span style="font-size:10px;color:white;background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:10px;flex-shrink:0">${i+1}/${noticeList.length}</span>`;
        html+=`</div>`;
      });
      html+=`</div></div>`;
      if(noticeList.length>1) _startNoticeSlide(gid, noticeList.length);
    }
  }catch(e){}
  if(isAdmin){
    html+=`<div style="padding:0 14px 10px;display:flex;gap:8px">`;
    html+=`<button onclick="openVoteModal(null,'${gid}','start')" style="flex:1;background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌅 업무 시작</button>`;
    html+=`<button onclick="openVoteModal(null,'${gid}','end')" style="flex:1;background:#f87286;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🌙 업무 완료</button>`;
    html+=`</div>`;
  }
  if(list.length===0){
    mb.innerHTML=html+'<div class="empty"><div class="empty-icon">📋</div>이 부서의 투표가 없습니다</div></div>';return;
  }
  list.forEach(([vid2,v2])=>{
    const isClosed2 = v2.closed||(v2.date&&v2.time&&Date.now()>new Date(v2.date+'T'+v2.time).getTime());
    const resCount = v2.imageUpload 
      ? Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url!=='연차';}).length + Object.keys(v2.images||{}).filter(k=>{const imgs=v2.images[k];return imgs&&imgs.length>0&&imgs[0]?.url==='연차';}).length
      : Object.keys(v2.responses||{}).length;
    const isEnd2 = (v2.title||'').includes('완료')||v2.imageUpload;
    const badge = isEnd2 ? '🌙' : '🌅';
    html+=`<div style="background:white;border-radius:14px;margin:0 14px 8px;overflow:hidden;border:1px solid var(--border)">`;
    html+=`<div onclick="toggleVoteDetail('${vid2}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer">`;
    html+=`<div style="flex:1;min-width:0">`;
    html+=`<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${badge} ${escH(v2.title||'')}</div>`;
    html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${isClosed2?'🔒 마감':'⏰ 진행중'} · ${resCount}명 참여 · ${v2.date||''}</div>`;
    html+=`</div><span style="color:var(--text3);font-size:12px;margin-left:8px">▼</span>`;
    html+=`</div>`;
    html+=`<div id="voteDetail_${vid2}" style="display:none;border-top:1px solid var(--border)"></div>`;
    html+=`</div>`;
  });
  html+='</div>'; // padding:14px div
  html+='</div>'; // 그룹 색 배경 div
  mb.innerHTML=html;
  }catch(e){console.error('loadDeptPage error',e);mb.innerHTML='<div style="padding:20px;color:red">오류: '+e.message+'</div>';}
}

// 공지 자동 슬라이드 (위→아래로 순환)
let _noticeSlideTimers={};
function _startNoticeSlide(gid, count){
  if(_noticeSlideTimers[gid]) clearInterval(_noticeSlideTimers[gid]);
  let idx=0;
  _noticeSlideTimers[gid]=setInterval(()=>{
    const slides=document.querySelectorAll('.noticeSlide_'+gid);
    if(!slides.length){ clearInterval(_noticeSlideTimers[gid]); return; }
    slides.forEach(s=>s.style.display='none');
    idx=(idx+1)%count;
    if(slides[idx]) slides[idx].style.display='flex';
  }, 3500);
}

async function toggleVoteDetail(vid){
  const el = document.getElementById(`voteDetail_${vid}`);
  if(!el) return;
  if(el.style.display==='none'){
    el.style.display='block';
    el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
    const v = await dbGet(`votes/${vid}`);
    try{ el.innerHTML = await renderVoteCard(vid, v); }
    catch(e){ el.innerHTML=`<div style="padding:10px;color:red">오류: ${e.message}</div>`; }
  } else {
    el.style.display='none';
  }
}

// ══════════════════════════════════════════════
// ── VOTE CARD ──
// ══════════════════════════════════════════════
async function renderVoteCard(vid,v){
  try {
  const isAdmin=CU?.role==='admin';
  const opts=v.options||[];
  const responses=v.responses||{};
  const myKey=CU?.name||CU?.key||'admin'; // 이름 기반
  const myVote=responses[myKey];
  const hasVoted = myVote !== undefined && myVote !== null;
  const totalVotes=Object.keys(responses).length;
  const now=Date.now();
  const deadline=(v.date&&v.time)?new Date(v.date+'T'+v.time).getTime():0;
  const isClosed=v.closed||(deadline&&now>deadline);
  const gName=v.group==='all'?'전체':(groups[v.group]?.name||v.group||'전체');
  const gColor=groups[v.group]?.color||'var(--accent)';
  const isEndVote = (v.title||'').includes('완료') || (v.title||'').includes('마감') || v.imageUpload===true;
  const isImageVote = v.imageUpload === true;

  let html=`<div class="card" style="margin:0 14px 16px;${isClosed?'opacity:0.75;background:#f8f8f8;':''}">` ;
  html+=`<div style="padding:14px 14px 10px;border-bottom:1px solid var(--border)">`;
  html+=`<div style="display:flex;align-items:flex-start;gap:8px">`;
  html+=`<div style="flex:1">`;
  const respCount = isImageVote
    ? Object.keys(v.images||{}).filter(k=>{const im=v.images[k];return im&&im.length>0;}).length
    : Object.keys(responses).length;
  html+=`<div style="font-size:15px;font-weight:800">${escH(v.title||'')} <span style="font-size:10px;color:#f00">[응답${respCount}·링크${Object.keys(v.links||{}).length}]</span></div>`;
  // 시작/완료 배지
  const titleLow = (v.title||'').toLowerCase();
  if(titleLow.includes('시작')||titleLow.includes('start')){
    html+=`<span style="background:#FFE8F3;color:#FF85C1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌅 업무시작</span>`;
  } else if(titleLow.includes('완료')||titleLow.includes('end')||titleLow.includes('퇴근')){
    html+=`<span style="background:#fde8eb;color:#f87286;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">🌙 업무완료</span>`;
  }
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:3px">`;
  html+=`<span style="background:${gColor}22;color:${gColor};padding:2px 8px;border-radius:10px;font-weight:700;margin-right:6px">${escH(gName)}</span>`;
  if(v.date)html+=`📅 ${v.date}`;
  if(v.time)html+=` ${v.time} 마감`;
  html+=`</div></div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openVoteModal('${vid}')">✏️</button>`;
    html+=`<button class="vbtn ${isClosed?'open':'close'}" onclick="toggleVoteClose('${vid}',${!isClosed})">${isClosed?'열기':'닫기'}</button>`;
    html+=`<button class="vbtn del" onclick="delVote('${vid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div></div>`;
  html+=`<div style="padding:12px 14px">`;

  if(isImageVote){
    // 이미지 업로드 투표 - 시작 투표 참여자 버튼 목록
    const allImages = v.images||{};

    // 같은 날짜 시작 투표 찾기
    let startVoters = [];
    let leaveSet = new Set();
    let bonusSet = new Set();
    let totalCount = 0;
    try{
      const allVotes = await dbGet('votes');
      if(allVotes && v.group){
        const titleDate = getTitleDate(v);
        const startV = Object.values(allVotes).find(sv=>{
          if(sv.deleted||sv.group!==v.group) return false;
          if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('참여')) return false;
          const t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
          const t2=(v.title||'').match(/(\d+)월\s*(\d+)일/);
          if(t1&&t2) return t1[1]===t2[1]&&t1[2]===t2[2];
          return getTitleDate(sv)===titleDate;
        });
        if(startV){
          const svOpts=startV.options||[];
          const svResp=startV.responses||{};
          startVoters = Object.keys(svResp);
          startVoters.forEach(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            if(opt.includes('프패')||opt.includes('연차')||opt.includes('프리패스')) leaveSet.add(nick);
            else if(opt.includes('봉사')||opt.includes('열정페이')) bonusSet.add(nick);
          });
          // 노피드(재능기부) 세트 — 피드 없음 → 분모 제외
          const nopidSet = new Set(startVoters.filter(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            return opt.includes('노피드')||opt.includes('재능기부');
          }));
          // 총 인증 수 = 봉사·노피드·연차 제외, 투피드는 2장
          const tupideSet = new Set(startVoters.filter(nick=>{
            const opt=(svOpts[svResp[nick]]||'').toLowerCase();
            return opt.includes('투피드')||opt.includes('두배');
          }));
          totalCount = startVoters.filter(nick=>!bonusSet.has(nick)&&!nopidSet.has(nick)&&!leaveSet.has(nick)).reduce((sum,nick)=>{
            return sum + (tupideSet.has(nick) ? 2 : 1);
          }, 0);
        }
      }
    }catch(e){}

    if(startVoters.length===0 && Object.keys(allImages).length===0){
      // 시작 투표도 없고 이미지도 없으면 본인 업로드 버튼만 표시
      if(!isClosed){
        html+=`<div style="border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;margin-bottom:10px">`;
        html+=`<div style="font-size:24px;margin-bottom:6px">📸</div>`;
        html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
        html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">📎 이미지 선택</button>`;
        html+=`</div>`;
      }
    } else {
      if(startVoters.length===0) startVoters = Object.keys(allImages);
    }
    if(totalCount===0) totalCount = startVoters.length;

    html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0">`;
    startVoters.forEach((nick, idx)=>{
      const isLeave = leaveSet.has(nick);
      const sanitizedNick = nick.replace(/[\.#$\/\[\]\s]/g, '_');
      const imgs = (allImages[sanitizedNick]||allImages[nick]||[]).filter(img=>img?.url&&img.url!=='연차');
      const uploadCount = imgs.length;
      const collapseId = `imgCollapse_${vid}_${idx}`;
      const isBonus = bonusSet.has(nick);
      let fillPct, label, btnStyle, canUpload;
      if(isLeave){
        fillPct = 100;
        label = '(연차)';
        btnStyle = `background:#FFB347;color:white;border:1.5px solid #FFB347;`;
        canUpload = false;
      } else if(isBonus){
        fillPct = totalCount>0 ? Math.min(100, Math.round(uploadCount/totalCount*100)) : 0;
        label = `열정페이 (${uploadCount}/${totalCount})`;
        btnStyle = fillPct===100
          ? `background:#94a3b8;color:white;border:1.5px solid #94a3b8;`
          : fillPct===0
            ? `background:transparent;color:#94a3b8;border:1.5px solid #94a3b8;`
            : `background:linear-gradient(to right,#94a3b8 ${fillPct}%,transparent ${fillPct}%);color:${fillPct>50?'white':'#94a3b8'};border:1.5px solid #94a3b8;`;
        canUpload = true;
      } else {
        fillPct = totalCount>0 ? Math.min(100, Math.round(uploadCount/totalCount*100)) : 0;
        label = `(${uploadCount}/${totalCount})`;
        btnStyle = fillPct===100
          ? `background:#FF85C1;color:white;border:1.5px solid #FF85C1;`
          : fillPct===0
            ? `background:transparent;color:#FF85C1;border:1.5px solid #FF85C1;`
            : `background:linear-gradient(to right,#FF85C1 ${fillPct}%,transparent ${fillPct}%);color:${fillPct>50?'white':'#FF85C1'};border:1.5px solid #FF85C1;`;
        canUpload = true;
      }

      html+=`<div>`;
      html+=`<button onclick="toggleNickBtn('${vid}','${collapseId}','${nick.replace(/'/g,'\\\'')}')" style="width:100%;padding:8px 4px;border-radius:20px;${btnStyle}font-size:11px;font-weight:700;cursor:pointer;line-height:1.5;text-align:center">`;
      html+=`${escH(nick)}<br><span style="font-size:9px">${label}</span>`;
      html+=`</button>`;
      html+=`<div id="${collapseId}" style="display:none;margin-top:6px">`;
      const isMe = nick===myKey || nick===(CU?.name||'');
      if(isMe && !isClosed && canUpload){
        html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
        if(uploadCount>0){
          html+=`<div style="display:flex;gap:4px;margin-bottom:6px">`;
          html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="flex:1;background:var(--surface2);color:var(--text2);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:700;cursor:pointer">수정</button>`;
          html+=`<button onclick="deleteMyImages('${vid}')" style="padding:6px 8px;background:rgba(255,92,92,0.1);color:var(--red);border:none;border-radius:8px;font-size:11px;cursor:pointer">🗑️</button>`;
          html+=`</div>`;
        } else {
          html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="width:100%;background:#FF85C1;color:white;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px">📎 업로드</button>`;
        }
      }
      if(imgs.length>0){
        const sorted = [...imgs].sort((a,b)=>(a.uploadedAt||0)-(b.uploadedAt||0));
        html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">`;
        window._imgGallery_v = sorted.map(x=>x.url.includes('/upload/')?x.url.replace('/upload/','/upload/q_auto,f_auto,w_800/'):x.url); sorted.forEach((img,imgIdx)=>{
          const thumbUrl = img.url.includes('/upload/') ? img.url.replace('/upload/','/upload/q_auto,f_auto,w_400/') : img.url;
          html+=`<div style="aspect-ratio:9/16;border-radius:8px;overflow:hidden;cursor:pointer" onclick="openImgViewer(_imgGallery_v,${imgIdx})"><img src="${thumbUrl}" loading="lazy" style="width:100%;height:100%;object-fit:cover"></div>`;
        });
        html+=`</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;

  } else if(!v.imageUpload) {
    // 일반 투표만
    opts.forEach((opt,i)=>{
      const cnt=Object.values(responses).filter(r=>r===i).length;
      const pct=totalVotes?Math.round(cnt/totalVotes*100):0;
      const isMe=myVote===i;
      const canVote=!isClosed;
      const onclickAttr=canVote?`onclick="pickVoteOption('${vid}',${i})"`:'';
      const isPending = (window._pendingVote && window._pendingVote[vid]===i);
      html+=`<div class="vopt${isMe||isPending?' selected':''}${isClosed?' closed':''}" ${onclickAttr}>`;
      html+=`<div class="vbar" style="width:${pct}%"></div>`;
      html+=`<div class="vopt-chk">${isMe||isPending?'✓':''}</div>`;
      html+=`<div class="vopt-label">${escH(opt)}</div>`;
      html+=`<div class="vopt-cnt">${cnt}명 ${pct}%</div>`;
      html+=`</div>`;
      // 모든 사용자에게 선택지별 투표자 이름 표시
      if(cnt > 0){
        const voterNames = Object.entries(responses).filter(([k,rv])=>rv===i).map(([k])=>k);
        html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;padding:2px 8px 8px">`;
        voterNames.forEach(name=>{ html+=`<span style="background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`; });
        html+=`</div>`;
      }
    });
    if(hasVoted&&!isClosed){
      html+=`<div style="text-align:center;margin-top:8px;display:flex;gap:8px;justify-content:center"><span class="voted-badge">✅ ${escH(opts[myVote]||'')} · 선택 변경 가능</span><button onclick="cancelVote('${vid}')" style="font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:white;color:var(--text3);cursor:pointer">취소</button></div>`;
    }
    if(isClosed){
      html+=`<div style="text-align:center;margin-top:8px"><span class="closed-badge">🔒 마감 · 총 ${totalVotes}명 참여</span></div>`;
      if(isAdmin && v.group && v.group!=='all'){
        const allGroupMembers = await dbGet('members');
        if(allGroupMembers){
          const votedNames = Object.keys(responses);
          const isEndVote2 = (v.title||'').includes('완료') || v.imageUpload;

          // 미투표자 (이 투표에 아예 안 한 사람)
          const nonVoters = Object.values(allGroupMembers)
            .filter(m=>m.name && !votedNames.includes(m.name))
            .map(m=>m.name);

          html+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">`;

          // 완료 미제출 먼저 (완료 투표일 때만)
          if(isEndVote2){
            const allVotes = await dbGet('votes');
            if(allVotes){
              // 같은 날짜, 같은 그룹의 시작 투표 찾기
              const startVote = Object.values(allVotes).find(sv=>
                !sv.deleted &&
                sv.group===v.group &&
                sv.date===v.date &&
                (sv.title||'').includes('시작') &&
                sv.responses
              );
              if(startVote){
                const startedNames = Object.keys(startVote.responses||{});
                const mismatch = startedNames.filter(n=>!votedNames.includes(n));
                if(mismatch.length>0){
                  html+=`<div style="padding:10px 12px;background:#FFF8E1;border-radius:12px;border:1px solid #FFE082">`;
                  html+=`<div style="font-size:11px;font-weight:700;color:#F9A825;margin-bottom:6px">🔔 완료 미제출 ${mismatch.length}명</div>`;
                  html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
                  mismatch.forEach(name=>{
                    html+=`<span style="background:rgba(249,168,37,0.1);color:#F9A825;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`;
                  });
                  html+=`</div></div>`;
                }
              }
            }
          }

          // 미투표자 - 드롭다운으로
          if(nonVoters.length>0){
            const dropId = `nonVoter_${vid}`;
            html+=`<div style="padding:10px 12px;background:#FFF0F0;border-radius:12px;border:1px solid #FFD6D6">`;
            html+=`<div onclick="toggleNonVoterDrop('${dropId}')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">`;
            html+=`<span style="font-size:11px;font-weight:700;color:#FC5C65">⚠️ 미투표 ${nonVoters.length}명</span>`;
            html+=`<span id="${dropId}_arrow" style="font-size:12px;color:#FC5C65">▸</span>`;
            html+=`</div>`;
            html+=`<div id="${dropId}" style="display:none;margin-top:6px;display:none">`;
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px">`;
            nonVoters.forEach(name=>{
              html+=`<span style="background:rgba(252,92,101,0.1);color:#FC5C65;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(name)}</span>`;
            });
            html+=`</div></div></div>`;
          } else {
            html+=`<div style="text-align:center;font-size:12px;color:var(--green)">✅ 전원 투표 완료</div>`;
          }

          html+=`</div>`;
        }
      }
    }
  }

  // 링크 제출 섹션
  const canSubmitLink = !isClosed && !isEndVote;
  // 방금 고른 선택지(임시) 우선, 없으면 이미 저장된 내 투표
  const _pendIdx = (window._pendingVote && window._pendingVote[vid]!==undefined) ? window._pendingVote[vid] : undefined;
  const _chosenIdx = (_pendIdx!==undefined) ? _pendIdx : myVote;
  const myOptText = (_chosenIdx!==undefined && _chosenIdx!==null) ? (opts[_chosenIdx]||'') : '';
  const isTupide = myOptText.toLowerCase().includes('투피드') || myOptText.includes('두배');

  if(!isEndVote){
  html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">`;



  html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">🔗 링크 제출</div>`;

  // 열정페이(봉사)/재능기부(노피드)/연차(프패) 선택자 자동 표시
  const respTimes = v.responseTimes || {};
  const bonusVoters=[];
  if(v.responses && v.options){
    Object.entries(v.responses).forEach(([k,optIdx])=>{
      const optText=(v.options[optIdx]||'').toLowerCase();
      const t = respTimes[k] || 0;
      if(optText.includes('봉사')||optText.includes('열정페이')){
        bonusVoters.push({nick:k, type:'열정페이', time:t});
      }else if(optText.includes('노피드')||optText.includes('재능기부')){
        bonusVoters.push({nick:k, type:'재능기부', time:t});
      }else if(optText.includes('프패')||optText.includes('연차')||optText.includes('프리패스')){
        bonusVoters.push({nick:k, type:'연차', time:t});
      }
    });
  }

  // 링크 시간순 정렬 (time 없으면 pushId 순)
  const rawLinks = v.links ? Object.entries(v.links) : [];
  const sortedLinks = rawLinks.sort((a,b)=>{
    const ta = a[1].time||0, tb = b[1].time||0;
    if(ta&&tb) return ta-tb;
    return a[0]<b[0]?-1:1; // pushId 알파벳순 = 시간순
  }).map(([,l])=>l);
  if(sortedLinks.length>0 || bonusVoters.length>0){
    // 닉네임 기준으로 그룹핑 (투피드 2개 링크 묶기)
    const grouped = {};
    sortedLinks.forEach(l=>{
      const nick = l.nick||'';
      if(!grouped[nick]) grouped[nick] = {nick, links:[], firstTime: l.time||0};
      grouped[nick].links.push(l);
    });
    // 연차/열정페이/노피드 + 링크 전체 목록 (선택/제출 시각 순)
    // 같은 닉네임이 bonus(선택지)에도 있고 링크에도 있으면 → 링크 하나로 합침(중복 방지)
    const linkNicks = new Set(Object.values(grouped).map(g=>g.nick));
    const allEntries = [
      ...bonusVoters.filter(b=>!linkNicks.has(b.nick)).map(b=>({type:'bonus', nick:b.nick, label:b.type, time:b.time||0})),
      ...Object.values(grouped).map(g=>({type:'link', nick:g.nick, links:g.links, time:g.firstTime}))
    ].sort((a,b)=>a.time-b.time);
    let num=1;
    allEntries.forEach(entry=>{
      if(entry.type==='bonus'){
        html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">`;
        html+=`<span style="font-size:11px;color:var(--text3);min-width:20px">${num++}.</span>`;
        html+=`<span style="font-size:12px;font-weight:700;min-width:60px;flex-shrink:0">${escH(entry.nick)}</span>`;
        html+=`<span style="font-size:12px;color:var(--text3)">${escH(entry.label)}</span>`;
        html+=`</div>`;
      } else {
        html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border)">`;
        // 첫 번째 링크에서 닉네임/아이디/배지
        const firstLink = entry.links[0];
        const linkType = firstLink.type||'normal';
        const badgeText = linkType==='tupide'?'투피드':linkType==='bonus'?'열정페이':linkType==='leave'?'연차':'';
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">`;
        html+=`<div style="display:flex;align-items:center;gap:4px">`;
        html+=`<span style="font-size:11px;color:var(--text3)">${num++}.</span>`;
        html+=`<span style="font-size:13px;font-weight:700">${escH(firstLink.nick||'')}</span>`;
        if(firstLink.id) html+=`<span style="font-size:12px;color:var(--text3)">@${escH(firstLink.id)}</span>`;
        html+=`</div>`;
        if(badgeText) html+=`<span style="background:${linkType==='tupide'?'#FF85C1':linkType==='leave'?'#FFB347':'#94a3b8'};color:white;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700">${badgeText}</span>`;
        html+=`</div>`;
        entry.links.forEach(l=>{
          html+=`<div style="margin-bottom:2px">`;
          html+=`<a href="${escH(l.url||'')}" target="_blank" style="font-size:12px;color:var(--accent);word-break:break-all">${escH(l.url||'')}</a>`;
          html+=`</div>`;
          if(l.note) html+=`<div style="font-size:11px;color:var(--text3)">ㄴ${escH(l.note)}</div>`;
        });
        html+=`</div>`;
      }
    });
  }else if(bonusVoters.length===0 && sortedLinks.length===0){
    html+=`<div style="font-size:12px;color:var(--text3);margin-bottom:6px">아직 제출된 링크가 없습니다</div>`;
  }
  if(canSubmitLink){
    // 드랍박스 제거 — 위에서 고른 선택지로 링크칸 자동 결정 (투피드면 2칸)
    html+=`<div style="margin-top:10px">`;
    html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
    html+=`<input id="linkId_${vid}" placeholder="@아이디" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`</div>`;
    if(isTupide){
      // 투피드 → 링크 2칸 자동
      html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
      html+=`<input id="linkUrl_${vid}_1" placeholder="링크 1" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`<input id="linkNote_${vid}_1" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`</div>`;
      html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
      html+=`<input id="linkUrl_${vid}_2" placeholder="링크 2" style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`<input id="linkNote_${vid}_2" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`</div>`;
    } else {
      // 일반 → 링크 1칸
      html+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
      html+=`<input id="linkUrl_${vid}" placeholder="https://..." style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`<input id="linkNote_${vid}" placeholder="요청사항" style="width:80px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
      html+=`</div>`;
    }
    html+=`<button onclick="submitVote('${vid}')" style="width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer">✅ 투표 제출</button>`;
    html+=`</div>`;
  }
  // 관리자 일괄복사 + 댓글
  if(sortedLinks.length>0){
    html+=`<button onclick="copyAllLinks('${vid}')" style="width:100%;margin-top:6px;padding:8px;background:var(--surface2);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2)">📋 링크 전체 복사</button>`;
  }
  // 관리자 댓글
  const adminComment = v.adminComment||'';
  if(isAdmin){
    html+=`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">`;
    html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px">🔧 관리자 메모</div>`;
    html+=`<div style="display:flex;gap:6px">`;
    html+=`<input id="adminComment_${vid}" value="${escH(adminComment)}" placeholder="관리자 메모 입력..." style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none">`;
    html+=`<button onclick="saveAdminComment('${vid}')" style="padding:8px 12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">저장</button>`;
    html+=`</div></div>`;
  } else if(adminComment){
    html+=`<div style="margin-top:8px;padding:8px 12px;background:rgba(255,133,193,0.08);border-radius:8px;border-left:3px solid #FF85C1">`;
    html+=`<div style="font-size:11px;color:var(--text3);margin-bottom:2px">🔧 관리자 메모</div>`;
    html+=`<div style="font-size:13px;color:var(--text)">${escH(adminComment)}</div>`;
    html+=`</div>`;
  }
  html+=`</div>`; // border-top div 닫기
  } // isEndVote 조건 끝
  // 템플릿 멤버 참여 현황
  if(v.tplMembers && v.tplMembers.length>0){
    const voters = Object.keys(v.responses||{});
    const linkerNicks = [...new Set(Object.values(v.links||{}).map(l=>l.nick).filter(Boolean))];
    html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding:10px 14px">`;
    html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">참여 현황</div>`;
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
    v.tplMembers.forEach(n=>{
      const hasVote = voters.includes(n);
      const hasLink = linkerNicks.includes(n);
      const done = hasVote || hasLink;
      html+=`<span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;${done?'background:var(--accent);color:white;':'background:transparent;color:var(--text3);border:1.5px solid var(--border);'}">${escH(n)}</span>`;
    });
    html+=`</div></div>`;
  }

  // 시작 투표 - 관리자에게 투표+링크 현황 표시
  if(!isEndVote && isAdmin && v.group){
    try{
      const voters = Object.keys(v.responses||{});
      const linkers = Object.keys(v.links||{}).map(k=>k.replace(/_[12]$/,'')); // 투피드 _1, _2 제거
      const linkerNicks = [...new Set(Object.values(v.links||{}).map(l=>l.nick).filter(Boolean))];
      const allParticipants = [...new Set([...voters, ...linkerNicks])];
      if(allParticipants.length>0){
        html+=`<div style="border-top:1px solid var(--border);margin-top:10px;padding:10px 14px">`;
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">참여 현황 (투표+링크)</div>`;
        html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
        allParticipants.forEach(n=>{
          const hasVote = voters.includes(n);
          const hasLink = linkerNicks.includes(n);
          const both = hasVote && hasLink;
          const bg = both ? 'background:var(--accent);color:white;' : 'background:rgba(255,133,193,0.15);color:var(--accent);border:1.5px solid var(--accent);';
          const tag = both ? '' : (hasVote ? ' 투표만' : ' 링크만');
          html+=`<span style="padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;${bg}">${escH(n)}${tag}</span>`;
        });
        html+=`</div></div>`;
      }
    }catch(e){}
  }

  html+=`</div></div>`;
  return html;
  } catch(e) {
    console.error('renderVoteCard error', vid, e);
    const opts2=v.options||[];
    const responses2=v.responses||{};
    let fb=`<div class="card" style="margin:0 14px 16px;padding:14px">`;
    fb+=`<div style="font-size:15px;font-weight:800;margin-bottom:8px">${escH(v.title||'투표')}</div>`;
    fb+=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">📅 ${v.date||''} · 마감 ${v.time||''} · ${Object.keys(responses2).length}명 참여</div>`;
    opts2.forEach((o,i)=>{
      const cnt=Object.values(responses2).filter(r=>r===i).length;
      const names=Object.entries(responses2).filter(([k,r])=>r===i).map(([k])=>k);
      fb+=`<div style="padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:13px">${escH(o)} <span style="color:var(--text3)">${cnt}명</span>`;
      if(names.length>0) fb+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${names.map(n=>`<span style="background:white;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${escH(n)}</span>`).join('')}</div>`;
      fb+=`</div>`;
    });
    fb+=`</div>`;
    return fb;
  }
}

function onLinkTypeChange(vid){
  const type = document.getElementById(`linkType_${vid}`)?.value;
  const area1 = document.getElementById(`linkInputArea_${vid}`);
  const area2 = document.getElementById(`linkInputArea2_${vid}`);
  if(!area1||!area2) return;
  if(type==='tupide'){
    area1.style.display='none';
    area2.style.display='block';
  } else {
    area1.style.display='block';
    area2.style.display='none';
  }
}

async function submitVoteLinkNew(vid, silent, preData){
  const nick=CU?.name||'익명';
  const key=CU?.key||'admin';
  // preData가 있으면 DOM 대신 그 값을 사용 (castVote가 화면을 다시 그려도 안전)
  const type = preData ? (preData.type||'normal') : (document.getElementById(`linkType_${vid}`)?.value||'normal');
  const linkId = preData ? (preData.id||'') : (document.getElementById(`linkId_${vid}`)?.value.trim()||'');
  const displayNick=nick;
  const displayId=linkId;

async function toggleNickBtn(vid, collapseId, nick){
  const el = document.getElementById(collapseId);
  if(!el) return;
  if(el.style.display !== 'none'){
    el.style.display = 'none';
    return;
  }
  // 마감 여부, 이미지 동시 조회
  const myKey = (CU?.name||'').replace(/[\.#$\/\[\]\s]/g,'_');
  const sanitized = nick.replace(/[\.#$\/\[\]\s]/g,'_');
  const [v, imgsSan, imgsRaw] = await Promise.all([
    dbGet(`votes/${vid}`),
    dbGet(`votes/${vid}/images/${sanitized}`),
    dbGet(`votes/${vid}/images/${nick}`)
  ]);
  // 투표 데이터를 못 불러왔으면(null) 종료로 간주 → 업로드 버튼 노출 방지(fail-safe)
  const deadline = v?.date&&v?.time ? new Date(v.date+'T'+v.time).getTime() : null;
  const isClosed = !v ? true : (v.closed ? true : !!(deadline && Date.now() > deadline));
  // 클릭한 닉네임 본인의 사진만 조회 (내 사진으로 폴백하지 않음)
  const imgs = imgsSan || imgsRaw || [];
  const realImgs = imgs.filter(img=>img?.url&&img.url!=='연차');
  const isMe = nick===(CU?.name||'') || sanitized===myKey;

  el.style.display = 'block';
  let html = '';
  if(isMe && !isClosed && realImgs.length===0){
    html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
    html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="width:100%;background:#FF85C1;color:white;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px">📎 업로드</button>`;
  } else if(isMe && !isClosed && realImgs.length>0){
    html+=`<input type="file" id="imgInput_${vid}" accept="image/*,.heic,.heif" multiple style="display:none" onchange="uploadImages('${vid}',this)">`;
    html+=`<div style="display:flex;gap:4px;margin-bottom:6px">`;
    html+=`<button onclick="document.getElementById('imgInput_${vid}').click()" style="flex:1;background:var(--surface2);color:var(--text2);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:700;cursor:pointer">수정</button>`;
    html+=`<button onclick="deleteMyImages('${vid}')" style="padding:6px 8px;background:rgba(255,92,92,0.1);color:var(--red);border:none;border-radius:8px;font-size:11px;cursor:pointer">🗑️</button>`;
    html+=`</div>`;
  }
  if(realImgs.length>0){
    const sorted = [...realImgs].sort((a,b)=>(a.uploadedAt||0)-(b.uploadedAt||0));
    html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">`;
    window._imgGallery_v = sorted.map(x=>x.url.includes('/upload/')?x.url.replace('/upload/','/upload/q_auto,f_auto,w_800/'):x.url);
    sorted.forEach((img,imgIdx)=>{
      const thumbUrl = img.url.includes('/upload/') ? img.url.replace('/upload/','/upload/q_auto,f_auto,w_400/') : img.url;
      html+=`<div style="aspect-ratio:9/16;border-radius:8px;overflow:hidden;cursor:pointer" onclick="openImgViewer(_imgGallery_v,${imgIdx})"><img src="${thumbUrl}" loading="lazy" style="width:100%;height:100%;object-fit:cover"></div>`;
    });
    html+=`</div>`;
  }
  el.innerHTML = html;
}

async function copyAllLinks(vid){
  const v = await dbGet(`votes/${vid}`);
  if(!v){showToast('링크 없음');return;}
  // 화면 목록과 동일한 순서/넘버링 재현 (열정페이·노피드·연차 + 링크 그룹핑)
  const bonusVoters=[];
  if(v.responses && v.options){
    Object.entries(v.responses).forEach(([k,optIdx])=>{
      const optText=(v.options[optIdx]||'').toLowerCase();
      if(optText.includes('봉사')||optText.includes('열정페이')){
        bonusVoters.push({nick:k, type:'열정페이'});
      }else if(optText.includes('노피드')||optText.includes('재능기부')){
        bonusVoters.push({nick:k, type:'재능기부'});
      }else if(optText.includes('프패')||optText.includes('연차')||optText.includes('프리패스')){
        bonusVoters.push({nick:k, type:'연차'});
      }
    });
  }
  const sortedLinks = (v.links?Object.entries(v.links):[]).sort((a,b)=>{
    const ta=a[1].time||0, tb=b[1].time||0;
    if(ta&&tb) return ta-tb;
    return a[0]<b[0]?-1:1;
  }).map(([,l])=>l);
  const grouped={};
  sortedLinks.forEach(l=>{const nick=l.nick||'';if(!grouped[nick])grouped[nick]={nick,links:[],firstTime:l.time||0};grouped[nick].links.push(l);});

  // 링크를 낸 사람은 bonus 줄에서 제외 (링크 줄에 [연차] 등으로 표시되므로 중복 방지)
  const linkNicks = new Set(Object.keys(grouped));
  const bonusFiltered = bonusVoters.filter(b=>!linkNicks.has(b.nick));

  // 닉네임별 선택지 → 유형 라벨 매핑 (투피드/연차 표시용)
  function _optTextOf(nick){
    if(!v.responses||!v.options) return '';
    const idx=v.responses[nick];
    if(idx===undefined||idx===null) return '';
    return (v.options[idx]||'').toLowerCase();
  }
  function _typeLabel(nick, links){
    const t=_optTextOf(nick);
    if(t.includes('투피드')||t.includes('두배')) return '투피드';
    if(t.includes('프패')||t.includes('연차')||t.includes('프리패스')) return '연차';
    // 선택지 정보가 없으면 링크 개수로 보조 판단(투피드는 보통 링크 2개)
    if((links?.length||0)>=2) return '투피드';
    return '';
  }

  const allEntries=[
    ...bonusFiltered.map(b=>({type:'bonus',nick:b.nick,label:b.type,time:0})),
    ...Object.values(grouped).map(g=>({type:'link',nick:g.nick,links:g.links,time:g.firstTime}))
  ].sort((a,b)=>a.time-b.time);
  if(allEntries.length===0){showToast('복사할 내용 없음');return;}
  let num=1;
  const lines=[];
  allEntries.forEach(entry=>{
    if(entry.type==='bonus'){
      lines.push(`${num++}. ${entry.nick} ${entry.label}`);
    }else{
      const fl=entry.links[0];
      const label=_typeLabel(entry.nick, entry.links);
      const head=`${num++}. ${fl.nick||''}${fl.id?` @${fl.id}`:''}${label?` [${label}]`:''}`;
      const parts=[head];
      entry.links.forEach((l,i)=>{
        if(l.url) parts.push(entry.links.length>1?`(${i+1}) ${l.url}`:l.url);
        if(l.note) parts.push('ㄴ'+l.note);
      });
      lines.push(parts.join('\n'));
    }
  });
  const dateStr = getTitleDate(v) || v.date || '';
  const text = (dateStr?`${dateStr}일\n\n`:'') + lines.join('\n');
  await navigator.clipboard.writeText(text);
  showToast('📋 전체 복사됨');
}

// ── Cloudinary 이미지 업로드 ──
const CLOUDINARY_CLOUD = 'dcmohbbyi';
const CLOUDINARY_PRESET = 'crew31_upload'; // unsigned preset 이름

async function uploadImages(vid, input){
  const files = Array.from(input.files);
  if(!files.length) return;
  // 마감 체크
  const vCheck = await dbGet(`votes/${vid}`);
  if(vCheck?.closed){ showToast('마감된 투표입니다'); input.value=''; return; }
  showToast('⏳ 업로드 중...');

  const myKey = (CU?.name || '').replace(/[\.\#\$\/\[\]\s]/g, '_');
  if(!myKey){showToast('로그인 정보 오류');return;}

  // 만료 시간 계산 (다음날 오후 1시 10분)
  const now = new Date();
  const expire = new Date(now);
  if(now.getHours() >= 22){
    expire.setDate(expire.getDate() + 1);
  }
  expire.setHours(13, 10, 0, 0);
  const expireAt = expire.getTime();

  const compressImg = (file) => new Promise(resolve=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const maxW = 1200;
      const scale = Math.min(1, maxW / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob=>resolve(blob||file), 'image/jpeg', 0.82);
    };
    img.onerror = ()=>resolve(file);
    img.src = url;
  });

  const uploaded = [];
  const uploadOne = (file, retry=0) => new Promise(async resolve=>{
    if(file.size > 10 * 1024 * 1024){ showToast(`${file.name} 10MB 초과`); return resolve(null); }
    const compressed = await compressImg(file);
    const fd = new FormData();
    fd.append('file', compressed, 'photo.jpg');
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('folder', `crew31/${vid}`);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable) showToast(`⏳ 업로드 중... ${Math.round(e.loaded/e.total*100)}%`);
    };
    xhr.onload = ()=>{
      try{
        const data = JSON.parse(xhr.responseText);
        if(data.secure_url){
          const optimUrl = data.secure_url.replace('/upload/','/upload/q_auto,f_auto,w_600/');
          resolve({url:optimUrl, publicId:data.public_id, uploadedAt:Date.now(), expireAt});
        } else {
          if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1));
          else{ showToast(`업로드 오류: ${data.error?.message||'알 수 없는 오류'}`); resolve(null); }
        }
      }catch(e){ resolve(null); }
    };
    xhr.onerror = ()=>{ if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1)); else{ showToast('업로드 실패'); resolve(null); } };
    xhr.ontimeout = ()=>{ if(retry<2) setTimeout(()=>uploadOne(file,retry+1).then(resolve),1000*(retry+1)); else{ showToast('업로드 시간 초과'); resolve(null); } };
    xhr.timeout = 30000;
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
    xhr.send(fd);
  });
  const results = await Promise.all(files.map(f=>uploadOne(f)));
  uploaded.push(...results.filter(Boolean));

  if(uploaded.length === 0){ showToast('업로드 실패'); return; }

  // Firebase에 저장
  try{
    const existing = await dbGet(`votes/${vid}/images/${myKey}`) || [];
    const merged = [...existing, ...uploaded];
    await dbSet(`votes/${vid}/images/${myKey}`, merged);
  }catch(e){
    showToast(`저장 실패: ${e.message}`);
    return;
  }

  // 출석 자동 기록 — recordAttendance 규칙으로 통일 (시작+완료 둘 다 해야 완료)
  const v = await dbGet(`votes/${vid}`);
  if(v && v.group && v.date){
    // 이미지 제출도 하나의 응답으로 보고, 그 투표의 내 선택지(없으면 완료로 간주)로 기록 처리
    const myIdx = v.responses?.[myKey];
    await recordAttendance(vid, (myIdx!==undefined?myIdx:0), myKey);
  }

  showToast(`✅ ${uploaded.length}장 업로드 완료!`);
  input.value = '';

  // 화면 새로고침
  if(_currentTab==='home') loadHome();
  else if(_currentTab==='dept') loadDeptPage(_currentDept);
}

// 임의 멤버(targetKey) 대상 투표 취소 — 경품/연차 복구 + 현황 재계산까지 동일 처리
async function cancelVoteFor(vid, myKey, linkKey){
  const key = linkKey || myKey;
  const v=await dbGet(`votes/${vid}`);
  if(!v || v.responses?.[myKey]===undefined) {
    // 응답이 없으면 링크만 정리하고 종료
    if(v){ await dbDelete(`votes/${vid}/links/${key}`); await dbDelete(`votes/${vid}/links/${key}_1`); await dbDelete(`votes/${vid}/links/${key}_2`); }
    return;
  }
  let wasLeave=false, wasTupide=false;
  const usedDate = getTitleDate(v)||todayStr;
  const prevOptText=(v.options?.[v.responses[myKey]]||'').toLowerCase();
  wasLeave=prevOptText.includes('프패')||prevOptText.includes('연차')||prevOptText.includes('프리패스');
  wasTupide=prevOptText.includes('투피드')||prevOptText.includes('두배');

  if(wasLeave){
    try{
      const gmKey=await _gameKeyFor(myKey, v.group);
      if(gmKey){
        const usedType = v.leaveUsed?.[myKey];
        if(usedType==='prize'){
          const prizesRaw=await gameGet(`memberPrizes/${gmKey}`);
          if(Array.isArray(prizesRaw)){
            const idx=prizesRaw.findIndex(p=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
            if(idx>=0){const arr=[...prizesRaw];arr[idx]={...arr[idx],deducted:false,usedDate:null};await gameSet(`memberPrizes/${gmKey}`,arr);}
          }else if(prizesRaw){
            const found=Object.entries(prizesRaw).find(([k,p])=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
            if(found){await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,null);}
          }
          showToast('↩️ 경품 연차 복구됨');
        }else{
          const cur=await gameGet(`memberLeave/${gmKey}`)||0;
          await gameSet(`memberLeave/${gmKey}`,cur+1);
          await gamePush(`leaveLog/${gmKey}`,{type:'give',amount:1,date:usedDate,memo:'출석 취소 연차 복구',time:Date.now()});
          showToast('↩️ 연차 복구됨');
        }
        await dbDelete(`votes/${vid}/leaveUsed/${myKey}`);
      }
    }catch(e){}
  }

  await dbDelete(`votes/${vid}/responses/${myKey}`);
  await dbDelete(`votes/${vid}/links/${key}`);
  await dbDelete(`votes/${vid}/links/${key}_1`);
  await dbDelete(`votes/${vid}/links/${key}_2`);

  if(wasTupide){ await reconcileTupide(v.group, usedDate, myKey); }
  await recomputeAttendance(v.group, getTitleDate(v), myKey);

  if(!wasLeave && !wasTupide) showToast('투표 취소됨');
  if(_currentTab==='home') loadHome();
  else if(_currentTab==='dept') loadDeptPage(_currentDept);
}

              const idx=prizesRaw.findIndex(p=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
              if(idx>=0){const arr=[...prizesRaw];arr[idx]={...arr[idx],deducted:false,usedDate:null};await gameSet(`memberPrizes/${gmKey}`,arr);}
            }else if(prizesRaw){
              const found=Object.entries(prizesRaw).find(([k,p])=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
              if(found){await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,null);}
            }
            showToast('↩️ 경품 연차 복구됨');
          }else{
            // 마커가 없거나 manual이면 수동 연차로 복구 (구버전 호환)
            const cur=await gameGet(`memberLeave/${gmKey}`)||0;
            await gameSet(`memberLeave/${gmKey}`,cur+1);
            await gamePush(`leaveLog/${gmKey}`,{type:'give',amount:1,date:usedDate,memo:'투표 취소 연차 복구',time:Date.now()});
            showToast('↩️ 연차 복구됨');
          }
          await dbDelete(`votes/${vid}/leaveUsed/${myKey}`);
        }
      }catch(e){}
    }
  }

  await dbDelete(`votes/${vid}/responses/${myKey}`);
  // 링크도 같이 삭제
  await dbDelete(`votes/${vid}/links/${key}`);
  await dbDelete(`votes/${vid}/links/${key}_1`);
  await dbDelete(`votes/${vid}/links/${key}_2`);

  // 투피드: 응답 삭제 후 그날 정합 (같은 날 다른 투표에 투피드 남아있으면 경품 유지, 없으면 복구)
  if(wasTupide && v){ await reconcileTupide(v.group, usedDate, myKey); }

  // 현황 재계산 (취소 반영) — 남은 응답 기준으로 출석 상태 다시 기록
  if(v){ await recomputeAttendance(v.group, getTitleDate(v), myKey); }

  if(!wasLeave && !wasTupide) showToast('투표 취소됨');
  if(_currentTab==='home'||_currentTab==='dept') loadDeptPage(_currentDept);
}
