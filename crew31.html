<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📋 crew31</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FFF8F5;--surface:#FFFFFF;--surface2:#FFF0EB;--border:#FDDDD4;
  --text:#2D1B14;--text2:#8C6458;--text3:#C4A098;
  --accent:#FF7F6E;--accent2:#FF9F7A;--peach:#FFCFC7;--cream:#FFF4F0;
  --green:#5DB88A;--red:#FF5C5C;--gold:#FFB347;--blue:#5B9BD5;
  --sidebar:#2D1B14;--sidebar2:#3D2820;--sidebar3:#4D3830;
  --shadow:0 2px 16px rgba(255,127,110,0.1);--shadow2:0 6px 32px rgba(255,127,110,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
button,input,textarea,select{font-family:'Noto Sans KR',sans-serif;}
button{cursor:pointer;}

/* ── 로그인 ── */
#loginPage{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;overflow-y:auto;}
.login-profile-area{width:100%;display:flex;flex-direction:column;align-items:center;padding:52px 24px 28px;background:linear-gradient(180deg,rgba(255,200,180,0.35) 0%,transparent 100%);}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;box-shadow:0 8px 24px rgba(255,127,110,0.3);}
.login-title{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#FF7F6E,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);}
.login-card{width:100%;max-width:400px;background:white;border-top:1px solid var(--border);}
.login-sec{padding:22px 22px 16px;}
.login-sec+.login-sec{border-top:8px solid var(--bg);}
.login-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;}
.fi{width:100%;padding:12px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);outline:none;transition:all 0.2s;box-sizing:border-box;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,127,110,0.1);}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:800;margin-top:10px;transition:all 0.15s;}
.login-btn.member{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;box-shadow:0 4px 16px rgba(255,127,110,0.3);}
.login-btn.admin{background:linear-gradient(135deg,#FFB347,#FF9F7A);color:white;}
.login-btn:active{transform:scale(0.97);}

/* ── 앱 레이아웃 ── */
#app{height:100vh;flex-direction:row;}

/* ── 사이드바 ── */
.sidebar{width:60px;min-width:60px;max-width:60px;background:var(--sidebar);display:flex;flex-direction:column;height:100vh;overflow:hidden;flex-shrink:0;}
.sidebar.collapsed{width:0!important;min-width:0!important;max-width:0!important;}
.sb-toggle{width:32px;height:32px;background:var(--sidebar);border:none;border-radius:8px;color:white;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

/* 프로필 영역 */
.sb-profile{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sb-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.sb-logo-text{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;}
.sb-user{display:flex;align-items:center;gap:10px;}
.sb-avatar{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white;flex-shrink:0;position:relative;}
.sb-avatar.admin-av{background:linear-gradient(135deg,#FFB347,#FF9F7A);}
.online-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#5DB88A;border:2px solid var(--sidebar);}
.sb-user-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-role{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.sb-logout{background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.5);padding:5px 8px;border-radius:8px;font-size:11px;white-space:nowrap;}
.sb-logout:hover{background:rgba(255,127,110,0.2);color:#FF9F7A;}

/* 메뉴 */
.sb-menu{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none;}
.sb-menu::-webkit-scrollbar{display:none;}
.sb-section{padding:6px 14px 2px;}
.sb-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:0.8px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:0;cursor:pointer;transition:all 0.12s;color:rgba(255,255,255,0.6);font-size:13px;font-weight:600;width:100%;border:none;background:none;text-align:left;position:relative;}
.sb-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);}
.sb-item.active{background:rgba(255,127,110,0.2);color:#FF9F7A;font-weight:700;}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.sb-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sb-badge{margin-left:auto;background:#FF5C5C;color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;}

/* 부서 서브메뉴 */
.sb-sub{padding-left:0;}
.sb-sub-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 40px;cursor:pointer;color:rgba(255,255,255,0.45);font-size:12px;font-weight:600;width:100%;border:none;background:none;text-align:left;transition:all 0.12s;}
.sb-sub-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.04);}
.sb-sub-item.active{color:#FF9F7A;font-weight:700;}
.sb-dept-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* 오락실 버튼 */
.sb-game{margin:8px 10px;background:rgba(108,53,222,0.2);border:1px solid rgba(108,53,222,0.3);color:#A78BFA;padding:9px 12px;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.sb-game:hover{background:rgba(108,53,222,0.3);}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.main-header{background:white;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-title{font-size:16px;font-weight:800;color:var(--text);}
.main-header-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.main-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── 공통 컴포넌트 ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(45,27,20,0.9);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.active{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 0.2s;}
.overlay.active .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.fl{margin-bottom:12px;}
.fl label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn-pri{flex:1;padding:13px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;}
.btn-sec{flex:1;padding:13px;background:var(--surface2);color:var(--text2);border:none;border-radius:14px;font-size:15px;font-weight:700;}
.btn-sm{padding:8px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-sm.pri{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;}
.btn-sm.sec{background:var(--surface2);color:var(--text2);}
.card{background:white;border-radius:16px;border:1px solid var(--border);margin:0 14px 12px;overflow:hidden;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.stitle{font-size:14px;font-weight:800;color:var(--text2);padding:0 16px 8px;}

/* ── 투표 카드 ── */
.vopt{position:relative;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:white;margin-bottom:6px;transition:all 0.15s;cursor:pointer;overflow:hidden;-webkit-user-select:none;}
.vopt.closed{cursor:default;}
.vopt.selected{border-color:var(--accent);background:rgba(255,127,110,0.06);}
.vopt:not(.closed):not(.selected):active{background:var(--cream);}
.vbar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,127,110,0.08);transition:width 0.4s;z-index:0;border-radius:12px;pointer-events:none;}
.vopt-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;z-index:1;transition:all 0.15s;}
.vopt.selected .vopt-chk{background:var(--accent);border-color:var(--accent);}
.vopt-label{flex:1;font-size:14px;font-weight:600;color:var(--text);z-index:1;}
.vopt-cnt{font-size:12px;font-weight:700;color:var(--text3);z-index:1;}
.vbtn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.vbtn.edit{background:rgba(91,155,213,0.1);color:var(--blue);}
.vbtn.copy{background:rgba(255,179,71,0.1);color:var(--gold);}
.vbtn.close{background:rgba(255,92,92,0.1);color:var(--red);}
.vbtn.open{background:rgba(93,184,138,0.1);color:var(--green);}
.vbtn.del{background:rgba(255,92,92,0.08);color:var(--red);}
.vbtn.reset{background:rgba(255,179,71,0.1);color:var(--gold);}
.voted-badge{background:rgba(93,184,138,0.1);color:var(--green);font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;}
.closed-badge{background:rgba(196,160,152,0.1);color:var(--text3);font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;text-align:center;}
.link-list{border-top:1px solid var(--border);padding:10px 16px;}
.link-list-title{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;}
.link-item{padding:5px 0;border-bottom:1px solid var(--surface2);}
.link-num-name{font-size:12px;font-weight:700;}
.link-url a{font-size:11px;color:var(--blue);word-break:break-all;}
.link-form{padding:10px 16px;border-top:1px solid var(--border);}
.vadmin{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap;}

/* ── 캘린더 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px 12px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 12px 4px;}
.cal-dh{text-align:center;font-size:11px;font-weight:700;color:var(--text3);}
.cal-cell{min-height:36px;border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:3px;cursor:pointer;transition:background 0.1s;}
.cal-cell:hover{background:var(--cream);}
.cal-cell.today .cal-dn{background:var(--accent);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:var(--cream);}
.cal-dn{font-size:12px;font-weight:600;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-dn.sun{color:var(--red);}
.cal-dn.sat{color:var(--blue);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:1px;}

/* ── 채팅 ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;}
.msg-row.me{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.msg-content{display:flex;flex-direction:column;gap:3px;max-width:70%;}
.msg-row.me .msg-content{align-items:flex-end;}
.msg-name{font-size:11px;font-weight:700;color:var(--text3);padding:0 4px;}
.msg-bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg-bubble.other{background:white;border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(255,127,110,0.08);}
.msg-bubble.me{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px;}
.msg-date-sep{text-align:center;font-size:11px;color:var(--text3);padding:10px 0 4px;font-weight:600;}
.chat-room-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.chat-room-item:hover{background:var(--cream);}
.chat-room-item.active{background:rgba(255,127,110,0.07);}
.chat-room-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;flex-shrink:0;}

/* ── 멤버 리스트 ── */
.member-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,220,210,0.3);transition:background 0.1s;}
.member-item:hover{background:var(--cream);}
.member-avatar{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0;position:relative;}
.member-online-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:#5DB88A;border:2px solid white;}

/* ── 피드 카드 ── */
.feed-card{background:white;border-radius:16px;margin:0 14px 12px;box-shadow:0 2px 12px rgba(255,127,110,0.08);border:1px solid rgba(255,210,200,0.5);overflow:hidden;}
.feed-card-header{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(255,220,210,0.4);}
.feed-card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.feed-card-footer{display:flex;border-top:1px solid rgba(255,220,210,0.4);}
.feed-footer-btn{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;background:none;border:none;cursor:pointer;}
.feed-footer-btn:not(:last-child){border-right:1px solid rgba(255,220,210,0.4);}

/* ── 설정 ── */
.setting-section{padding:16px;}
.setting-section+.setting-section{border-top:8px solid var(--bg);}
.setting-section-title{font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

</head>
<body>
<div class="toast" id="toast"></div>

<!-- ══ LOGIN ══ -->

<div id="loginPage">
  <div style="width:100%;max-width:400px;margin:0 auto;display:flex;flex-direction:column;align-items:center;">
    <div class="login-profile-area">
      <div class="login-logo">📋</div>
      <div class="login-title">crew31</div>
      <div class="login-sub">(주) 떠리원 사무실</div>
      <a href="https://5sq224fdw5-eng.github.io/game31/game.html" target="_blank"
        style="margin-top:14px;display:flex;align-items:center;gap:6px;background:rgba(108,53,222,0.12);border:1.5px solid rgba(108,53,222,0.2);color:#6C35DE;padding:9px 22px;border-radius:22px;font-size:13px;font-weight:700;text-decoration:none;">
        🎡 오락실 바로가기
      </a>
    </div>
    <div class="login-card" style="width:100%;">
      <div class="login-sec">
        <div class="login-label">👤 사원으로 시작</div>
        <input class="fi" id="loginName" placeholder="이름 입력" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeyup="if(event.key==='Enter')doLogin('member')">
        <button class="login-btn member" onclick="doLogin('member')">입장하기</button>
      </div>
      <div class="login-sec">
        <div class="login-label">🔑 인사팀으로 시작</div>
        <input class="fi" id="loginPw" type="password" placeholder="비밀번호" onkeyup="if(event.key==='Enter')doLogin('admin')">
        <button class="login-btn admin" onclick="doLogin('admin')">인사팀 입장</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->

<div id="app" style="display:none">

  <!-- ▌사이드바 ▌ -->

  <div class="sidebar">
    <!-- 프로필 -->
    <div class="sb-profile">
      <div class="sb-logo">
        <div class="sb-logo-icon">📋</div>
        <div class="sb-logo-text">crew31</div>
      </div>
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">
          <div class="online-dot"></div>
        </div>
        <div class="sb-user-info">
          <div class="sb-name" id="sbName">-</div>
          <div class="sb-role" id="sbRole">-</div>
        </div>
        <button class="sb-logout" onclick="logout()">나가기</button>
      </div>
    </div>

<!-- 메뉴 -->
<div class="sb-menu">

  <div class="sb-section"><div class="sb-section-label">커뮤니케이션</div></div>
  <button class="sb-item active" data-tab="notice" onclick="goTab('notice')">
    <span class="sb-item-icon">📢</span> 공지사항
  </button>
  <button class="sb-item" data-tab="chat" onclick="goTab('chat')">
    <span class="sb-item-icon">💬</span> 채팅
    <span id="chatBadge" style="display:none" class="sb-badge"></span>
  </button>

  <div class="sb-section" style="margin-top:6px"><div class="sb-section-label">업무분장</div></div>
  <button class="sb-item" data-tab="home" onclick="goTab('home')">
    <span class="sb-item-icon">💼</span> 전체 투표
  </button>
  <div id="deptSubMenu"></div>

  <div class="sb-section" style="margin-top:6px"><div class="sb-section-label">근태관리</div></div>
  <button class="sb-item" data-tab="calendar" onclick="goTab('calendar')">
    <span class="sb-item-icon">🗓</span> 캘린더
  </button>
  <button class="sb-item" data-tab="leave" onclick="goTab('leave')">
    <span class="sb-item-icon">🏖️</span> 연차·경품
  </button>

  <div class="sb-section" style="margin-top:6px"><div class="sb-section-label">멤버</div></div>
  <button class="sb-item" data-tab="members" onclick="goTab('members')">
    <span class="sb-item-icon">👥</span> 멤버 목록
  </button>

  <div id="adminMenu" style="display:none">

<script>
// ══════════════════════════════════════════════
// ── CORE ──
// ══════════════════════════════════════════════
const DB='https://gacha-31-default-rtdb.firebaseio.com/crew31';
const GAME_DB='https://gacha-31-default-rtdb.firebaseio.com';
const todayStr=new Date().toISOString().slice(0,10);

let CU=null,groups={},members={},calY,calM,calSel;
let _optimisticVotes={};
let _cachedData={};
let _currentTab='notice';
let _currentDept=null; // 현재 선택된 부서 gid
let _expandedFeedGroup=null;
let _expandedNotice=null;
let _currentChatRoom=null; // {type:'all'|'dept'|'dm', id:..., name:...}
let _pendingFeedVid=null;
let _lockAction=null;

function showToast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',dur);}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return '';const d=new Date(ts);return d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function getKSTDate(){const d=new Date();d.setHours(d.getHours()+9);return d.toISOString().slice(0,10);}

// ── DB ──
async function dbGet(p){try{const r=await fetch(`${DB}/${p}.json`);return await r.json();}catch{return null;}}
async function dbSet(p,d){try{await fetch(`${DB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}catch{}}
async function dbPush(p,d){try{const r=await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});return await r.json();}catch{return null;}}
async function dbDel(p){try{await fetch(`${DB}/${p}.json`,{method:'DELETE'});}catch{}}
async function gameGet(p){try{const r=await fetch(`${GAME_DB}/${p}.json`);return await r.json();}catch{return null;}}
async function gameSet(p,d){try{await fetch(`${GAME_DB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}catch{}}
async function gamePush(p,d){try{const r=await fetch(`${GAME_DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});return await r.json();}catch{return null;}}

// ══════════════════════════════════════════════
// ── LOGIN ──
// ══════════════════════════════════════════════
async function doLogin(role){
  try{
    if(role==='admin'){
      if(document.getElementById('loginPw').value!=='admin1234'){showToast('비밀번호 오류');return;}
      CU={name:'관리자',role:'admin',key:null};
    }else{
      const name=document.getElementById('loginName').value.trim();
      if(!name){showToast('이름을 입력하세요');return;}
      const mems=await dbGet('members');
      if(!mems){showToast('멤버 정보를 불러올 수 없습니다');return;}
      const entry=Object.entries(mems).find(([k,m])=>m.name===name);
      if(!entry){showToast('등록되지 않은 이름입니다');return;}
      CU={name,role:'member',key:entry[0]};
    }
    localStorage.setItem('crew31User',JSON.stringify(CU));
    await enterApp();
  }catch(e){
    console.error('login error',e);
    showToast('오류가 발생했습니다: '+e.message);
  }
}

function logout(){
  CU=null;localStorage.removeItem('crew31User');
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('app').style.display='none';
  clearInterval(window._chatPoll);
}

async function enterApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='flex';

  // 사이드바 프로필
  const initial=(CU.name||'?')[0];
  const sbAv=document.getElementById('sbAvatar');
  sbAv.innerHTML=`${initial}<div class="online-dot"></div>`;
  if(CU.role==='admin')sbAv.classList.add('admin-av');
  document.getElementById('sbName').textContent=CU.name;
  document.getElementById('sbRole').textContent=CU.role==='admin'?'인사팀':'사원';
  document.getElementById('adminMenu').style.display=CU.role==='admin'?'block':'none';

  calY=new Date().getFullYear();calM=new Date().getMonth();calSel=todayStr;
  try{await loadGroups();}catch(e){console.error('loadGroups error',e);}
  try{goTab('notice');}catch(e){console.error('goTab error',e);}
}

// ── 자동 로그인 ──
(async()=>{
  const saved=localStorage.getItem('crew31User');
  if(saved){try{CU=JSON.parse(saved);await enterApp();}catch{localStorage.removeItem('crew31User');}}
})();

// ══════════════════════════════════════════════
// ── GROUPS / DEPARTMENTS ──
// ══════════════════════════════════════════════
async function loadGroups(){
  const g=await dbGet('groups');
  if(!g||Object.keys(g).length===0){
    const def={g1:{name:'좋아요',color:'#FF7F6E'},g2:{name:'댓글',color:'#FFB347'},g3:{name:'시크릿',color:'#5DB88A'}};
    await dbSet('groups',def);groups=def;
  }else groups=g;
  if(!_currentDept||!groups[_currentDept])_currentDept=Object.keys(groups)[0]||'';
  renderDeptSubMenu();
}

function renderDeptSubMenu(){
  const el=document.getElementById('deptSubMenu');
  if(!el)return;
  el.innerHTML=Object.entries(groups).map(([id,g])=>{
    const isActive=_currentTab==='dept'&&_currentDept===id;
    return `<button class="sb-sub-item${isActive?' active':''}" onclick="goDept('${id}')">
      <span class="sb-dept-dot" style="background:${g.color||'#FF7F6E'}"></span>
      ${escH(g.name)}${g.lock?'🔒':''}
    </button>`;
  }).join('');
}

function goDept(gid){
  if(groups[gid]?.lock&&CU?.role!=='admin'&&!sessionStorage.getItem('unlockedGroup_'+gid)){
    _pendingFeedVid=null;
    _pendingDept=gid;
    openGroupLockModal(gid,'enter');
    return;
  }
  _currentDept=gid;
  _currentTab='dept';
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',false));
  document.querySelectorAll('.sb-sub-item').forEach(b=>b.classList.toggle('active',b.dataset?.gid===gid||b.getAttribute('onclick')?.includes(`'${gid}'`)));
  renderDeptSubMenu();
  setMainHeader(`💼 ${groups[gid]?.name||''} 업무`, groups[gid]?.name+' 부서 투표·링크');
  loadDeptPage(gid);
}
let _pendingDept=null;

function setMainHeader(title,sub='',actionsHtml=''){
  document.getElementById('mainTitle').textContent=title;
  document.getElementById('mainSub').textContent=sub;
  document.getElementById('mainHeaderActions').innerHTML=actionsHtml;
}

// ══════════════════════════════════════════════
// ── TAB NAVIGATION ──
// ══════════════════════════════════════════════
function goTab(tab){
  _currentTab=tab;
  clearInterval(window._chatPoll);

  // 사이드바 활성화
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.sb-sub-item').forEach(b=>b.classList.remove('active'));
  renderDeptSubMenu();

  const mb=document.getElementById('mainBody');
  if(!mb)return;
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';

  const headers={
    notice:['📢 공지사항','공지 및 피드'],
    chat:['💬 채팅','전체·부서·1:1 채팅'],
    home:['💼 전체 투표','모든 부서 투표 현황'],
    calendar:['🗓 캘린더','참여 내역 캘린더'],
    leave:['🏖️ 연차·경품','오락실 연차 및 경품 현황'],
    members:['👥 멤버 목록','부서별 사원 현황'],
    status:['📋 현황','제출 현황 확인'],
    settings:['⚙️ 설정','인사팀 전용 관리'],
  };
  const [title,sub]=headers[tab]||[tab,''];
  setMainHeader(title,sub);

  if(tab==='notice')loadNoticePage();
  if(tab==='chat')loadChatTab();
  if(tab==='home')loadHome();
  if(tab==='calendar')renderCalendar();
  if(tab==='leave')loadLeave();
  if(tab==='members')loadMembersPage();
  if(tab==='status')loadStatus();
  if(tab==='settings')loadSettings();
}

// ══════════════════════════════════════════════
// ── NOTICE ──
// ══════════════════════════════════════════════
async function loadNoticePage(){
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';

  // 헤더 액션
  if(isAdmin){
    setMainHeader('📢 공지사항','공지 및 피드',
      `<button class="btn-sm pri" onclick="openNoticeModal('feed')">+ 공지 작성</button>`);
  }

  const notices=await dbGet('notices');
  const noticeComments=await dbGet('noticeComments');
  _cachedData.notices=notices;_cachedData.noticeComments=noticeComments;

  const list=notices?Object.entries(notices).filter(([k,n])=>!n.deleted).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)):[];

  if(list.length===0){
    mb.innerHTML='<div class="empty"><div class="empty-icon">📭</div>공지가 없습니다</div>';
    return;
  }

  let html='<div style="padding:14px 0 80px">';
  list.forEach(([nid,n])=>{ html+=renderNoticeCard(nid,n,noticeComments); });
  html+='</div>';
  mb.innerHTML=html;
}

function renderNoticeCard(nid,n,allComments){
  const isAdmin=CU?.role==='admin';
  const comments=allComments?.[nid];
  const commentList=comments?Object.values(comments).sort((a,b)=>(a.time||0)-(b.time||0)):[];
  const isExpanded=_expandedNotice===nid;
  const body=n.body||'';
  const preview=body.length>80?body.slice(0,80)+'...':body;

  let html=`<div class="feed-card">`;
  html+=`<div class="feed-card-header">`;
  html+=`<div class="feed-card-icon" style="background:linear-gradient(135deg,#FFB347,#FF9F7A)">📢</div>`;
  html+=`<div style="flex:1;min-width:0">`;
  html+=`<div style="font-size:15px;font-weight:800;color:var(--text)">${escH(n.title||'')}</div>`;
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDate(n.createdAt)}${n.createdBy?' · '+escH(n.createdBy):''}</div>`;
  html+=`</div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openNoticeEditById('${nid}')">✏️</button>`;
    html+=`<button class="vbtn del" onclick="delNotice('${nid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div>`;

  // 본문
  html+=`<div style="padding:12px 14px;font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;cursor:pointer" onclick="toggleNoticeExpand('${nid}')">${escH(isExpanded?body:preview)}</div>`;
  if(body.length>80){
    html+=`<div style="padding:0 14px 8px"><button onclick="toggleNoticeExpand('${nid}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700">${isExpanded?'접기 ▲':'더보기 ▼'}</button></div>`;
  }

  // 댓글
  if(commentList.length>0){
    html+=`<div style="padding:8px 14px;border-top:1px solid var(--border)">`;
    commentList.forEach(cm=>{
      html+=`<div style="padding:5px 0;display:flex;gap:6px;align-items:flex-start">`;
      html+=`<div style="width:22px;height:22px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0">${(cm.name||'?')[0]}</div>`;
      html+=`<div><span style="font-size:12px;font-weight:700;color:var(--accent)">${escH(cm.name||'')}</span> <span style="font-size:13px">${escH(cm.body||'')}</span>`;
      html+=`<div style="font-size:10px;color:var(--text3)">${fmtDate(cm.time)}</div></div></div>`;
    });
    html+=`</div>`;
  }

  // 댓글 입력 (사원)
  if(!isAdmin){
    html+=`<div style="display:flex;gap:6px;padding:8px 10px 10px;border-top:1px solid var(--border)">`;
    html+=`<input id="cmtInput_${nid}" class="fi" placeholder="댓글..." style="flex:1;padding:8px 12px;font-size:13px">`;
    html+=`<button class="btn-sm pri" onclick="submitComment('${nid}')">등록</button>`;
    html+=`</div>`;
  }

  html+=`</div>`;
  return html;
}

function toggleNoticeExpand(nid){
  _expandedNotice=(_expandedNotice===nid)?null:nid;
  loadNoticePage();
}

async function submitComment(nid){
  const inp=document.getElementById('cmtInput_'+nid);
  const body=inp?.value.trim();
  if(!body){showToast('댓글을 입력하세요');return;}
  await dbPush(`noticeComments/${nid}`,{name:CU.name,body,time:Date.now()});
  showToast('💬 댓글 등록됨');
  loadNoticePage();
}

async function openNoticeEditById(nid){
  const n=await dbGet(`notices/${nid}`);
  if(!n)return;
  document.getElementById('noticeEditId').value=nid;
  document.getElementById('noticeModalTitle').textContent='📢 공지 수정';
  document.getElementById('noticeTitle').value=n.title||'';
  document.getElementById('noticeBody').value=n.body||'';
  document.getElementById('noticeModal').classList.add('active');
}

function openNoticeModal(type='feed'){
  document.getElementById('noticeEditId').value='';
  document.getElementById('noticeModalTitle').textContent='📢 공지 작성';
  document.getElementById('noticeTitle').value='';
  document.getElementById('noticeBody').value='';
  document.getElementById('noticeType').value=type;
  document.getElementById('noticeModal').classList.add('active');
}
function closeNoticeModal(){document.getElementById('noticeModal').classList.remove('active');}
function selectNoticeColor(btn,color){
  document.getElementById('noticeColor').value=color;
  document.querySelectorAll('#noticeColorPicker button').forEach(b=>b.style.border='2px solid transparent');
  btn.style.border='2px solid var(--accent)';
}
async function saveNotice(){
  const title=document.getElementById('noticeTitle').value.trim();
  const body=document.getElementById('noticeBody').value.trim();
  const nid=document.getElementById('noticeEditId').value;
  const color=document.getElementById('noticeColor').value||'#FFF3CD';
  if(!title){showToast('제목을 입력하세요');return;}
  if(nid){
    await dbSet(`notices/${nid}/title`,title);
    await dbSet(`notices/${nid}/body`,body);
    showToast('✅ 수정됨');
  }else{
    await dbPush('notices',{title,body,color,pinned:true,createdAt:Date.now(),createdBy:CU.name});
    showToast('✅ 등록됨');
  }
  closeNoticeModal();
  loadNoticePage();
}
async function delNotice(nid){
  if(!confirm('삭제하시겠습니까?'))return;
  await dbSet(`notices/${nid}/deleted`,true);
  showToast('🗑️ 삭제됨');loadNoticePage();
}

let _lastChatCount=0;

// ── 채팅 입장 상태: sessionStorage로 탭 이동해도 유지 ──
function getChatPath(room){
  if(!room)return null;
  if(room.type==='all')return 'chat';
  if(room.type==='dept')return `chat_dept/${room.id}`;
  return `chat_dm/${[CU?.key,room.id].sort().join('_')}`;
}
function getRoomKey(room){
  if(!room)return null;
  return room.type==='all'?'all':room.type==='dept'?'dept_'+room.id:'dm_'+[CU?.key,room.id].sort().join('_');
}
function isJoined(room){return sessionStorage.getItem('chatJoined_'+getRoomKey(room))==='1';}
function setJoined(room,v){
  const k='chatJoined_'+getRoomKey(room);
  if(v)sessionStorage.setItem(k,'1');else sessionStorage.removeItem(k);
}

// 메시지 롱프레스 메뉴
let _pressTimer=null;
let _msgMenuMid=null;

function showMsgMenu(mid,x,y){
  _msgMenuMid=mid;
  // 기존 메뉴 제거
  document.getElementById('msgCtxMenu')?.remove();
  const isAdmin=CU?.role==='admin';
  const menu=document.createElement('div');
  menu.id='msgCtxMenu';
  menu.style=`position:fixed;z-index:999;background:#2D1B14;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,0.35);overflow:hidden;min-width:160px;`;
  // 좌표: 화면 벗어나지 않게
  const mx=Math.min(x,window.innerWidth-170);
  const my=Math.min(y,window.innerHeight-160);
  menu.style.left=mx+'px';menu.style.top=my+'px';

  const items=[
    {icon:'📋',label:'복사',fn:`copyMsgText('${mid}')`},
    ...(isAdmin?[
      {icon:'🙈',label:'가리기',fn:`hideMsg('${mid}')`},
      {icon:'🗑️',label:'삭제',fn:`deleteChat('${mid}')`,red:true},
    ]:[]),
  ];
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.style=`display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:none;border:none;color:${item.red?'#FF5C5C':'rgba(255,255,255,0.85)'};font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06);`;
    btn.innerHTML=`<span>${item.icon}</span><span>${item.label}</span>`;
    btn.onclick=()=>{menu.remove();eval(item.fn);};
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  // 바깥 클릭하면 닫힘
  setTimeout(()=>document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h);},{once:true}),10);
}

function copyMsgText(mid){
  const msgs=window._currentMsgData||{};
  const m=msgs[mid];
  if(m?.body)navigator.clipboard.writeText(m.body).then(()=>showToast('📋 복사됨'));
}

async function hideMsg(mid){
  if(!_currentChatRoom)return;
  const path=getChatPath(_currentChatRoom);
  await dbSet(`${path}/${mid}/hidden`,true);
  showToast('🙈 가려졌습니다');
  fetchChatMessages();
}

async function deleteChat(mid){
  if(!confirm('완전히 삭제하시겠습니까?'))return;
  const path=getChatPath(_currentChatRoom);
  await dbSet(`${path}/${mid}/deleted`,true);
  fetchChatMessages();
}

function loadChatTab(){
const mb=document.getElementById('mainBody');
const isAdmin=CU?.role==='admin';

if(!_currentChatRoom){
  let html='<div style="padding-bottom:60px">';
  html+=`<div style="padding:12px 16px 6px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.5px">채팅방</div>`;

  const allJoined=isJoined({type:'all',id:'all'});
  html+=`<div class="chat-room-item" onclick="selectChatRoom('all','all','전체 채팅')">`;
  html+=`<div class="chat-room-avatar" style="background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white">💬</div>`;
  html+=`<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">전체 채팅</div>`;
  html+=`<div style="font-size:11px;color:${allJoined?'var(--green)':'var(--text3)'}">${allJoined?'● 입장중':'미입장'}</div></div>`;
  if(isAdmin)html+=`<button onclick="event.stopPropagation();toggleChatLock('all','all')" style="font-size:11px;padding:4px 8px;border-radius:8px;border:none;cursor:pointer;background:var(--surface2);color:var(--text2);margin-right:4px">🔒</button>`;
  html+=`<span style="font-size:20px;color:var(--text3)">›</span></div>`;

  Object.entries(groups).forEach(([gid,g])=>{
    const joined=isJoined({type:'dept',id:gid});
    html+=`<div class="chat-room-item" onclick="selectChatRoom('dept','${gid}','${escH(g.name)} 채팅')">`;
    html+=`<div class="chat-room-avatar" style="background:${g.color||'#FF7F6E'}22;color:${g.color||'#FF7F6E'};font-size:15px;font-weight:800">${escH(g.name[0])}</div>`;
    html+=`<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">${escH(g.name)}</div>`;
    html+=`<div style="font-size:11px;color:${joined?'var(--green)':'var(--text3)'}">${joined?'● 입장중':'미입장'}</div></div>`;
    if(isAdmin)html+=`<button onclick="event.stopPropagation();toggleChatLock('dept','${gid}')" style="font-size:11px;padding:4px 8px;border-radius:8px;border:none;cursor:pointer;background:${g.lock?'rgba(255,92,92,0.1)':'var(--surface2)'};color:${g.lock?'var(--red)':'var(--text2)'};margin-right:4px">${g.lock?'🔒':'🔓'}</button>`;
    html+=`<span style="font-size:20px;color:var(--text3)">›</span></div>`;
  });
  html+='</div>';
  mb.innerHTML=html;
  return;
}

const room=_currentChatRoom;
const joined=isJoined(room)||isAdmin;
const gColor=room.type==='dept'?(groups[room.id]?.color||'var(--accent)'):'var(--accent)';
let html='';
html+=`<div style="padding:10px 16px;border-bottom:1px solid var(--border);background:white;display:flex;align-items:center;gap:10px;flex-shrink:0">`;
html+=`<button onclick="backToChatList()" style="background:var(--surface2);border:none;border-radius:10px;padding:7px 12px;font-size:14px;font-weight:700;color:var(--text2)">‹ 목록</button>`;
html+=`<div style="flex:1"><div style="font-size:14px;font-weight:800">${escH(room.name)}</div>`;
html+=`<div id="chatMemberCount" style="font-size:11px;color:var(--text3)">참여자 확인 중...</div></div>`;
if(joined&&!isAdmin)html+=`<button onclick="leaveChat()" style="background:rgba(255,92,92,0.1);border:none;color:var(--red);padding:7px 14px;border-radius:10px;font-size:13px;font-weight:700">퇴장</button>`;
html+=`</div>`;
if(!joined){
  html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px">`;
  html+=`<div style="width:64px;height:64px;background:${gColor}22;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px">💬</div>`;
  html+=`<div style="text-align:center"><div style="font-size:16px;font-weight:800">${escH(room.name)}</div><div style="font-size:13px;color:var(--text3);margin-top:4px">비밀번호를 입력하세요</div></div>`;
  html+=`<div style="width:100%;max-width:280px">`;
  html+=`<input id="chatPwInput" class="fi" type="password" placeholder="비밀번호 입력" style="text-align:center;font-size:18px;letter-spacing:6px;margin-bottom:10px" onkeyup="if(event.key==='Enter')joinChat()">`;
  html+=`<button onclick="joinChat()" style="width:100%;padding:13px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border:none;border-radius:14px;font-size:15px;font-weight:800">입장하기</button>`;
  html+=`</div></div>`;
}else{
  html+=`<div id="chatMessages" style="flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:6px"></div>`;
  html+=`<div style="padding:10px 14px 12px;border-top:1px solid var(--border);background:white;display:flex;gap:8px;align-items:flex-end;flex-shrink:0">`;
  html+=`<textarea id="chatInput" rows="1" placeholder="메시지 입력..." onkeydown="chatKeydown(event)" oninput="autoResize(this)" style="flex:1;border:1.5px solid var(--border);border-radius:18px;padding:9px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.5;background:var(--cream)"></textarea>`;
  html+=`<button onclick="sendChat()" style="width:40px;height:40px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);border:none;border-radius:50%;color:white;font-size:17px;flex-shrink:0;box-shadow:0 3px 10px rgba(255,127,110,0.3)">➤</button>`;
  html+=`</div>`;
}
mb.innerHTML=`<div style="display:flex;flex-direction:column;height:calc(100vh - 110px)">${html}</div>`;
if(joined||isAdmin){fetchChatMessages();clearInterval(window._chatPoll);window._chatPoll=setInterval(fetchChatMessages,4000);loadChatMemberCount();}
}
