<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📋 인트라넷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FFF9FC;--surface:#FFFFFF;--surface2:#FFF0E0;--border:#FFD6EA;
  --text:#2D1414;--text2:#A0566B;--text3:#C4A0B0;
  --accent:#FF85C1;--accent2:#FFB3D9;--peach:#FFE8F3;--cream:#FFF9FC;
  --green:#f87286;--red:#FF5C5C;--gold:#FFB347;--blue:#5B9BD5;
  --mint:#fde8eb;--minttext:#f87286;--brown:#C97A40;--beigebg:#FFF0E0;
  --sidebar:#2D1B14;--sidebar2:#3D2820;--sidebar3:#4D3830;
  --shadow:0 2px 16px rgba(255,127,110,0.1);--shadow2:0 6px 32px rgba(255,127,110,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
button,input,textarea,select{font-family:'Pretendard',sans-serif;}
button{cursor:pointer;}

/* ── 로그인 ── */
#loginPage{position:fixed;inset:0;z-index:999;background:url("https://res.cloudinary.com/dcmohbbyi/image/upload/q_auto/f_auto/v1779529932/IMG_2100_pgoqa5.png") center/cover no-repeat;display:none;flex-direction:column;align-items:center;justify-content:center;padding-bottom:60px;overflow-y:auto;}
.login-profile-area{width:100%;display:flex;flex-direction:column;align-items:center;padding:24px 24px 12px;}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#FF85C1,#FFB3D9);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;box-shadow:0 8px 24px rgba(255,133,193,0.3);}
.login-title{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#FF85C1,#f87286);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-shadow:none;filter:drop-shadow(0 2px 4px rgba(255,133,193,0.3));}
.login-sub{font-size:13px;color:#333;font-weight:600;}
.login-card{width:100%;max-width:400px;background:white;border-top:1px solid var(--border);}
.login-sec{padding:22px 22px 16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.login-sec+.login-sec{border-top:1px solid rgba(255,255,255,0.2);}
.login-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;}
.fi{width:100%;padding:12px 16px;background:var(--cream);border:1.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);outline:none;transition:all 0.2s;box-sizing:border-box;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,127,110,0.1);}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:800;margin-top:10px;transition:all 0.15s;}
.login-btn.member{background:linear-gradient(135deg,#FF85C1,#f87286);color:white;box-shadow:0 4px 16px rgba(255,133,193,0.3);}
.login-btn.admin{background:linear-gradient(135deg,#FF85C1,#f87286);color:white;}
.login-btn:active{transform:scale(0.97);}

/* ── 앱 레이아웃 ── */
#app{display:flex;height:100vh;flex-direction:column;}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.main-header{background:#FF85C1;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-title{font-size:16px;font-weight:800;color:#fff;}
.main-header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:1px;}
.main-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── 탭바 ── */
.tab-bar{display:flex;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid var(--border);padding:8px 10px;gap:6px;flex-shrink:0;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-item{flex:0 0 auto;padding:7px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#FFF0E0;color:#C97A40;font-family:'Pretendard',sans-serif;white-space:nowrap;transition:all 0.15s;}
.tab-item.active{background:var(--group-color,#FF85C1);color:white;font-weight:700;}
.tab-item:hover:not(.active){background:#FFE8F3;color:#FF85C1;}
.sb-logo-text{display:none;}
.sb-user{display:flex;align-items:center;justify-content:center;}
.sb-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;position:relative;}
.sb-avatar.admin-av{background:linear-gradient(135deg,#FFB347,#FF9F7A);}
.online-dot{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#5DB88A;border:2px solid var(--sidebar);}
.sb-user-info{display:none;}
.sb-name{display:none;}
.sb-role{display:none;}
.sb-logout{display:none;}

/* 나가기 버튼 (아이콘) */
.sb-logout-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;width:100%;border:none;background:none;color:rgba(255,255,255,0.4);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.12s;}
.sb-logout-btn:hover{background:rgba(255,92,92,0.15);color:#FF9F7A;}
.sb-logout-btn span:first-child{font-size:18px;}

/* 메뉴 */
.sb-menu{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:none;}
.sb-menu::-webkit-scrollbar{display:none;}
.sb-section{padding:2px 0;}
.sb-section-label{display:none;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;width:60px;border-radius:0;cursor:pointer;transition:all 0.12s;color:rgba(255,255,255,0.55);font-size:10px;font-weight:600;border:none;background:none;position:relative;overflow:hidden;}
.sb-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);}
.sb-item.active{background:rgba(255,127,110,0.2);color:#FF9F7A;font-weight:700;}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.sb-item-icon{font-size:18px;}
.sb-badge{background:#FF5C5C;color:white;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}

/* 부서 서브메뉴 */
.sb-sub-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;width:60px;cursor:pointer;color:rgba(255,255,255,0.4);font-size:9px;font-weight:600;border:none;background:none;transition:all 0.12s;}
.sb-sub-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.04);}
.sb-sub-item.active{color:#FF9F7A;font-weight:700;}
.sb-dept-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* 오락실 버튼 */
.sb-game{margin:6px 6px;background:rgba(108,53,222,0.2);border:1px solid rgba(108,53,222,0.3);color:#A78BFA;padding:7px 4px;border-radius:8px;font-size:9px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;}
.sb-game:hover{background:rgba(108,53,222,0.3);}
.sb-game-icon{font-size:18px;}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.main-header{background:#FF85C1;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-header-title{font-size:16px;font-weight:800;color:#fff;}
.main-header-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:1px;}
.main-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── 공통 컴포넌트 ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(45,27,20,0.9);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.active{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 0.2s;}
.overlay.active .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.fl{margin-bottom:12px;}
.fl label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn-pri{flex:1;padding:13px;background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;}
.btn-sec{flex:1;padding:13px;background:var(--surface2);color:var(--text2);border:none;border-radius:14px;font-size:15px;font-weight:700;}
.btn-sm{padding:8px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-sm.pri{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;}
.btn-sm.sec{background:var(--surface2);color:var(--text2);}
.card{background:white;border-radius:16px;border:1px solid var(--border);margin:0 14px 12px;overflow:hidden;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.loading{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.stitle{font-size:14px;font-weight:800;color:var(--text2);padding:0 16px 8px;}

/* ── 투표 카드 ── */
.vopt{position:relative;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:white;margin-bottom:6px;transition:all 0.15s;cursor:pointer;overflow:hidden;-webkit-user-select:none;min-height:46px;box-sizing:border-box;}
.vopt.closed{cursor:default;}
.vopt.selected{border-color:var(--accent);background:rgba(255,127,110,0.06);}
.vopt:not(.closed):not(.selected):active{background:var(--cream);}
.vbar{position:absolute;left:0;top:0;bottom:0;background:rgba(255,127,110,0.08);transition:width 0.4s;z-index:0;border-radius:12px;pointer-events:none;}
.vopt-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;z-index:1;transition:all 0.15s;}
.vopt.selected .vopt-chk{background:var(--accent);border-color:var(--accent);}
.vopt-label{flex:1;font-size:14px;font-weight:600;color:var(--text);z-index:1;}
.vopt-cnt{font-size:12px;font-weight:700;color:var(--text3);z-index:1;}
.vbtn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.vbtn.edit{background:rgba(91,155,213,0.1);color:var(--blue);}
.vbtn.copy{background:rgba(255,179,71,0.1);color:var(--gold);}
.vbtn.close{background:rgba(255,92,92,0.1);color:var(--red);}
.vbtn.open{background:rgba(93,184,138,0.1);color:var(--green);}
.vbtn.del{background:rgba(255,92,92,0.08);color:var(--red);}
.vbtn.reset{background:rgba(255,179,71,0.1);color:var(--gold);}
.voted-badge{background:rgba(93,184,138,0.1);color:var(--green);font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;}
.closed-badge{background:rgba(100,100,100,0.12);color:#888;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;text-align:center;border:1px solid rgba(100,100,100,0.15);}
.link-list{border-top:1px solid var(--border);padding:10px 16px;}
.link-list-title{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;}
.link-item{padding:5px 0;border-bottom:1px solid var(--surface2);}
.link-num-name{font-size:12px;font-weight:700;}
.link-url a{font-size:11px;color:var(--blue);word-break:break-all;}
.link-form{padding:10px 16px;border-top:1px solid var(--border);}
.vadmin{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap;}

/* ── 캘린더 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px 12px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 12px 4px;}
.cal-dh{text-align:center;font-size:11px;font-weight:700;color:var(--text3);}
.cal-cell{min-height:36px;border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:3px;cursor:pointer;transition:background 0.1s;}
.cal-cell:hover{background:var(--cream);}
.cal-cell.today .cal-dn{background:var(--accent);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:var(--peach);border-radius:8px;}
.cal-cell.selected .cal-dn{color:#FF85C1;font-weight:800;}
.cal-cell.today.selected .cal-dn{background:var(--accent);color:white;font-weight:800;}
.cal-dn{font-size:12px;font-weight:600;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-dn.sun{color:var(--red);}
.cal-dn.sat{color:var(--blue);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:1px;}

/* ── 채팅 ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;}
.msg-row.me{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.msg-content{display:flex;flex-direction:column;gap:3px;max-width:70%;}
.msg-row.me .msg-content{align-items:flex-end;}
.msg-name{font-size:11px;font-weight:700;color:var(--text3);padding:0 4px;}
.msg-bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg-bubble.other{background:white;border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(255,127,110,0.08);}
.msg-bubble.me{background:linear-gradient(135deg,#FF9F7A,#FF7F6E);color:white;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px;}
.msg-date-sep{text-align:center;font-size:11px;color:var(--text3);padding:10px 0 4px;font-weight:600;}
.chat-room-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.chat-room-item:hover{background:var(--cream);}
.chat-room-item.active{background:rgba(255,127,110,0.07);}
.chat-room-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;flex-shrink:0;}

/* ── 멤버 리스트 ── */
.member-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,220,210,0.3);transition:background 0.1s;}
.member-item:hover{background:var(--cream);}
.member-avatar{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0;position:relative;}
.member-online-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:#5DB88A;border:2px solid white;}

/* ── 피드 카드 ── */
.feed-card{background:white;border-radius:16px;margin:0 14px 12px;box-shadow:0 2px 12px rgba(255,127,110,0.08);border:1px solid rgba(255,210,200,0.5);overflow:hidden;}
.feed-card-header{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(255,220,210,0.4);}
.feed-card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.feed-card-footer{display:flex;border-top:1px solid rgba(255,220,210,0.4);}
.feed-footer-btn{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;background:none;border:none;cursor:pointer;}
.feed-footer-btn:not(:last-child){border-right:1px solid rgba(255,220,210,0.4);}

/* ── 설정 ── */
.setting-section{padding:16px;}
.setting-section+.setting-section{border-top:8px solid var(--bg);}
.setting-section-title{font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.linkfield::placeholder{color:#9C8090;opacity:1}
.linkfield::-webkit-input-placeholder{color:#9C8090}
</style>

<!-- Firebase SDK -->

// 코드 보호

  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U')){

  }

</script>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="updateBanner" style="display:none;position:sticky;top:0;left:0;right:0;z-index:9999;background:#FF85C1;color:white;padding:10px 14px;align-items:center;justify-content:space-between;font-size:13px;font-weight:700">
  <span>🔔 새 버전이 있어요</span>
  <button onclick="hardUpdate()" style="background:white;color:#FF5C9D;border:none;border-radius:14px;padding:6px 16px;font-size:12px;font-weight:800;cursor:pointer">업데이트</button>
</div>

<!-- ══ LOGIN ══ -->
<div id="initLoader" style="position:fixed;inset:0;background:#fff5f9;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="font-size:40px;animation:spin 1s linear infinite">🌸</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="loginPage">
  <div style="width:100%;max-width:400px;margin:0 auto;display:flex;flex-direction:column;align-items:center;padding:10px 20px 20px;position:relative;z-index:1">
    <!-- 상단 로고/타이틀 -->
    <div style="margin-bottom:28px">
      <div style="width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,133,193,0.4);display:flex;align-items:center;justify-content:center;">
          <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
            <text x="80" y="68" text-anchor="middle"
              font-family="'Noto Sans KR','Pretendard',sans-serif"
              font-size="38" font-weight="900"
              fill="#FF85C1">떠리원</text>
            <text x="80" y="96" text-anchor="middle"
              font-family="'Noto Sans KR','Pretendard',sans-serif"
              font-size="16" font-weight="900"
              fill="#FF85C1">인트라넷</text>
          </svg>
      </div>
    </div>
    <!-- 로그인 카드 -->
    <div style="width:100%;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(255,133,193,0.2)">

const PUSH_VAPID_PUBLIC='BG78RcN8A7JqKrxERb0Cit0ukOL1NpsI1VPSMD6GJ-d_Vu8gTIWb93GsX_xMvU7jlYeTlkjLM1IJs98czLJ2iwQ';
const PUSH_SERVER='https://crew31-push.ys1004dm.workers.dev';
// 그룹별 하루 연차(프패) 사용 가능 정원. 그룹명 기준. 목록에 없으면 기본 3명.
const LEAVE_QUOTA = {'시크릿':1,'좋아요':3,'댓글':3};
function getLeaveQuota(groupName){ return LEAVE_QUOTA[groupName] !== undefined ? LEAVE_QUOTA[groupName] : 3; }

let _pushReady=false;

// 로그인 시 기존 구독 자동 복원
async function checkExistingPushSub(){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
    const reg = await navigator.serviceWorker.ready;
    if(!reg)return;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      // 구독 해제됨 → 자동 재구독
      const vapidRes = await fetch(`${WORKER_URL}/vapid-public`);
      if(!vapidRes.ok)return;
      const {key} = await vapidRes.json();
      sub = await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(key)
      });
    }
    const userKey=CU?.key||CU?.name||'guest';
    await fetch(`${WORKER_URL}/subscribe`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subscription:sub.toJSON(),userKey,userName:CU?.name||''})
    });
    _pushReady=true;
  }catch(e){console.warn('checkExistingPushSub:',e);}
}

async function initWebPush(){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){
      showToast('이 브라우저는 푸시 알림을 지원하지 않습니다');return;
    }
    // 서비스워커 등록
    const reg=await navigator.serviceWorker.register(
      'https://5sq224fdw5-eng.github.io/crew31-sw.js',
      {scope:'/'}
    );
    await navigator.serviceWorker.ready;
    // 알림 권한 요청
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){showToast('알림 권한이 거부됐습니다');return;}
    // 기존 구독 확인
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      // 새로 구독
      sub=await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8(PUSH_VAPID_PUBLIC)
      });
    }
    // 서버에 구독 등록
    const userKey=CU?.key||CU?.name||'guest';
    await fetch(`${PUSH_SERVER}/subscribe`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subscription:sub.toJSON(),userKey,userName:CU?.name||'게스트'})
    });
    _pushReady=true;
    showToast('✅ 푸시 알림이 활성화됐습니다!');
    loadNotiPage();
  }catch(e){
    console.warn('Web Push 초기화 실패:',e);
    showToast('푸시 알림 설정 실패: '+e.message);
  }
}

function urlBase64ToUint8(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

function getDeviceId(){
  // 기기마다 고유한 영구 ID (다른 사람의 서버 세션으로 잘못 복원되는 것 방지)
  try{
    let id=localStorage.getItem('crew31DeviceId');
    if(!id){
      id=(Date.now().toString(36)+Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,10));
      localStorage.setItem('crew31DeviceId',id);
    }
    return id;
  }catch{ return 'nodev'; }
}
function getSessionKey(){
  try{
    const ua=btoa(unescape(encodeURIComponent(navigator.userAgent))).replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
    return (ua+'_'+getDeviceId()).slice(0,40);
  }
  catch{ return 'default_session_key'; }
}

// 다운로드 절감(핵심): loadDeptPage가 votes 전체를 받지 않고
// 해당 그룹 + 'all' 투표만 인덱스 쿼리로 받게 한다.
// votes/group 인덱스가 없거나 쿼리 오류면 자동으로 기존 전체읽기로 폴백 -> 절대 안 깨짐.
async function dbGetVotesForGroup(gid){
  const q = async (g)=>{
    try{
      const url = `${DB}/votes.json?orderBy=${encodeURIComponent('"group"')}&equalTo=${encodeURIComponent('"'+g+'"')}`;
      const controller=new AbortController();
      const t=setTimeout(()=>controller.abort(),8000);
      const r=await fetch(url,{signal:controller.signal});
      clearTimeout(t);
      if(!r.ok) return undefined;      // 인덱스 없음/오류 -> 폴백 신호
      const j=await r.json();
      return j||{};                    // 성공(빈 결과 포함)
    }catch{ return undefined; }
  };
  const [a,b] = await Promise.all([ q(gid), q('all') ]);
  if(a===undefined && b===undefined){
    return await dbGet('votes');       // 쿼리 자체 실패 -> 기존 방식으로 안전 폴백
  }
  return Object.assign({}, (a===undefined?{}:a), (b===undefined?{}:b));
}
async function dbSet(p,d,retry=0){

    if(!res.ok && retry<2){ await new Promise(r=>setTimeout(r,500)); return dbSet(p,d,retry+1); }
  }catch(e){
    if(retry<2){ await new Promise(r=>setTimeout(r,500)); return dbSet(p,d,retry+1); }
    console.error('dbSet error',p,e);
  }
}

// 앱이 폰에 심어진 코드 버전. 새로 배포할 때마다 이 숫자가 올라간다(빌드 시점 기준 고정값).
const APP_BUILD = 20260601;

// 서버(Firebase)에 저장된 목표 버전을 확인해서, 내 코드가 낮으면 자동으로 캐시 비우고 새로고침.
// 관리자가 "전체 업데이트 배포"를 누르면 서버 버전이 올라가고, 각 폰은 앱 열 때 이걸 감지해 스스로 갱신된다.
async function checkAppVersion(){
  try{
    const target = await dbGet('appTargetBuild');
    if(typeof target !== 'number') return;
    // 한 번 갱신 시도했는데도 여전히 낮으면(=이미 최신 코드인데 서버값이 더 큰 비정상) 무한루프 방지
    const triedAt = parseInt(sessionStorage.getItem('appVerTried')||'0',10);
    if(target > APP_BUILD && Date.now()-triedAt > 60000){
      sessionStorage.setItem('appVerTried', String(Date.now()));
      // 캐시 + 서비스워커 정리 후 새 주소로 강제 로드
      try{ if('caches' in window){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); } }catch(e){}
      try{ if('serviceWorker' in navigator){ const rs=await navigator.serviceWorker.getRegistrations(); await Promise.all(rs.map(r=>r.unregister().catch(()=>{}))); } }catch(e){}
      const base = location.href.split('?')[0].split('#')[0];
      location.replace(base + '?v=' + target);
      return true; // 갱신 진행됨
    }
  }catch(e){}
  return false;
}

// 홈 추가 앱(PWA)이 구버전을 캐시할 때: 캐시 전부 비우고 최신으로 다시 로드
async function hardUpdate(){
  showToast('🔄 최신 버전 받는 중...');
  // 0) 새 버전 표식을 내 기준으로 갱신 (배너 다시 안 뜨게)
  try{
    const srv = await dbGet('appReleaseAt');
    if(srv) localStorage.setItem('seenReleaseAt', String(srv));
  }catch(e){}
  // 1) 모든 캐시 삭제
  try{ if('caches' in window){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); } }catch(e){}
  // 2) 서비스워커 완전 해제 (옛 SW가 옛 HTML 주는 문제 제거)
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
    }
  }catch(e){}
  // 3) 캐시 무력화 쿼리스트링 붙여 강제 새로 로드
  setTimeout(()=>{
    try{
      const base = location.href.split('?')[0].split('#')[0];
      location.replace(base + '?v=' + Date.now());
    }catch(e){ location.reload(); }
  }, 500);
}

// 새 공지 빨간불: 최신 공지 시각이 마지막으로 본 시각보다 나중이면 점 표시
async function checkNoticeDot(){
  try{
    const allNotices = await dbGet('notices');
    if(!allNotices){ return; }
    const times = Object.values(allNotices).filter(n=>n&&!n.deleted).map(n=>n.time||0);
    if(!times.length) return;
    const latest = Math.max(...times);
    const seen = Number(localStorage.getItem('seenNoticeAt')||'0');
    const dot = document.getElementById('noticeDot');
    if(dot) dot.style.display = (latest>seen) ? 'inline-block' : 'none';
  }catch(e){}
}

async function saveScheduledPopup(){

  if(!c){ showToast('내용을 입력하세요'); return; }
  const at=new Date(d+'T'+t).getTime();
  if(isNaN(at)){ showToast('날짜/시간 형식 오류'); return; }
  const prev=await dbGet('scheduledPopup');
  const id=(prev&&prev.id)?prev.id:('p'+Date.now());
  await dbSet('scheduledPopup',{id,at,content:c});
  showToast('✅ 예약 공지 저장됨'); loadSettings&&loadSettings();
}

async function diagMissingVoter(){
  const name = prompt('진단할 사람 이름 (예: 이든맘)', '이든맘');
  if(!name) return;
  const date = prompt('날짜 (예: 2026-06-01)', '2026-06-01');
  const votes = await dbGet('votes')||{};
  let out = `[${name}] ${date} 표 위치 진단\n\n`;
  let found = 0;
  Object.entries(votes).forEach(([vid,v])=>{
    if(!v||v.deleted) return;
    const dd = (typeof getTitleDate==='function'? (getTitleDate(v)||v.date) : v.date);
    if(date && dd!==date) return;
    const respKeys = Object.keys(v.responses||{});
    const matchKeys = respKeys.filter(k=>k===name || k.includes(name));
    const imgKeys = Object.keys(v.images||{}).filter(k=>k===name||k.includes(name));
    if(matchKeys.length>0 || imgKeys.length>0){
      found++;
      out += `■ ${v.title||''}\n  그룹:${v.group} / vid:${vid.slice(0,8)}\n`;
      matchKeys.forEach(k=>{ out += `  응답키="${k}" → ${(v.options||[])[v.responses[k]]||v.responses[k]}\n`; });
      imgKeys.forEach(k=>{ out += `  이미지키="${k}" (${(v.images[k]||[]).length}장)\n`; });
      out += `\n`;
    }
  });
  if(found===0) out += `⚠️ 이 날짜 투표 어디에도 "${name}" 표가 없습니다.\n(이름·날짜 확인)`;
  else out += `\n→ 총 ${found}개 투표에서 발견`;
  alert(out);
}

async function diagAttendance(){
  const name = prompt('이름 (예: 불주먹)','');
  if(!name) return;
  const allAtt = await dbGet('attendance')||{};
  let out = `[${name}] 출석 기록 진단\n\n`;
  const hits = [];
  for(const [gid, weeks] of Object.entries(allAtt)){
    const gname = groups[gid]?.name || gid;
    for(const [wk, mem] of Object.entries(weeks||{})){
      const my = mem?.[name];
      if(my && typeof my==='object'){
        for(const [date, val] of Object.entries(my)){
          if(val) { out += `■ ${gname}(${gid}) / 주:${wk}\n  ${date} = ${JSON.stringify(val)}\n`; hits.push({gid,wk,name,date}); }
        }
      }
    }
  }
  if(hits.length===0){ alert(out+'기록 없음'); return; }
  out += `\n총 ${hits.length}건. 특정 날짜를 지우려면 확인을 누르고 날짜 입력.`;
  if(!confirm(out+'\n\n잘못된 기록을 지울까요?')) return;
  const delDate = prompt('지울 날짜 (예: 2026-06-02). 그룹은 아래에서 선택','2026-06-02');
  if(!delDate) return;
  const target = hits.filter(h=>h.date===delDate);
  if(target.length===0){ alert('그 날짜 기록 없음'); return; }
  let msg = '지울 대상:\n';
  target.forEach((t,i)=> msg += `${i+1}. ${groups[t.gid]?.name||t.gid} ${t.date}\n`);
  const gidPick = prompt(msg+'\n그룹 gid 입력 (예: g1). 전부면 ALL', target[0].gid);
  if(!gidPick) return;
  const toDel = gidPick==='ALL' ? target : target.filter(t=>t.gid===gidPick);
  for(const t of toDel){
    await dbDelete(`attendance/${t.gid}/${t.wk}/${t.name}/${t.date}`);
  }
  showToast(`🗑️ ${toDel.length}건 삭제됨`);
  loadHeaderWeeklyAtt();
}

(function(){
  function bindLongPress(){
    const btn=document.getElementById('reloadBtn');
    if(!btn||btn._lpBound)return;
    btn._lpBound=true;
    let timer=null,fired=false;
    const start=()=>{fired=false;timer=setTimeout(()=>{fired=true;hardUpdate();},600);};
    const cancel=()=>{ if(timer){clearTimeout(timer);timer=null;} };
    btn.addEventListener('touchstart',start,{passive:true});
    btn.addEventListener('touchend',cancel);
    btn.addEventListener('touchmove',cancel,{passive:true});
    btn.addEventListener('mousedown',start);
    btn.addEventListener('mouseup',cancel);
    btn.addEventListener('mouseleave',cancel);
    // 길게 눌러 강제업데이트가 실행된 경우, 뒤이은 click(새로고침) 무시
    btn.addEventListener('click',(e)=>{ if(fired){e.stopImmediatePropagation();e.preventDefault();fired=false;} },true);
  }
  if(document.readyState!=='loading')bindLongPress();
  else document.addEventListener('DOMContentLoaded',bindLongPress);
})();

// (자동 강제 업데이트 제거됨) — 각 사용자가 🔄 길게 눌렀을 때만 갱신됩니다.

(function(){
  if(!('serviceWorker' in navigator)) return;
  async function watch(){
    try{
      const reg=await navigator.serviceWorker.getRegistration();
      if(!reg) return;
      reg.update().catch(()=>{}); // 새 SW 다운로드만 (강제 적용·새로고침 안 함)
    }catch(e){}
  }
  watch();
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') watch(); });
})();

// ── 자동 투표 스케줄러 ──
async function checkAutoVote(){
  if(CU?.role!=='admin')return;
  const schedule = await dbGet('autoVoteSchedule');
  if(!schedule||!schedule.enabled)return;

  const now = new Date();
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const todayStr2 = now.toISOString().slice(0,10);
  const tomorrow = new Date(now.getTime() + 24*60*60*1000);
  const tomorrowStr2 = tomorrow.toISOString().slice(0,10);
  const _days=['일','월','화','수','목','금','토'];
  const dateLabel = `${now.getMonth()+1}월 ${now.getDate()}일 ${_days[now.getDay()]}요일`;

  // 이미 같은 제목의 투표가 오늘 존재하는지 확인 (여러 기기 중복 생성 방지)
  const existingVotes = await dbGet('votes') || {};
  function voteExists(title, group){
    return Object.values(existingVotes).some(sv=>sv && !sv.deleted && sv.group===group && sv.title===title);
  }
  // 서버 가드: autoVoteGuard/{gid}_{date}_{type} 를 원자적으로 선점
  async function claimGuard(key){
    try{
      const existing = await dbGet(`autoVoteGuard/${key}`);
      if(existing) return false;          // 이미 누군가 생성함
      await dbSet(`autoVoteGuard/${key}`, {t:Date.now(), by:CU?.name||'admin'});
      return true;
    }catch(e){ return false; }
  }

  for(const [gid, sch] of Object.entries(schedule.groups||{})){
    if(!sch.enabled) continue;

    // 시작 투표 자동 생성
    if(sch.startTime && hhmm === sch.startTime){
      const title = `${dateLabel} 출근`;
      const guardKey = `start_${gid}_${todayStr2}`;
      if(localStorage.getItem('autoVoteDone_'+guardKey)) continue;
      localStorage.setItem('autoVoteDone_'+guardKey,'1');   // 같은 기기 즉시 차단
      if(voteExists(title, gid)) continue;                  // 이미 생성됨
      if(!(await claimGuard(guardKey))) continue;           // 서버 선점 실패 → 다른 기기가 생성
      const gData = groups[gid]||{};
      let opts = ['오늘 출근할게요 (참여)','오늘 연차 쓸게요 (프패)','오늘 당직이에요 (당직)','열정페이 (봉사)','재능기부 (노피드)','오늘 일당 두배닷✨ (투피드)'];
      if(groups[gid]?.name==='시크릿') opts = opts.filter(o=>!o.includes('당직')); // 시크릿 그룹은 당직 선택지 제외
      const startData = {title,group:gid,date:todayStr2,time:sch.startCloseTime||'22:00',options:opts,createdAt:Date.now()};
      if(sch.startMode==='image') startData.imageUpload=true;
      await dbPush('votes',startData);
      showToast(`🗳️ ${gData.name} 시작 투표 자동 생성됨${sch.startMode==='image'?' (이미지)':''}`);
      loadHome();
    }

    // 완료 투표 자동 생성
    if(sch.endTime && hhmm === sch.endTime){
      const title = `${dateLabel} 퇴근`;
      const guardKey = `end_${gid}_${todayStr2}`;
      if(localStorage.getItem('autoVoteDone_'+guardKey)) continue;
      localStorage.setItem('autoVoteDone_'+guardKey,'1');
      if(voteExists(title, gid)) continue;
      if(!(await claimGuard(guardKey))) continue;
      const gData = groups[gid]||{};
      const opts = ['퇴근할게요 (완료)','열정페이 (봉사)','재능기부 (노피드)','오늘 일당 두배닷✨ (투피드)'];
      const endData = {title,group:gid,date:tomorrowStr2,time:sch.endCloseTime||'13:00',options:opts,createdAt:Date.now()};
      if(sch.endMode==='image') endData.imageUpload=true;
      await dbPush('votes',endData);
      showToast(`🗳️ ${gData.name} 완료 투표 자동 생성됨${sch.endMode==='image'?' (이미지)':''}`);
      loadHome();
    }
  }
}

    // 저장된 그룹 없으면 첫 번째 그룹(좋아요) 자동 선택 → 투표 첫 화면
    const firstGid = Object.keys(groups)[0];
    if(firstGid){
      _currentDept = firstGid;
      renderGroupSelectBar();
      if(_standaloneTabs.includes(savedTab)){ try{ goTab(savedTab); }catch(e){ selectGroup(firstGid); } }
      else selectGroup(firstGid);
    } else {
      try{goTab(lastTab);}catch(e){console.error('goTab error',e);}
      renderGroupSelectBar();
    }
  }
  setTimeout(()=>startNotiPolling(),2000);
  setTimeout(()=>checkWarnPopup(),1800);
  setTimeout(()=>startAutoVoteScheduler(),3000);
  setTimeout(()=>checkExistingPushSub(),3000);
}

// Safari bfcache 대응
// ── 세션 복원 헬퍼 ──
function readLocalUser(){
  try{ const s=localStorage.getItem('crew31User'); if(s) return s; }catch{}
  try{ const s=sessionStorage.getItem('crew31User'); if(s) return s; }catch{}
  try{ const m=document.cookie.match(/crew31User=([^;]+)/); if(m) return decodeURIComponent(m[1]); }catch{}
  return null;
}
async function readRemoteUser(){
  for(let i=0;i<2;i++){
    try{
      const s=await dbGet(`sessions/${getSessionKey()}`);
      if(s && s.user && s.t && Date.now()-s.t < 30*24*60*60*1000) return JSON.stringify(s.user);
    }catch{}
    if(i===0) await new Promise(r=>setTimeout(r,600));
  }
  return null;
}
// 인앱 브라우저는 기기 구분이 불안정 → 서버세션 복원을 막아 남의 계정으로 들어가는 것 방지
async function readRemoteUserSafe(){
  if(isInAppBrowser()) return null;
  return await readRemoteUser();
}
async function restoreSession(){
  if(CU) return true;
  let saved = readLocalUser();
  if(!saved) saved = await readRemoteUserSafe();
  if(saved){
    try{ CU=JSON.parse(saved); await enterApp(); return true; }
    catch(e){ console.error('restoreSession error', e); }
  }
  return false;
}

window.addEventListener('pageshow', (e)=>{
  if(e.persisted && !CU) restoreSession();
});

document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && !CU) restoreSession();
});

// ── 자동 로그인 ──
(async()=>{
  // (자동 버전 갱신 제거됨) — 각 사용자가 🔄 길게 눌렀을 때만 갱신
  // 로컬 저장소 빠른 경로: 있으면 즉시 복원 (네트워크 대기 없음)
  const localSaved = readLocalUser();
  if(localSaved){
    try{
      CU=JSON.parse(localSaved);
      document.getElementById('initLoader').style.display='none';
      await enterApp();
      return;
    }catch(e){ CU=null; console.error('local restore error', e); }
  }
  // 로컬에 없으면 Firebase 세션으로 복원 시도 (인앱브라우저는 제외 → 남의 계정 복원 방지)
  // 15초 후에도 복원 안 되면 로그인 화면
  const loginTimeout = setTimeout(()=>{
    if(!CU){
      document.getElementById('initLoader').style.display='none';
      document.getElementById('loginPage').style.display='flex';
      showInAppWarnIfNeeded();
    }
  }, 15000);
  const remoteSaved = await readRemoteUserSafe();
  if(remoteSaved && !CU){
    try{
      CU=JSON.parse(remoteSaved);
      clearTimeout(loginTimeout);
      document.getElementById('initLoader').style.display='none';
      await enterApp();
      return;
    }catch(e){ console.error('remote restore error', e); }
  }
  // 복원 실패 시에만 로그인 화면
  if(!CU){
    clearTimeout(loginTimeout);
    document.getElementById('initLoader').style.display='none';
    document.getElementById('loginPage').style.display='flex';
    showInAppWarnIfNeeded();
  }
})();

async function loadGroups(){
  // 그룹을 안전하게 불러옴 — 네트워크 오류로 빈 값을 받아도 절대 기본값으로 덮어쓰지 않음(잠금 보호)
  let g = null, fetchOk = false;
  for(let i=0;i<3;i++){
    try{
      const controller=new AbortController();
      const t=setTimeout(()=>controller.abort(),8000);
      const r=await fetch(`${DB}/groups.json`,{signal:controller.signal});
      clearTimeout(t);
      if(r.ok){ g = await r.json(); fetchOk = true; break; }
    }catch(e){}
    await new Promise(res=>setTimeout(res,500));
  }
  if(fetchOk && g && Object.keys(g).length>0){
    groups = g; // 정상 로드
  } else if(fetchOk && (!g || Object.keys(g).length===0)){
    // 서버는 정상 응답인데 진짜로 비어있음 → 최초 1회만 기본 그룹 생성
    const def={g1:{name:'좋아요',color:'#FF7F6E'},g2:{name:'댓글',color:'#FFB347'},g3:{name:'시크릿',color:'#5DB88A'}};
    await dbSet('groups',def); groups=def;
  } else {
    // 네트워크 실패(불확실) → Firebase 절대 건드리지 않음. 기존 메모리 유지
    groups = groups || {};
  }
  if(!_currentDept||!groups[_currentDept])_currentDept=Object.keys(groups)[0]||'';
  renderDeptSubMenu();
}

function renderGroupSelectBar(){
  const bar = document.getElementById('groupSelectInner');
  if(!bar) return;

  // 그룹 탭 보이기/숨기기
  document.querySelectorAll('.group-only').forEach(b=>{
    if(b.dataset && b.dataset.tab==='notice'){
      b.style.display = _currentDept ? 'flex' : 'none';
    } else {
      b.style.display = _currentDept ? '' : 'none';
    }
  });
  const mainTabBar = document.getElementById('mainTabBar');
  if(mainTabBar) mainTabBar.style.display = _currentDept ? 'flex' : 'none';

  // 그룹 선택됐는데 현재 탭이 group-only가 아니면 공지로
  if(!_currentDept && ['home','chat','members'].includes(_currentTab)){
    _currentTab = 'notice';
    document.querySelectorAll('.tab-item').forEach(b=>b.classList.toggle('active', b.dataset&&b.dataset.tab==='notice'));
    loadNoticePage();
  }

  const groupColor = _currentDept ? (groups[_currentDept]?.color||'#FF85C1') : '#FF85C1';

  // CSS 변수만 변경 - 인라인 스타일 건드리지 않음
  document.documentElement.style.setProperty('--group-color', groupColor);

  let html = '';
  // 'order 필드 기준 정렬, 없으면 키 순
  const sortedGroups = Object.entries(groups).sort((a,b)=>{
    const oa = a[1].order ?? 999;
    const ob = b[1].order ?? 999;
    return oa - ob;
  });
  const standalone = ['calendar','leave','status','warn','settings','noti','sales'];
  const isStandalone = standalone.includes(_currentTab);
  sortedGroups.forEach(([gid,g])=>{
    const active = !isStandalone && _currentDept===gid;
    const locked = (g.groupLock && CU?.role!=='admin' && !localStorage.getItem('groupUnlocked_'+gid));
    html += `<button onclick="selectGroup('${gid}')" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:${active?(g.color||'#FF85C1'):'#f8f0f5'};color:${active?'white':'#999'}">${locked?'🔒 ':''}${escH(g.name)}</button>`;
  });
  bar.innerHTML = html;
}



function selectGroup(gid){
  localStorage.setItem('lastGroup',gid);
  if(gid==='all'){
    _currentChatRoom = null;
    clearInterval(window._chatPoll);
    document.querySelectorAll('.tab-item').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
    _currentDept = null;
    _currentTab='notice';
    document.querySelectorAll('[data-tab="notice"]').forEach(b=>b.classList.add('active'));
    renderGroupSelectBar();
    loadNoticePage();
    return;
  }
  // 그룹 진입 잠금 체크
  const g = groups[gid];
  if(g?.groupLock && CU?.role!=='admin' && !localStorage.getItem('groupUnlocked_'+gid)){
    _lockAction={gid, action:'enter', type:'groupEntry'};
    document.getElementById('lockModalTitle').textContent='🔒 그룹 잠금';
    document.getElementById('lockModalDesc').textContent=`${g.name} 그룹은 잠겨있습니다.`;
    document.getElementById('lockPwLabel').textContent='비밀번호';
    document.getElementById('lockPwInput').value='';
    document.getElementById('groupLockModal').classList.add('active');
    return;
  }
  _currentChatRoom = null;
  clearInterval(window._chatPoll);
  document.querySelectorAll('.tab-item').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
  _currentDept = gid;
  _currentTab='home';
  document.querySelectorAll('[data-tab="home"]').forEach(b=>b.classList.add('active'));
  renderGroupSelectBar();
  loadHome();
}

function goTab(tab){

  // 관리자 전용 탭 가드 (사원 차단)

    showToast('관리자 전용 메뉴입니다');
    return;
  }
  _currentTab=tab;
  clearInterval(window._chatPoll);
  sessionStorage.setItem('lastTab', tab);
  if(_currentDept) localStorage.setItem('lastTab', tab);

  // 탭바 활성화 - 모든 tab-item active 초기화 후 해당 탭만 활성화
  document.querySelectorAll('.tab-item').forEach(b=>{
    b.classList.remove('active');

  const mainTabBar = document.getElementById('mainTabBar');
  if(mainTabBar) mainTabBar.style.display = (_currentDept && !standalone.includes(tab)) ? '' : 'none';

  const mb=document.getElementById('mainBody');
  if(!mb)return;
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';

  const headers={
    notice:['📢 공지사항','공지 및 피드'],
    chat:['💬 채팅','전체·부서·1:1 채팅'],
    home:['💼 전체 투표','모든 부서 투표 현황'],
    calendar:['🗓 캘린더','참여 내역 캘린더'],
    leave:['🏖️ 연차·경품','오락실 연차 및 경품 현황'],
    members:['👥 멤버 목록','부서별 사원 현황'],
    status:['📋 현황','제출 현황 확인'],
    warn:['⚠️ 경고','그룹별 경고 관리'],
    settings:['⚙️ 설정','인사팀 전용 관리'],
    noti:['🔔 알림','채팅·공지·투표 알림 내역'],
    sales:['📋 영업 리스트','협찬 건 등록 및 현황'],
  };
  const [title,sub]=headers[tab]||[tab,''];
  setMainHeader(title,sub);

  if(tab==='notice')loadNoticePage();
  if(tab==='home')loadHome();
  if(tab==='calendar')renderCalendar();
  if(tab==='leave')loadLeave();
  if(tab==='members')loadMembersPage();
  if(tab==='status')loadStatus();
  if(tab==='warn')loadWarn();
  if(tab==='settings')loadSettings();
  if(tab==='noti')loadNotiPage();
  if(tab==='sales')loadSalesPage();
}

async function loadNoticePage(){
  const mb=document.getElementById('mainBody');
  const isAdmin=CU?.role==='admin';

  const notices=await dbGet('notices');
  const noticeComments=await dbGet('noticeComments');
  _cachedData.notices=notices;_cachedData.noticeComments=noticeComments;
  // 공지를 봤으므로 빨간불 끄기
  try{
    const times = notices?Object.values(notices).filter(n=>n&&!n.deleted).map(n=>n.time||0):[];
    if(times.length) localStorage.setItem('seenNoticeAt', String(Math.max(...times)));
    const dot=document.getElementById('noticeDot'); if(dot) dot.style.display='none';
  }catch(e){}

  const list=notices?Object.entries(notices).filter(([k,n])=>{
    if(n.deleted) return false;
    if(!_currentDept) return !n.group || n.group==='all'; // 그룹 미선택: 전체 공지만
    return !n.group || n.group==='all' || n.group===_currentDept; // 그룹 선택: 전체+해당 그룹
  }).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)):[];

  let html='<div style="padding:14px 0 80px">';

  // 관리자 버튼 영역
  if(isAdmin){
    html+=`<div style="padding:0 14px 12px;display:flex;gap:8px">`;
    html+=`<button onclick="openNoticeModal('feed')" style="flex:1;background:#FF85C1;color:white;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">📢 공지 작성</button>`;
    html+=`<button onclick="goTab('home')" style="flex:1;background:#fde8eb;color:#f87286;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🗳️ 투표 만들기</button>`;
    html+=`</div>`;
  }

  if(list.length===0){
    mb.innerHTML=html+'<div class="empty"><div class="empty-icon">📭</div>공지가 없습니다</div></div>';
    return;
  }

  list.forEach(([nid,n])=>{ html+=renderNoticeCard(nid,n,noticeComments); });
  html+='</div>';
  mb.innerHTML=html;
}

function renderNoticeCard(nid,n,allComments){
  const isAdmin=CU?.role==='admin';
  const comments=allComments?.[nid];
  const commentList=comments?Object.entries(comments).sort((a,b)=>(a[1].time||0)-(b[1].time||0)):[];
  const isExpanded=_expandedNotice===nid;
  const body=n.body||'';
  const preview=body.length>80?body.slice(0,80)+'...':body;

  let html=`<div class="feed-card">`;
  html+=`<div class="feed-card-header">`;
  html+=`<div class="feed-card-icon" style="background:linear-gradient(135deg,#FFB347,#FF9F7A)">📢</div>`;
  html+=`<div style="flex:1;min-width:0">`;
  html+=`<div style="font-size:15px;font-weight:800;color:var(--text)">${escH(n.title||'')}</div>`;
  html+=`<div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDate(n.createdAt)}${n.createdBy?' · '+escH(n.createdBy):''}</div>`;
  html+=`</div>`;
  if(isAdmin){
    html+=`<div style="display:flex;gap:4px">`;
    html+=`<button class="vbtn edit" onclick="openNoticeEditById('${nid}')">✏️</button>`;
    html+=`<button class="vbtn del" onclick="delNotice('${nid}')">🗑</button>`;
    html+=`</div>`;
  }
  html+=`</div>`;

  // 본문
  html+=`<div style="padding:12px 14px;font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;cursor:pointer" onclick="toggleNoticeExpand('${nid}')">${escH(isExpanded?body:preview)}</div>`;
  if(body.length>80){
    html+=`<div style="padding:0 14px 8px"><button onclick="toggleNoticeExpand('${nid}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700">${isExpanded?'접기 ▲':'더보기 ▼'}</button></div>`;
  }

  // 댓글
  if(commentList.length>0){
    html+=`<div style="padding:8px 14px;border-top:1px solid var(--border)">`;
    commentList.forEach(([cid,cm])=>{
      const canEdit = isAdmin || cm.name===CU?.name;
      html+=`<div style="padding:5px 0;display:flex;gap:6px;align-items:flex-start">`;
      html+=`<div style="width:22px;height:22px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0">${(cm.name||'?')[0]}</div>`;
      html+=`<div style="flex:1;min-width:0"><span style="font-size:12px;font-weight:700;color:var(--accent)">${escH(cm.name||'')}</span> <span style="font-size:13px">${escH(cm.body||'')}</span>`;
      html+=`<div style="font-size:10px;color:var(--text3)">${fmtDate(cm.time)}</div></div>`;
      if(canEdit){
        html+=`<div style="display:flex;gap:4px;flex-shrink:0">`;
        html+=`<button onclick="editComment('${nid}','${cid}')" style="font-size:11px;padding:2px 6px;background:rgba(91,155,213,0.1);color:var(--blue);border:none;border-radius:6px;cursor:pointer">수정</button>`;
        html+=`<button onclick="delComment('${nid}','${cid}')" style="font-size:11px;padding:2px 6px;background:rgba(255,92,92,0.1);color:var(--red);border:none;border-radius:6px;cursor:pointer">삭제</button>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  // 댓글 입력 (사원)
  if(!isAdmin){
    html+=`<div style="display:flex;gap:6px;padding:8px 10px 10px;border-top:1px solid var(--border)">`;
    html+=`<input id="cmtInput_${nid}" class="fi" placeholder="댓글..." style="flex:1;padding:8px 12px;font-size:13px">`;
    html+=`<button class="btn-sm pri" onclick="submitComment('${nid}')">등록</button>`;
    html+=`</div>`;
  }

  html+=`</div>`;
  return html;
}

function toggleNoticeExpand(nid){
  _expandedNotice=(_expandedNotice===nid)?null:nid;
  loadNoticePage();
}

async function submitComment(nid){
  const inp=document.getElementById('cmtInput_'+nid);
  const body=inp?.value.trim();
  if(!body){showToast('댓글을 입력하세요');return;}
  await dbPush(`noticeComments/${nid}`,{name:CU.name,body,time:Date.now()});
  showToast('💬 댓글 등록됨');
  loadNoticePage();
}

async function editComment(nid, cid){
  const cm = await dbGet(`noticeComments/${nid}/${cid}`);
  if(!cm){showToast('댓글을 찾을 수 없습니다');return;}
  // 본인 또는 관리자만
  if(CU?.role!=='admin' && cm.name!==CU?.name){showToast('본인 댓글만 수정할 수 있어요');return;}
  const newBody = prompt('댓글 수정', cm.body||'');
  if(newBody===null) return;
  if(!newBody.trim()){showToast('내용을 입력하세요');return;}
  await dbSet(`noticeComments/${nid}/${cid}/body`, newBody.trim());
  showToast('✅ 댓글 수정됨');
  loadNoticePage();
}

async function delComment(nid, cid){
  const cm = await dbGet(`noticeComments/${nid}/${cid}`);
  if(!cm){showToast('댓글을 찾을 수 없습니다');return;}
  if(CU?.role!=='admin' && cm.name!==CU?.name){showToast('본인 댓글만 삭제할 수 있어요');return;}
  if(!confirm('댓글을 삭제할까요?')) return;
  await dbDelete(`noticeComments/${nid}/${cid}`);
  showToast('🗑️ 댓글 삭제됨');
  loadNoticePage();
}

// ── 채팅 입장 상태: sessionStorage로 탭 이동해도 유지 ──
function getChatPath(room){
  if(!room)return null;
  if(room.type==='all')return 'chat';
  if(room.type==='dept')return `chat_dept/${room.id}`;
  return `chat_dm/${[CU?.name||CU?.key,room.id].sort().join('_')}`;
}
function getRoomKey(room){
  if(!room)return null;
  return room.type==='all'?'all':room.type==='dept'?'dept_'+room.id:'dm_'+[CU?.name||CU?.key,room.id].sort().join('_');
}
function isJoined(room){return localStorage.getItem('chatJoined_'+getRoomKey(room))==='1';}
function setJoined(room,v){
  const k='chatJoined_'+getRoomKey(room);
  if(v)localStorage.setItem(k,'1');else localStorage.removeItem(k);
}

function showMsgMenu(mid,x,y){
  _msgMenuMid=mid;
  // 기존 메뉴 제거
  document.getElementById('msgCtxMenu')?.remove();
  const isAdmin=CU?.role==='admin';
  const menu=document.createElement('div');
  menu.id='msgCtxMenu';
  menu.style=`position:fixed;z-index:999;background:#2D1B14;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,0.35);overflow:hidden;min-width:160px;`;
  // 좌표: 화면 벗어나지 않게
  const mx=Math.min(x,window.innerWidth-170);
  const my=Math.min(y,window.innerHeight-160);
  menu.style.left=mx+'px';menu.style.top=my+'px';

  const items=[
    {icon:'📋',label:'복사',fn:`copyMsgText('${mid}')`},
    ...(isAdmin?[
      {icon:'🙈',label:'가리기',fn:`hideMsg('${mid}')`},
      {icon:'🗑️',label:'삭제',fn:`deleteChat('${mid}')`,red:true},
    ]:[]),
  ];
  items.forEach(item=>{

    btn.style=`display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:none;border:none;color:${item.red?'#FF5C5C':'rgba(255,255,255,0.85)'};font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06);`;

async function loadChatMemberPanel(){
  const listEl=document.getElementById('chatMemberList');
  if(!listEl||!_currentChatRoom)return;
  const room=_currentChatRoom;
  let members=[];
  if(room.type==='dept'){
    // 부서 채팅: chat_presence에서 현재 접속자
    const presence=await dbGet(`chat_presence/${getRoomKey(room)}`);
    if(presence){
      members=Object.values(presence).filter(p=>p&&p.name).map(p=>({name:p.name,online:true}));
    }
    // 오락실 멤버에서 이 그룹 멤버도 표시
    const gameMembers=await gameGet('members');
    if(gameMembers){
      const gName=groups[room.id]?.name||'';
      Object.values(gameMembers).forEach(m=>{
        if(!m.name)return;
        const clean=m.name.replace(/^\*/,'');
        if(!clean.startsWith(gName))return;
        const nick=clean.replace(gName,'');
        if(!members.find(x=>x.name===nick)){
          members.push({name:nick,online:false});
        }
      });
    }
  } else {
    // 전체 채팅: crew31 멤버
    const crewMembers=await dbGet('members');
    if(crewMembers){
      const presence=await dbGet(`chat_presence/${getRoomKey(room)}`)||{};
      const onlineNames=new Set(Object.values(presence).map(p=>p?.name).filter(Boolean));
      members=Object.values(crewMembers).filter(m=>m.name).map(m=>({name:m.name,online:onlineNames.has(m.name)}));
    }
  }
  members.sort((a,b)=>{
    if(a.online&&!b.online)return -1;
    if(!a.online&&b.online)return 1;
    return a.name.localeCompare(b.name,'ko');
  });
  listEl.innerHTML=members.map(m=>`
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <div style="width:28px;height:28px;border-radius:8px;background:${m.online?'#FF85C1':'var(--surface2)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${m.online?'white':'var(--text3)'};">${(m.name||'?')[0]}</div>
      <span style="font-size:12px;font-weight:600;color:${m.online?'var(--text)':'var(--text3)'}">${escH(m.name)}</span>
      ${m.online?'<span style="width:6px;height:6px;border-radius:50%;background:#5DB88A;flex-shrink:0"></span>':''}
    </div>
  `).join('');
}

async function fetchChatMessages(){
const el=document.getElementById('chatMessages');
if(!el||!_currentChatRoom)return;
const path=getChatPath(_currentChatRoom);
const msgs=await dbGetRecent(path,50);
window._currentMsgData=msgs||{};

if(!msgs){
el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">아직 메시지가 없어요</div>';
return;
}

const list=Object.entries(msgs)
.filter(([k,m])=>!m.deleted)
.sort((a,b)=>(a[1].time||0)-(b[1].time||0));

// 뱃지 처리
const badge=document.getElementById('chatBadge');
const isOnChat=_currentTab==='chat';
if(!isOnChat&&list.length>_lastChatCount&&_lastChatCount>0){
const diff=list.length-_lastChatCount;
if(badge){badge.style.display='';badge.textContent=diff>99?'99+':diff;}
}
if(isOnChat&&badge)badge.style.display='none';
_lastChatCount=list.length;

const wasAtBottom=el.scrollHeight-el.scrollTop-el.clientHeight<80;
const isAdmin=CU?.role==='admin';
let html='';let lastDate='';

list.forEach(([mid,m])=>{
// 시스템 메시지
if(m.system){
html+=`<div style="text-align:center;padding:4px 0"><span style="font-size:11px;color:var(--text3);background:rgba(200,180,175,0.15);padding:4px 12px;border-radius:20px">${escH(m.body||'')}</span></div>`;
return;
}
const isMe=(CU?.role==='admin'&&m.senderRole==='admin')||(m.senderKey&&m.senderKey===CU?.key)||(m.senderName&&m.senderName===CU?.name);
const d=new Date(m.time||0);
const dateStr=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
const timeStr=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
if(dateStr!==lastDate){html+=`<div class="msg-date-sep">${dateStr}</div>`;lastDate=dateStr;}
const avColor=m.senderRole==='admin'?'linear-gradient(135deg,#FFB347,#FF9F7A)':'linear-gradient(135deg,#FF9F7A,#FF7F6E)';

html+=`<div class="msg-row ${isMe?'me':''}" id="msg_${mid}">`;
if(!isMe)html+=`<div class="msg-avatar" style="background:${avColor};cursor:default">${(m.senderName||'?')[0]}</div>`;
html+=`<div class="msg-content">`;
if(!isMe)html+=`<div class="msg-name">${escH(m.senderName||'')}${m.senderRole==='admin'?' 👑':''}</div>`;

async function sendChat(){
const inp=document.getElementById('chatInput');
const body=inp?.value.trim();
if(!body||!_currentChatRoom)return;
inp.value='';inp.style.height='';
const msg={body,senderName:CU.name,senderKey:CU.key||'admin',senderRole:CU.role,time:Date.now()};
const path=getChatPath(_currentChatRoom);
await dbPush(path,msg);
await new Promise(r=>setTimeout(r,300));
await fetchChatMessages();

// @all 처리 - 전체 알림
if(body.includes('@all')){
  sendFCMNotification({
    title:`💬 ${CU.name}님의 전체 멘션`,
    body:body.replace('@all','').trim().slice(0,60)||'전체 멘션',
    data:{tab:'chat'}
  });
}

// FCM: @멘션 감지
const mentions=[...body.matchAll(/@(\S+)/g)].map(m=>m[1]);
if(mentions.length>0){
  // 멘션된 이름과 일치하는 FCM 토큰 찾아서 발송
  const allTokens=await dbGet('fcmTokens')||{};
  const targetKeys=Object.entries(allTokens)
    .filter(([k,v])=>mentions.some(m=>v.name?.includes(m)||m.includes(v.name||'')))
    .map(([k])=>k);
  if(targetKeys.length>0){
    sendFCMNotification({
      title:`💬 ${CU.name}님이 멘션했습니다`,
      body:body.slice(0,60),
      targetKeys,
      data:{tab:'chat'}
    });
  }
}

// FCM: DM이면 상대방한테 알림
if(_currentChatRoom.type==='dm'&&_currentChatRoom.targetKey){
  const allTokens=await dbGet('fcmTokens')||{};
  const targetKey=_currentChatRoom.targetKey;
  if(allTokens[targetKey]){
    sendFCMNotification({
      title:`💬 DM: ${CU.name}`,
      body:body.slice(0,60),
      targetKeys:[targetKey],
      data:{tab:'chat'}
    });
  }
}
}

function chatKeydown(e){
  // 멘션 팝업에서 키 처리
  const popup=document.getElementById('mentionPopup');
  if(popup&&popup.style.display!=='none'){
    if(e.key==='Escape'){popup.style.display='none';return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}

function chatInputHandler(el){
  autoResize(el);
  // @ 멘션 감지
  const val=el.value;
  const cursor=el.selectionStart;
  const textBefore=val.slice(0,cursor);
  const atIdx=textBefore.lastIndexOf('@');
  const popup=document.getElementById('mentionPopup');
  if(!popup)return;
  if(atIdx===-1||(atIdx>0&&!/\s/.test(textBefore[atIdx-1])&&textBefore[atIdx-1])){
    // @ 없거나 @ 앞에 공백이 없으면 팝업 닫기
    const hasAt=atIdx!==-1&&(atIdx===0||/\s/.test(textBefore[atIdx-1]));
    if(!hasAt){popup.style.display='none';return;}
  }
  const query=textBefore.slice(atIdx+1).toLowerCase();
  showMentionPopup(query, atIdx, el);
}

async function showMentionPopup(query, atIdx, input){
  const popup=document.getElementById('mentionPopup');
  if(!popup)return;

  // 현재 채팅방 멤버 목록
  let names=[];
  if(_currentChatRoom?.type==='dept'){
    const gameMembers=await gameGet('members');
    if(gameMembers){
      const gName=groups[_currentChatRoom.id]?.name||'';
      Object.values(gameMembers).forEach(m=>{
        if(!m.name)return;
        const clean=m.name.replace(/^\*/,'');
        if(!clean.startsWith(gName))return;
        names.push(clean.replace(gName,''));
      });
    }
  } else {
    const crewMembers=await dbGet('members');
    if(crewMembers) names=Object.values(crewMembers).filter(m=>m.name).map(m=>m.name);
  }

  const filtered=names.filter(n=>n.toLowerCase().includes(query));
  // @all 포함
  const allOption = query===''||'all'.includes(query) ? ['all'] : [];
  const finalList=[...allOption,...filtered];
  if(finalList.length===0){popup.style.display='none';return;}

  popup.style.display='block';
  popup.innerHTML=finalList.map(name=>`
    <div onclick="insertMention('${escH(name)}',${atIdx})" style="padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='white'">
      <div style="width:26px;height:26px;border-radius:8px;background:#FF85C1;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">${name[0]}</div>
      @${escH(name)}
    </div>
  `).join('');
}

function insertMention(name, atIdx){
  const input=document.getElementById('chatInput');
  if(!input)return;
  const val=input.value;
  const cursor=input.selectionStart;
  const before=val.slice(0,atIdx);
  const after=val.slice(cursor);
  input.value=before+'@'+name+' '+after;
  input.focus();
  const newPos=atIdx+name.length+2;
  input.setSelectionRange(newPos,newPos);
  const popup=document.getElementById('mentionPopup');
  if(popup)popup.style.display='none';
  autoResize(input);
}


function highlightMentions(text){
  if(!text) return '';
  return escH(text).replace(/@(\S+)/g, (match, name) => {
    if(name==='all') return `<span style="background:#FF85C1;color:white;padding:1px 6px;border-radius:8px;font-weight:700">@all</span>`;

}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}

// ── 경고(WARNING) — 그룹별 경고 적립(+사유), 매월 25일 자정 리셋 ──
//   저장: crew31  warnReasons/{게임멤버키}=[{date,reason,by,t}] (그룹마다 키가 달라 자동 분리)
//   경고 횟수 = 사유 배열 길이.  warnMeta/cycle 로 25일 리셋.
// ══════════════════════════════════════════════
function getWarnCycle(d){
  d = d || new Date();
  let y=d.getFullYear(), m=d.getMonth();
  if(d.getDate()<25){ m-=1; if(m<0){m=11;y-=1;} }
  return `${y}-${String(m+1).padStart(2,'0')}`;
}
function warnArr(v){ return Array.isArray(v)?v:(v?Object.values(v):[]); } // Firebase가 객체로 줄 때 대비
// 경고 횟수 = 경고 이벤트 수 - 차감 이벤트 수 (0 미만이면 0)
function warnCount(events){
  const arr=warnArr(events);
  let add=0, sub=0;
  arr.forEach(e=>{ if(e&&e.type==='차감') sub++; else add++; });
  return Math.max(0, add-sub);
}
async function checkWarnReset(){
  try{
    const cur=getWarnCycle();
    const meta=await dbGet('warnMeta');
    if(!meta || meta.cycle!==cur){
      await dbSet('warnReasons', null);
      await dbSet('warnings', null);   // 구버전 정리
      await dbSet('warnLog', null);    // 구버전 정리
      await dbSet('warnMeta', {cycle:cur, resetAt:Date.now()});
      return true;
    }
  }catch(e){ console.warn('checkWarnReset',e); }
  return false;
}

async function loadSalesPage(){
  const mb=document.getElementById('mainBody');
  mb.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const isAdmin=CU?.role==='admin';
  const myName=CU?.name||'';

  // Top3 계산
  function calcTop3(items){
    const now=new Date();
    const y=now.getFullYear(), mo=now.getMonth();
    const monthStart=new Date(y,mo,1).getTime();
    const monthEnd=new Date(y,mo+1,0,23,59,59,999).getTime();
    const counts={};
    items.forEach(item=>{
      if(item.invalid)return;
      const t=item.createdAt||0;
      if(t<monthStart||t>monthEnd)return;
      const n=item.author||'';
      counts[n]=(counts[n]||0)+1;
    });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);

function filterWarnList(q){

async function addWarn(gameKey,name){
  const reason=prompt(`${name} 경고 사유를 입력하세요`);
  if(reason===null) return;                 // 취소
  const rsn=(reason||'').trim();
  if(!rsn){ showToast('사유를 입력해주세요'); return; }
  const cur=warnArr(await dbGet(`warnReasons/${gameKey}`));
  const d=new Date();
  const date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  cur.push({type:'경고', date, reason:rsn, by:CU?.name||'admin', t:Date.now()});

// 로그인 시: 본인 그룹 중 한 곳이라도 경고 3회 이상이면 봉사 팝업.
// 한 번 본 상태(시그니처)면 다시 안 뜸. 경고가 더 쌓여(횟수↑) 상태가 바뀌면 다시 뜸.
async function checkWarnPopup(){
  try{
    if(!CU?.name) return;
    await checkWarnReset();
    const [gameMembers, reasonsRaw]=await Promise.all([ gameGet('members'), dbGet('warnReasons') ]);
    if(!gameMembers) return;
    const GAME_GROUPS=Array.from(new Set(['좋아요','댓글','시크릿',...Object.values(groups).map(g=>g.name).filter(Boolean)]));
    const hits=[]; const sig=[];
    Object.entries(gameMembers).forEach(([k,m])=>{
      if(!m.name)return;
      const cleanName=m.name.replace(/^\*/,'');
      const group=GAME_GROUPS.find(g=>cleanName.startsWith(g));
      const realName=group?cleanName.replace(group,''):cleanName;
      if(realName!==CU.name) return;
      const cnt=warnCount((reasonsRaw||{})[k]);
      if(cnt>=3){ hits.push(`${group||'기타'} ${cnt}회`); sig.push(`${group||'기타'}:${cnt}`); }
    });
    const ackKey='warnPopupAck_'+CU.name;
    const signature = sig.length ? (getWarnCycle()+'||'+sig.sort().join('|')) : '';
    if(!signature){ try{localStorage.removeItem(ackKey);}catch(e){} return; } // 3회 미만 → 팝업 X + 기록 초기화
    let prevAck=''; try{ prevAck=localStorage.getItem(ackKey)||''; }catch(e){}
    if(signature===prevAck) return;                                          // 이미 본 상태 → 안 뜸
    try{ localStorage.setItem(ackKey, signature); }catch(e){}                 // 본 것으로 기록
    showWarnPopup(hits.join(' · '));
  }catch(e){ console.warn('checkWarnPopup',e); }
}

    // 경품 연차(미사용) 수 + 수동 연차 = 총 연차
    const prizeLeaveCount=prizes.filter(p=>!p.deducted&&(p.name||'').includes('연차')).length;
    const leave=manualLeave+prizeLeaveCount;
    // 수동 연차 사용/지급 로그 (사용일 표시용)
    const logRaw=allLeaveLog?.[k];
    const leaveLogs=logRaw?Object.values(logRaw).sort((a,b)=>(b.time||0)-(a.time||0)):[];
    (byGroup[group||'기타']).push({key:k,realName:realName||cleanName,color,stock,leave,manualLeave,prizes,leaveLogs});
  });

  let html='<div style="padding-bottom:60px">';

    if(!list||list.length===0)return;

    const ADMIN_NAMES=['고인물','에이스','경력직','불주먹','김월루','퇴사각','알잘딱'];
    // 정렬: 인사팀 가나다 → 일반 사원 가나다
    const sortedList = [...list].sort((a, b) => {
      const aIsAdmin = ADMIN_NAMES.includes(a.realName);
      const bIsAdmin = ADMIN_NAMES.includes(b.realName);
      if(aIsAdmin && !bIsAdmin) return -1;
      if(!aIsAdmin && bIsAdmin) return 1;
      if(aIsAdmin && bIsAdmin) return ADMIN_NAMES.indexOf(a.realName) - ADMIN_NAMES.indexOf(b.realName);
      return a.realName.localeCompare(b.realName, 'ko');
    });

    html+=`<div style="padding:10px 16px 4px;display:flex;align-items:center;gap:6px;cursor:pointer" onclick="toggleLeaveGroup('${gName}')">`;
    html+=`<span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>`;
    html+=`<span style="font-size:11px;font-weight:700;color:var(--text3)">${escH(gName)} (${list.length})</span>`;
    html+=`<span style="margin-left:auto;font-size:11px;color:var(--text3)" id="larrow_${gName}">▸</span></div>`;
    html+=`<div id="lgroup_${gName}" style="display:none">`;

    sortedList.forEach(({key:k,realName,color,stock,leave,manualLeave,prizes,leaveLogs})=>{
      const isAdminMember = ADMIN_NAMES.includes(realName);
      const pid='lp_'+k.replace(/[^a-zA-Z0-9]/g,'');
      html+=`<div class="leave-person" data-name="${escH(realName)}" style="background:white;border-radius:16px;margin:6px 14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06);${isAdminMember?'border:1.5px solid var(--accent)':''}">`;
      // 헤더 (클릭 시 상세 토글)
      html+=`<div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="togglePerson('${pid}')">`;
      html+=`<div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,${color},${color}bb);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white">${(realName||'?')[0]}</div>`;
      html+=`<div style="flex:1"><div style="font-size:14px;font-weight:800">${escH(realName)}</div>`;
      html+=`<div style="font-size:11px;color:var(--text3)">연차 ${leave}일</div></div>`;
      html+=`<span id="${pid}_arrow" style="font-size:12px;color:var(--text3)">▸</span></div>`;
      // 상세 (기본 접힘)
      html+=`<div id="${pid}" style="display:none">`;

      // 관리자: 연차 지급/차감 버튼
      if(isAdmin){
        html+=`<div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">`;
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);align-self:center;margin-right:2px">🏖️ 연차</div>`;
        html+=`<button onclick="quickLeave('${k}','${escH(realName)}',1)" style="flex:1;padding:7px;background:rgba(93,184,138,0.12);color:var(--green);border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">+1일</button>`;
        html+=`<button onclick="quickLeave('${k}','${escH(realName)}',3)" style="flex:1;padding:7px;background:rgba(93,184,138,0.12);color:var(--green);border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">+3일</button>`;
        html+=`<button onclick="quickLeave('${k}','${escH(realName)}',-1)" style="flex:1;padding:7px;background:rgba(255,92,92,0.1);color:var(--red);border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">-1일</button>`;
        html+=`<button onclick="customLeave('${k}','${escH(realName)}')" style="flex:1;padding:7px;background:var(--surface2);color:var(--text2);border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">직접</button>`;
        html+=`</div>`;

        // 경품 지급 버튼
        html+=`<div style="display:flex;gap:6px;margin-top:6px">`;
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);align-self:center;margin-right:2px">🎁 경품</div>`;
        html+=`<button onclick="quickPrize('${k}','${escH(realName)}','🏖️','연차')" style="flex:1;padding:7px;background:rgba(255,179,71,0.12);color:var(--gold);border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">🏖️연차</button>`;
        html+=`<button onclick="quickPrize('${k}','${escH(realName)}','☕','투피드')" style="flex:1;padding:7px;background:rgba(255,179,71,0.12);color:var(--gold);border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">☕투피드</button>`;
        html+=`<button onclick="customPrize('${k}','${escH(realName)}')" style="flex:1;padding:7px;background:var(--surface2);color:var(--text2);border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">직접</button>`;
        html+=`</div>`;
      }

      // 경품 + 수동연차 통합 내역 → 받음(+)/사용(-) 이벤트 타임라인 + 종류별 잔액 누적
      // 종류 키: 연차는 경품연차+수동연차를 '연차'로 합산, 그 외 경품은 이름별
      const evs=[];
      // 1) 경품(연차 경품·투피드·출근확인증 등)
      prizes.forEach(p=>{
        const nm=p.name||(p.emoji||'경품');
        const key=nm.includes('연차')?'연차':nm;
        evs.push({type:key,emoji:p.emoji||(key==='연차'?'🏖️':'🎁'),kind:'give',name:nm,t:p.time||0,date:fmtMDc(p.time)});
        if(p.deducted===true){
          const dt=p.usedDate||p.deductDate||'';
          const dts=parseYMDc(dt);
          evs.push({type:key,emoji:p.emoji||(key==='연차'?'🏖️':'🎁'),kind:'use',name:nm,t:(dts!=null?dts+86399000:(p.time||0)+1),date:dt?fmtYMDc(dt):''});
        }
      });
      // 2) 수동 연차 로그: give=+amount, deduct=-amount (모두 '연차' 종류)
      if(leaveLogs && leaveLogs.length){
        leaveLogs.forEach(lg=>{
          const amt=Math.abs(lg.amount||1);
          const dts=parseYMDc(lg.date||'');
          const baseT=lg.time||(dts!=null?dts:0);
          evs.push({type:'연차',emoji:'🏖️',kind:(lg.type==='deduct'?'use':'give'),name:'연차',t:baseT,date:lg.date?fmtYMDc(lg.date):'',memo:lg.memo||'',amount:amt});
        });
      }
      if(evs.length){
        evs.sort((a,b)=>(a.t||0)-(b.t||0));
        const bal={};
        const rows=evs.map(ev=>{
          const amt=ev.amount||1;
          const prev=bal[ev.type]||0;
          const now=ev.kind==='give'?prev+amt:Math.max(0,prev-amt);
          bal[ev.type]=now;
          const isUse=ev.kind==='use';
          return {ev,prev,now,isUse,amt};
        });
        html+=`<div style="font-size:11px;font-weight:700;color:var(--text3);margin:10px 0 6px">🎁 경품 · 연차 내역</div>`;
        rows.forEach(({ev,prev,now,isUse,amt})=>{
          html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">`;
          html+=`<div style="display:flex;align-items:center;gap:8px">`;
          html+=`<span style="font-size:18px">${ev.emoji}</span>`;
          html+=`<div>`;
          html+=`<div style="font-size:13px;font-weight:600;${isUse?'color:var(--red)':''}">${escH(ev.name)} <span style="font-size:10px;color:var(--text3)">${isUse?'사용':'받음'}</span></div>`;
          if(ev.date) html+=`<div style="font-size:10px;color:var(--text3)">${escH(ev.date)} ${isUse?'사용':'지급'}</div>`;
          if(ev.memo) html+=`<div style="font-size:10px;color:var(--text3)">📝 ${escH(ev.memo)}</div>`;
          html+=`<div style="font-size:10px;color:${isUse?'var(--red)':'#3b9'}">직전 ${prev}개 → ${isUse?'-':'+'}${amt} → ${now}개</div>`;
          html+=`</div></div>`;
          html+=`<span style="font-size:11px;padding:4px 12px;border-radius:10px;font-weight:700;`;
          html+=isUse?`background:rgba(93,184,138,0.15);color:var(--green)">✓ 사용완료`:`background:var(--surface2);color:var(--text3)">받음`;
          html+=`</span>`;
          html+=`</div>`;
        });
      }
      html+=`</div>`; // 상세(접이식) 닫기
      html+=`</div>`; // 카드 닫기
    });
    html+=`</div>`;
  });

  html+='</div>';
  mb.innerHTML=html;
}
// 날짜 헬퍼 (crew31)
function fmtMDc(ts){if(!ts)return '';const d=new Date(ts);return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function parseYMDc(s){if(!s)return null;const m=String(s).match(/(\d{2,4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);if(!m)return null;let y=parseInt(m[1]);if(y<100)y+=2000;return new Date(y,parseInt(m[2])-1,parseInt(m[3])).getTime();}
function fmtYMDc(s){const ts=parseYMDc(s);return ts!=null?fmtMDc(ts):s;}

// ── 연차 적용 헬퍼 (game.html과 동일 규칙) ──
// delta>0: memberLeave에 적립 + leaveLog give 로그
// delta<0: memberLeave 먼저 차감 → 부족분은 경품연차(오래된 것부터) deducted 처리 + leaveLog deduct 로그
// 반환: {ok, manualLeave(반영후), prizeLeave(반영후), applied}
async function applyLeaveDelta(gameKey,delta,memo){
  const manualLeave=await gameGet(`memberLeave/${gameKey}`)||0;
  if(delta>=0){
    await gameSet(`memberLeave/${gameKey}`,manualLeave+delta);
    await gamePush(`leaveLog/${gameKey}`,{type:'give',amount:delta,date:todayStr,memo:memo||'',time:Date.now()});
    return {ok:true,applied:delta};
  }
  // 차감
  const need=Math.abs(delta);
  const raw=await gameGet(`memberPrizes/${gameKey}`);
  const arr=Array.isArray(raw)?[...raw]:(raw?Object.values(raw):[]);
  const prizeLeaveCount=arr.filter(p=>p&&!p.deducted&&(p.name||'').includes('연차')).length;
  const totalLeave=manualLeave+prizeLeaveCount;
  if(totalLeave<need){showToast(`연차 부족 (보유 ${totalLeave}일)`);return {ok:false};}

  await gamePush(`leaveLog/${gameKey}`,{type:'deduct',amount:need,date:todayStr,memo:memo||'',time:Date.now()});
  let remaining=need;
  // 1) 수동 연차 먼저
  const fromManual=Math.min(manualLeave,remaining);
  if(fromManual>0){await gameSet(`memberLeave/${gameKey}`,manualLeave-fromManual);remaining-=fromManual;}
  // 2) 부족분은 경품연차(오래된 것부터)
  if(remaining>0){
    let cnt=0;
    for(let i=0;i<arr.length&&cnt<remaining;i++){
      const p=arr[i];
      if(p&&!p.deducted&&(p.name||'').includes('연차')){
        arr[i]={...p,deducted:true,usedDate:todayStr,deductDate:todayStr};
        cnt++;
      }
    }
    await gameSet(`memberPrizes/${gameKey}`,arr);
  }
  return {ok:true,applied:-need};
}

// 연차 빠른 지급/차감
async function quickLeave(gameKey,name,days){
  const r=await applyLeaveDelta(gameKey,days,'');
  if(!r.ok)return;
  showToast(`${name}: 연차 ${days>0?'+':''}${days}일 적용`);
  loadLeave();
}

// 연차 직접 입력
async function customLeave(gameKey,name){
  const cur=await gameGet(`memberLeave/${gameKey}`)||0;
  const input=prompt(`${name}의 연차 변경\n현재 수동연차: ${cur}일\n변경할 일수를 입력하세요 (예: +2, -1)`);
  if(!input)return;
  const num=parseFloat(input.replace('+',''));
  if(isNaN(num)||num===0){showToast('올바른 숫자를 입력하세요 (예: +2, -1)');return;}
  const isRelative=input.startsWith('+')||input.startsWith('-');
  if(!isRelative){showToast('+ 또는 - 로 입력하세요 (예: +2, -1)');return;}
  const r=await applyLeaveDelta(gameKey,num,'');
  if(!r.ok)return;
  showToast(`${name}: 연차 ${num>0?'+':''}${num}일 적용`);
  loadLeave();
}

// 경품 빠른 지급
async function quickPrize(gameKey,name,emoji,prizeName){
  const raw=await gameGet(`memberPrizes/${gameKey}`);
  const arr=Array.isArray(raw)?[...raw]:(raw?Object.values(raw):[]);
  arr.push({emoji,name:prizeName,time:Date.now(),deducted:false,memo:''});
  await gameSet(`memberPrizes/${gameKey}`,arr);
  showToast(`✅ ${name}에게 ${emoji}${prizeName} 지급!`);
  loadLeave();
}

// 경품 직접 입력
async function customPrize(gameKey,name){

  const prizeName=prompt(`경품 이름을 입력하세요`);

  await quickPrize(gameKey,name,emoji.trim(),prizeName.trim());
}

async function togglePrizeUsed(memberKey, prizeIdx, newDeducted){
  if(CU?.role!=='admin')return;
  const raw=await gameGet(`memberPrizes/${memberKey}`);
  const arr=Array.isArray(raw)?raw:(raw?Object.values(raw):[]);
  if(!arr[prizeIdx])return;
  const today=todayStr; // YYYY-MM-DD (투표 차감과 동일 형식)
  // usedDate(표시용) + deductDate(호환) 둘 다 기록
  arr[prizeIdx]={...arr[prizeIdx],deducted:newDeducted,usedDate:newDeducted?today:null,deductDate:newDeducted?today:null};
  await gameSet(`memberPrizes/${memberKey}`,arr);
  showToast(newDeducted?'✅ 사용완료 처리':'↩️ 미사용으로 변경');
  loadLeave();
}

function closeGroupLockModal(){
  document.getElementById('groupLockModal').classList.remove('active');

}
async function confirmGroupLock(){
  const pw=document.getElementById('lockPwInput').value;
  if(!pw){showToast('비밀번호를 입력하세요');return;}
  const action=_lockAction;if(!action)return;
  const {gid}=action;

  if(action.action==='enter'&&action.type==='groupEntry'){
    if(groups[gid]?.groupLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    localStorage.setItem('groupUnlocked_'+gid,'1');
    closeGroupLockModal();
    selectGroup(gid);
  }else if(action.type==='groupEntrySet'){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    await dbSet(`groups/${gid}/groupLock`,pw);
    groups[gid].groupLock=pw;
    showToast(action.action==='change'?'🔑 비번 변경됨':'🔐 진입 잠금 설정됨');
    closeGroupLockModal();loadSettings();
  }else if(action.type==='groupEntryUnlock'){
    if(groups[gid]?.groupLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    await dbSet(`groups/${gid}/groupLock`,null);
    groups[gid].groupLock=null;
    localStorage.removeItem('groupUnlocked_'+gid);
    showToast('🔓 진입 잠금 해제됨');
    closeGroupLockModal();loadSettings();
  }else if(action.action==='enter'&&action.type==='member'){
    if(groups[gid]?.memberLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    localStorage.setItem('unlockedMember_'+gid,'1');
    closeGroupLockModal();
    loadMembersPage();
  }else if(action.action==='enter'){
    if(groups[gid]?.lock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    localStorage.setItem('unlockedGroup_'+gid,'1');
    closeGroupLockModal();
    if(_pendingDept){const d=_pendingDept;_pendingDept=null;goDept(d);}
  }else if(action.action==='lock' && !action.type){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    await dbSet(`groups/${gid}/lock`,pw);
    groups[gid].lock=pw;
    showToast('🔒 잠금 설정됨');
    closeGroupLockModal();
    if(_currentTab==='settings'){loadSettings();}else{renderDeptSubMenu();loadChatTab();}
  }else if(action.action==='unlock' && !action.type){
    if(groups[gid]?.lock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    await dbSet(`groups/${gid}/lock`,null);
    groups[gid].lock=null;
    showToast('🔓 잠금 해제됨');
    closeGroupLockModal();
    if(_currentTab==='settings'){loadSettings();}else{renderDeptSubMenu();loadChatTab();}
  }else if(action.action==='change'){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    if(action.type==='member'){
      await dbSet(`groups/${gid}/memberLock`,pw);
      groups[gid].memberLock=pw;
      showToast('🔑 멤버 비번 변경됨');
    } else if(action.type==='vote'){
      await dbSet(`groups/${gid}/voteLock`,pw);
      groups[gid].voteLock=pw;
      showToast('🔑 투표 비번 변경됨');
    } else {
      await dbSet(`groups/${gid}/lock`,pw);
      groups[gid].lock=pw;
      showToast('🔑 비밀번호 변경됨');
    }
    closeGroupLockModal();loadSettings();
  }else if(action.action==='lock'&&action.type==='member'){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    await dbSet(`groups/${gid}/memberLock`,pw);
    groups[gid].memberLock=pw;
    showToast('🔒 멤버 잠금 설정됨');
    closeGroupLockModal();loadSettings();
  }else if(action.action==='unlock'&&action.type==='member'){
    if(groups[gid]?.memberLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    await dbSet(`groups/${gid}/memberLock`,null);
    groups[gid].memberLock=null;
    showToast('🔓 멤버 잠금 해제됨');
    closeGroupLockModal();loadSettings();
  }else if(action.action==='lock'&&action.type==='vote'){
    if(pw.length<4){showToast('4자리 이상 입력하세요');return;}
    await dbSet(`groups/${gid}/voteLock`,pw);
    groups[gid].voteLock=pw;
    showToast('🔒 투표 잠금 설정됨');
    closeGroupLockModal();loadSettings();
  }else if(action.action==='unlock'&&action.type==='vote'){
    if(groups[gid]?.voteLock!==pw){showToast('비밀번호가 틀렸습니다');return;}
    await dbSet(`groups/${gid}/voteLock`,null);
    groups[gid].voteLock=null;
    showToast('🔓 투표 잠금 해제됨');
    closeGroupLockModal();loadSettings();
  }
}
