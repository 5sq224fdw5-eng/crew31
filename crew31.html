async function castVote(vid,optIdx){
  // 이전 호출이 에러로 안 풀렸어도 3초 지나면 무시 (영구 잠김 방지)
  const nowTs = Date.now();
  if(window._castVoting && (nowTs - (window._castVotingAt||0)) < 3000) return;
  window._castVoting = true;
  window._castVotingAt = nowTs;
  window._castVoteOK = true; // 기본 통과. 정원초과·연차소진 등 막는 지점에서만 false로 바꿈
  const myKey=CU?.name||CU?.key||'admin';
  const _voteStartUser=CU?.name||CU?.key||'admin'; // 시작 시점 사용자 고정
  const v=await dbGet(`votes/${vid}`);
  if(!v){showToast('투표를 찾을 수없습니다');window._castVoting=false;return;}
  if(v.closed){showToast('마감된 투표입니다');window._castVoting=false;return;}

  // 선택지 타입 판별
  const newOptText = (v.options?.[optIdx]||'').toLowerCase();
  const isLeaveOpt = newOptText.includes('프패')||newOptText.includes('연차')||newOptText.includes('프리패스');
  const isTupideOpt = newOptText.includes('투피드')||newOptText.includes('두배');
  const prevOptIdx = v.responses?.[myKey];
  const prevOptText = (prevOptIdx!==undefined) ? (v.options?.[prevOptIdx]||'').toLowerCase() : '';
  const wasLeave = prevOptText.includes('프패')||prevOptText.includes('연차')||prevOptText.includes('프리패스');
  const wasTupide = prevOptText.includes('투피드')||prevOptText.includes('두배');
  const wasBonus = prevOptText.includes('봉사')||prevOptText.includes('열정페이');
  const wasDuty = prevOptText.includes('당직');
  const usedDate = getTitleDate(v) || todayStr;

  // 취소 후 재투표 제한: 취소 기록이 있으면 노피드(재능기부)만 가능 (비관리자). 단, 완료투표는 취소 개념 없음 → 무시.
  const _isEndVoteCast = (v.title||'').includes('완료')||(v.title||'').includes('퇴근')||(v.title||'').includes('마감')||v.imageUpload===true;
  if(CU?.role!=='admin' && !_isEndVoteCast){
    const _cRec = v.canceled?.[myKey];
    const _newIsNopid = newOptText.includes('노피드')||newOptText.includes('재능기부');
    if(_cRec && (_cRec.count||0)>0 && !_newIsNopid){
      showBigAlert('🚫','노피드만 가능','한 번 취소한 투표는\n재능기부(노피드)로만\n다시 선택할 수 있어요.');
      window._castVoteOK=false; window._castVoting=false; return;
    }
  }

  // 시작↔완료 선택지 일치 검사 (비관리자, 선택지형 완료투표만 — 시크릿 사진업로드형은 제외)
  //  참여→완료 / 투피드→투피드 / 노피드→노피드 / 봉사→봉사 / 연차·당직→완료투표 대상 아님
  if(CU?.role!=='admin' && _isEndVoteCast && v.imageUpload!==true){
    try{
      const _allV = await dbGet('votes');
      const _t2 = (v.title||'').match(/(\d+)월\s*(\d+)일/);
      const _startV = Object.values(_allV||{}).find(sv=>{
        if(!sv || sv.deleted || sv.group!==v.group) return false;
        if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')&&!(sv.title||'').includes('참여')) return false;
        const _t1=(sv.title||'').match(/(\d+)월\s*(\d+)일/);
        if(_t1&&_t2) return _t1[1]===_t2[1] && _t1[2]===_t2[2];
        return getTitleDate(sv)===getTitleDate(v);
      });
      const _startOpt = _startV ? (_startV.options?.[ _startV.responses?.[myKey] ]||'') : '';
      if(_startV){
        // 시작투표 미참여자는 이 그룹 완료투표 차단 (다른 그룹 사람이 잘못 누르는 것 방지)
        const _startIdx=_startV.responses?.[myKey];
        if(_startIdx===undefined || _startIdx===null){
          showBigAlert('🚫','시작투표 미참여','이 그룹 시작투표에 참여하지 않으셨어요.\n완료투표는 시작투표 참여자만\n제출할 수 있어요.');
          window._castVoteOK=false; window._castVoting=false; return;
        }
      }
      if(_startOpt){
        const _cat = (s)=>{ s=(s||'').toLowerCase();
          if(s.includes('투피드')||s.includes('두배')) return '투피드';
          if(s.includes('연차')||s.includes('프패')||s.includes('프리패스')) return '연차';
          if(s.includes('당직')) return '당직';
          if(s.includes('봉사')||s.includes('열정페이')) return '봉사';
          if(s.includes('노피드')||s.includes('재능기부')) return '노피드';
          if(s.includes('완료')||s.includes('퇴근')) return '완료';
          if(s.includes('참여')||s.includes('출근')) return '참여';
          return ''; };
        const _sc=_cat(_startOpt), _ec=_cat(newOptText);
        const _req={ '참여':'완료','투피드':'투피드','노피드':'노피드','봉사':'봉사' }[_sc];
        let _bad=false,_msg='';
        if(_sc==='연차'||_sc==='당직'){ _bad=true; const _lbl=(_sc==='연차'?'연차(프패)':'당직'); _msg=`시작투표를 ${_lbl}(으)로 내셨어요.\n${_lbl}은(는) 완료투표 대상이 아니에요.\n인사팀에 문의해 주세요.`; }
        else if(_req && _ec && _ec!==_req){ _bad=true; _msg=`시작투표를 '${_sc}'(으)로 내셨어요.\n완료투표는 '${_req}'(으)로 제출해야 해요.\n다시 확인해 주세요.`; }
        if(_bad){ showBigAlert('🚫','선택지 불일치', _msg); window._castVoteOK=false; window._castVoting=false; return; }
      }
    }catch(e){ console.warn('startEndMatch',e); }
  }

  // 재선택 제한 — 시작·완료 둘 다: 한번 투표하면 노피드(재능기부)·투피드로만 변경 가능
  if(prevOptIdx!==undefined && prevOptIdx!==optIdx){
    const newIsNopid = newOptText.includes('노피드')||newOptText.includes('재능기부');
    const newIsTupide = newOptText.includes('투피드')||newOptText.includes('두배');
    if(!newIsNopid && !newIsTupide){
      showToast('⚠️ 한번 투표하면 재능기부(노피드)·투피드로만 변경할 수 있어요');
      window._castVoteOK=false; window._castVoting=false; return;
    }
  }

  // 오락실 멤버 키 찾기 — 그 투표 그룹의 그 닉네임만 (동명이인 오차감 방지)
  async function _findGameKey(){
    const gameMembers = await gameGet('members');
    if(!gameMembers) return null;
    const gName = groups[v.group]?.name||'';
    const entries = Object.entries(gameMembers);
    let hit = entries.find(([k,m])=>{
      const clean=(m.name||'').replace(/^\*/,'');
      return clean===(gName+myKey);
    });
    if(!hit) hit = entries.find(([k,m])=>{
      const clean=(m.name||'').replace(/^\*/,'');
      return clean===myKey;
    });
    return hit?hit[0]:null;
  }

  // 보유 확인 (신규 선택일 때만 막기) — 수동+경품 연차 합산
  if(isLeaveOpt && !wasLeave){
    // ① 그룹 하루 연차 정원 체크
    try{
      const gName = groups[v.group]?.name || '';
      const quotaData = await dbGet(`leaveQuota/${gName}`);
      const quota = (quotaData!==null && quotaData!==undefined) ? quotaData : getLeaveQuota(gName);
      const allVotes = await dbGet('votes') || {};
      const cnt = new Set();
      for(const sv of Object.values(allVotes)){
        if(!sv || sv.deleted || sv.group!==v.group) continue;
        if(!(sv.title||'').includes('시작')&&!(sv.title||'').includes('출근')) continue;        // 시작투표만
        if((getTitleDate(sv)||sv.date)!==usedDate) continue;   // 같은 날
        Object.entries(sv.responses||{}).forEach(([rk,ri])=>{
          const ot=(sv.options?.[ri]||'').toLowerCase();
          if(ot.includes('프패')||ot.includes('연차')||ot.includes('프리패스')) cnt.add(rk);
        });
      }
      cnt.delete(myKey); // 본인은 제외하고 카운트
      if(cnt.size >= quota){
        showBigAlert('🏖️', '연차 마감', `${gName} 그룹은 하루 ${quota}명까지만 연차를 쓸 수 있어요.<br>이미 ${cnt.size}명이 연차를 신청했어요.<br><br>다른 선택지를 골라주세요!`);
        window._castVoteOK=false; window._castVoting=false; return;
      }
    }catch(e){}
    // ② 본인 보유 연차 확인
    try{
      const gmKey=await _findGameKey();
      if(gmKey){
        const info=await _leaveInfo(gmKey);
        if(info.total<=0){showToast('⚠️ 보유 연차가 없어요. 다른 선택지를 골라주세요!');window._castVoteOK=false; window._castVoting=false;return;}
      }
    }catch(e){}
  }
  if(isTupideOpt && !wasTupide){
    try{
      const gmKey=await _findGameKey();
      if(gmKey){
        const prizesRaw=await gameGet(`memberPrizes/${gmKey}`);
        const prizes=prizesRaw?(Array.isArray(prizesRaw)?prizesRaw:Object.values(prizesRaw)):[];
        const hasUndeducted=prizes.some(p=>p&&!p.deducted&&(p.name||'').includes('투피드'));
        const hasThisDay=prizes.some(p=>p&&p.deducted&&(p.name||'').includes('투피드')&&p.usedDate===usedDate);
        // 미사용 경품도 없고, 그날 이미 차감된 것도 없으면 막기
        if(!hasUndeducted && !hasThisDay){showToast('⚠️ 보유 투피드 경품이 없어요. 다른 선택지를 골라주세요!');window._castVoteOK=false; window._castVoting=false;return;}
      }
    }catch(e){}
  }

  // ── 차감 (신규로 연차 선택) ── 수동/경품 중 먼저 적립된 순으로 1일 차감
  if(isLeaveOpt && !wasLeave){
    try{
      // 이미 이 투표에서 차감한 기록이 있으면 재차감 금지 (중복 차감 방지)
      const alreadyUsed = await dbGet(`votes/${vid}/leaveUsed/${myKey}`);
      if(alreadyUsed){
        // 이미 차감됨 — 아무것도 안 함
      } else {
      const gmKey=await _findGameKey();
      if(!gmKey){
        showToast('⚠️ 오락실에서 회원을 못 찾아 연차 차감이 안 됐어요 (이름 확인 필요)');
      } else {
        const info=await _leaveInfo(gmKey);
        // 경품 연차가 수동보다 먼저 적립됐으면 경품부터, 아니면 수동부터
        const usePrize = info.leavePrizes.length>0 && info.oldestPrizeTime <= info.manualRepTime;
        if(usePrize){
          const target=info.leavePrizes[0];
          if(info.isArr){
            const arr=[...info.prizesRaw];
            arr[target.ref]={...arr[target.ref],deducted:true,usedDate};
            await gameSet(`memberPrizes/${gmKey}`,arr);
          }else{
            await gameSet(`memberPrizes/${gmKey}/${target.ref}/deducted`,true);
            await gameSet(`memberPrizes/${gmKey}/${target.ref}/usedDate`,usedDate);
          }
          await dbSet(`votes/${vid}/leaveUsed/${myKey}`,'prize');
          showToast('🏖️ 경품 연차 1일 사용 ('+usedDate+')');
        }else if(info.manual>0){
          const cur=info.manual;
          await gameSet(`memberLeave/${gmKey}`,Math.max(0,cur-1));
          await gamePush(`leaveLog/${gmKey}`,{type:'deduct',amount:1,date:usedDate,memo:'투표 연차 사용',time:Date.now()});
          await dbSet(`votes/${vid}/leaveUsed/${myKey}`,'manual');
          showToast('🏖️ 연차 1일 차감됨 ('+usedDate+')');
        }else{
          showToast('⚠️ 보유 연차가 없어 차감하지 못했어요');
        }
      }
      }
    }catch(e){ showToast('⚠️ 연차 차감 오류: '+(e.message||e)); }
  }
  // 투피드 차감은 아래 reconcileTupide()에서 "그날 1개만" 처리

  // ── 복구 (연차/투피드였다가 다른 선택지로 변경) ──
  if(prevOptIdx!==undefined && prevOptIdx!==optIdx){
    // 연차 복구 — 사용했던 출처(경품/수동)대로 되돌림
    if(wasLeave && !isLeaveOpt){
      try{
        const gmKey=await _findGameKey();
        if(gmKey){
          const usedType = v.leaveUsed?.[myKey];
          if(usedType==='prize'){
            // 그날 사용된 경품 연차 복구
            const prizesRaw=await gameGet(`memberPrizes/${gmKey}`);
            if(Array.isArray(prizesRaw)){
              const idx=prizesRaw.findIndex(p=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
              if(idx>=0){const arr=[...prizesRaw];arr[idx]={...arr[idx],deducted:false,usedDate:null};await gameSet(`memberPrizes/${gmKey}`,arr);}
            }else if(prizesRaw){
              const found=Object.entries(prizesRaw).find(([k,p])=>p&&p.deducted&&(p.name||'').includes('연차')&&p.usedDate===usedDate);
              if(found){await gameSet(`memberPrizes/${gmKey}/${found[0]}/deducted`,false);await gameSet(`memberPrizes/${gmKey}/${found[0]}/usedDate`,null);}
            }
            showToast('↩️ 경품 연차 복구됨');
          }else if(usedType==='manual'){
            const cur=await gameGet(`memberLeave/${gmKey}`)||0;
            await gameSet(`memberLeave/${gmKey}`,cur+1);
            await gamePush(`leaveLog/${gmKey}`,{type:'give',amount:1,date:usedDate,memo:'투표 연차 복구',time:Date.now()});
            showToast('↩️ 연차 복구됨');
          }
          await dbDelete(`votes/${vid}/leaveUsed/${myKey}`);
        }
      }catch(e){showToast('⚠️ 연차 복구 실패');}
    }
    // 투피드 → 다른 선택지: 링크 삭제 (경품 정합은 아래 reconcileTupide에서 처리)
    if(wasTupide && !isTupideOpt){
      const key=CU?.key||'admin';
      await dbDelete(`votes/${vid}/links/${key}_1`);
      await dbDelete(`votes/${vid}/links/${key}_2`);
      await dbDelete(`votes/${vid}/links/${key}`);
    }
  }

  // 저장 직전: 처리 중 로그인 사용자가 바뀌지 않았는지 확인 (세션 꼬임 방지)
  const _nowUser=CU?.name||CU?.key||'admin';
  if(_nowUser!==_voteStartUser){
    showToast('⚠️ 로그인 정보가 바뀌었어요. 다시 로그인 후 투표해주세요');
    window._castVoting=false;
    return;
  }
  await dbSet(`votes/${vid}/responses/${myKey}`,optIdx);
  dbSet(`votes/${vid}/responseTimes/${myKey}`,Date.now());
  await reconcileTupide(v.group, usedDate, myKey);
  await recordAttendance(vid, optIdx, myKey);

  // 연차 선택 시 → 같은 날짜 완료 투표에도 자동 기록
  if(isLeaveOpt){
    try{
      const curV = await dbGet(`votes/${vid}`);
      const titleDate = getTitleDate(curV||{});
      const allVotes3 = await dbGet('votes');
      if(allVotes3 && curV){
        const endVote = Object.values(allVotes3).find(sv=>
          !sv.deleted && sv.group===curV.group &&
          (sv.title||'').includes('완료') &&
          getTitleDate(sv)===titleDate
        );
        if(endVote){
          const endVid = Object.keys(allVotes3).find(k=>allVotes3[k]===endVote);
          const mondayStr = getWeekKey(titleDate);
          await dbSet(`attendance/${curV.group}/${mondayStr}/${myKey}/${titleDate}`,'프패');
          // 사진 업로드 방식 완료 투표 - images에 연차 마커 추가
          if(endVote.imageUpload && endVid){
            await dbSet(`votes/${endVid}/images/${myKey}`, [{url:'연차',uploadedAt:Date.now()}]);
          } else if(endVid){
            // 선택지 방식 완료 투표
            const prIdx = (endVote.options||[]).findIndex(o=>(o||'').toLowerCase().includes('프패')||(o||'').includes('연차'));
            if(prIdx>=0) await dbSet(`votes/${endVid}/responses/${myKey}`, prIdx);
          }
        }
      }
    }catch(e){}
  }

  // ── (맨 끝) 봉사·노피드로 선택 시 제출했던 링크 자동 삭제 ──
  // 연차/투피드/응답/출석 처리가 모두 끝난 뒤 실행 → 그 로직들과 절대 안 섞임. 링크만 건드림.
  {
    const _isBonusOrNopid = newOptText.includes('봉사')||newOptText.includes('열정페이')||newOptText.includes('노피드')||newOptText.includes('재능기부');
    if(_isBonusOrNopid){
      try{
        const _lk = CU?.key||'admin';
        const _had = (await dbGet(`votes/${vid}/links/${_lk}`)) || (await dbGet(`votes/${vid}/links/${_lk}_1`)) || (await dbGet(`votes/${vid}/links/${_lk}_2`));
        if(_had){
          await dbDelete(`votes/${vid}/links/${_lk}`);
          await dbDelete(`votes/${vid}/links/${_lk}_1`);
          await dbDelete(`votes/${vid}/links/${_lk}_2`);
          showToast('링크가 자동 삭제됐어요');
        }
      }catch(e){}
    }
  }

  if(_currentTab==='home')loadHome();
  else if(_currentTab==='dept')loadDeptPage(_currentDept);
  window._castVoting = false;
}

async function saveVote(){
  const title=document.getElementById('voteTitle').value.trim();
  const date=document.getElementById('voteDate').value;
  const time=document.getElementById('voteTime').value;
  const group=document.getElementById('voteGroup').value;
  const vid=document.getElementById('editVoteId').value;
  const isImageUpload=document.getElementById('voteImageUpload')?.checked||false;
  if(!title){showToast('제목을 입력하세요');return;}
  const options=_editOptList.filter(o=>o.trim());
  if(!isImageUpload && options.length<2){showToast('선택지를 2개 이상 입력하세요');return;}
  const tplMembersRaw = document.getElementById('voteTplMembers')?.value.trim();
  const tplMembers = tplMembersRaw ? tplMembersRaw.split(',').map(m=>m.trim()).filter(Boolean) : [];
  const data={title,date,time,group,options,createdAt:Date.now(),createdBy:CU.name};
  if(tplMembers.length>0) data.tplMembers = tplMembers;
  if(isImageUpload) data.imageUpload=true;
  if(vid){
    const existing=await dbGet(`votes/${vid}`);
    await dbSet(`votes/${vid}`,{...existing,...data});
    showToast('✅ 수정됨');
  }else{
    const newId = await dbPush('votes',data);
    const newVid = newId?.name;
    // 완료 투표 오픈 시: 같은 날 시작 투표에서 연차/당직 선택한 사람을 응답에 미리 산정
    if(newVid && ((title||'').includes('완료')||(title||'').includes('퇴근'))){
      try{
        const allVotes = await dbGet('votes');
        if(allVotes){
          const startVote = Object.entries(allVotes).find(([k,sv])=>
            !sv.deleted && sv.group===group && (sv.title||'')===title.replace('퇴근','출근')
          );
          if(startVote && startVote[1].responses){
            const svOpts = startVote[1].options||[];
            const leaveIdx = options.findIndex(o=>(o||'').includes('완료')||(o||'').includes('퇴근')) ;
            const dutyIdx = options.findIndex(o=>(o||'').includes('당직'));
            const preset = {};
            Object.entries(startVote[1].responses).forEach(([nm,idx])=>{
              const opt=(svOpts[idx]||'');
              if(opt.includes('당직') && dutyIdx>=0) preset[nm]=dutyIdx;
              else if((opt.includes('연차')||opt.includes('프패')) && leaveIdx>=0) preset[nm]=leaveIdx;
            });
            if(Object.keys(preset).length>0){
              await dbSet(`votes/${newVid}/responses`, preset);
            }
          }
        }
      }catch(e){ console.warn('완료투표 연차/당직 사전산정 실패', e); }
    }
    showToast('✅ 등록됨');
    const gName=group==='all'?'전체':(groups[group]?.name||group);
    sendFCMNotification({
      title:`📋 새 투표: ${title}`,
      body:`[${gName}] ${date?date+' '+time+' 마감':'기한 없음'}`,
      data:{tab:'home'}
    });
  }
  closeVoteModal();
  if(_currentTab==='home')loadHome();else loadDeptPage(_currentDept);
}

const VOTE_RESULT_MAP = {
  '완료': '완료', '퇴근': '완료', '출근': '완료',
  '당직': '당직',

  '프패': '프패', '연차': '프패', '프리패스': '프패',
  '봉사': '봉사', '열정페이': '봉사',
  '노피드': '노피드', '재능기부': '노피드',
  '투피드': '투피드', '두배': '투피드',
  '확인증': '확인증',
  '누락': '누락'
};

function mapVoteResult(optionText) {
  if(!optionText) return '';
  const t = optionText.toLowerCase();
  for(const [key, val] of Object.entries(VOTE_RESULT_MAP)) {
    if(t.includes(key.toLowerCase())) return val;
  }
  return '완료'; // 기본값
}

// 날짜 → 엑셀 시리얼 번호 변환
function dateToExcelSerial(dateStr) {
  const d = new Date(dateStr);
  const start = new Date(1899, 11, 30);
  return Math.round((d - start) / 86400000);
}

// 엑셀 시리얼 → 날짜 문자열
function excelSerialToDate(serial) {
  const d = new Date(1899, 11, 30);
  d.setDate(d.getDate() + serial);
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

// 주차 계산 (월요일 기준)
function getTitleDate(v){
  const m=(v.title||'').match(/(\d+)월\s*(\d+)일/);
  if(m){const yr=new Date().getFullYear();return `${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
  return v.date||'';
}

function getWeekKey(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().slice(0, 10); // 월요일 날짜
}

function getWeekLabel(mondayStr) {
  const d = new Date(mondayStr);
  const m = d.getMonth() + 1;
  // 해당 달의 몇째 주인지
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
  const weekNum = Math.ceil((d.getDate() + firstDay.getDay() - 1) / 7);
  return `${m}월 ${weekNum}주`;
}

async function loadStatusGroup(gid) {
  Object.keys(groups).forEach(id => {
    const btn = document.getElementById(`statusTab_${id}`);
    if(btn) { btn.style.background = id===gid?'var(--accent)':'var(--surface2)'; btn.style.color = id===gid?'white':'var(--text2)'; }
  });

  const el = document.getElementById('statusContent');
  if(!el) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  const [votes, attendance, crewMembers, attManual] = await Promise.all([
    dbGet('votes'),
    dbGet(`attendance/${gid}`),
    dbGet('members'),
    dbGet(`attendanceManual/${gid}`)
  ]);

  const gName = groups[gid]?.name || gid;
  const keyToName = {};
  if(crewMembers) Object.entries(crewMembers).forEach(([k,m]) => { if(m.name) keyToName[k] = m.name; });

  const att = attendance || {};

  // 주차 목록: attendance 데이터 + 투표 날짜 합쳐서
  const weeks = {}; // mondayStr → {dates: Set, members: {}}

  // 1. attendance 데이터에서 주차 추출
  Object.entries(att).forEach(([mondayStr, members]) => {
    if(!weeks[mondayStr]) weeks[mondayStr] = {dates: new Set(), members: {}};
    Object.entries(members).forEach(([mname, dates]) => {
      Object.entries(dates).forEach(([date, result]) => {
        weeks[mondayStr].dates.add(date);
        if(!weeks[mondayStr].members[mname]) weeks[mondayStr].members[mname] = {};
        weeks[mondayStr].members[mname][date] = result;
      });
    });
  });

  // 2. 투표 데이터에서 보강 — attendance에 없는 칸만 채움.
  //    참여/완료(일반)는 recordAttendance가 '시작+완료 둘 다' 판정해 attendance에 기록하므로
  //    여기서 투표 응답을 '완료'로 임의 변환하지 않는다(미완료가 완료로 보이는 버그 방지).
  //    단, 특수선택지(프패/봉사/노피드/투피드)는 그날 확정값이라 보강 표시.
  if(votes) {
    Object.entries(votes)
      .filter(([,v]) => !v.deleted && v.group === gid && v.date)
      .forEach(([vid, v]) => {
        const mondayStr = getWeekKey(v.date);
        if(!weeks[mondayStr]) weeks[mondayStr] = {dates: new Set(), members: {}};
        weeks[mondayStr].dates.add(v.date);
        const opts = v.options || [];
        Object.entries(v.responses || {}).forEach(([mkey, optIdx]) => {
          const mname = keyToName[mkey] || mkey;
          if(!weeks[mondayStr].members[mname]) weeks[mondayStr].members[mname] = {};
          const result = mapVoteResult(opts[optIdx] || '');
          const cur = weeks[mondayStr].members[mname][v.date];
          if(cur) return; // attendance 값 우선
          if(['프패','당직','공게','확인증'].includes(result)){
            weeks[mondayStr].members[mname][v.date] = result;
          } else {
            weeks[mondayStr].members[mname][v.date] = '참여';
          }
        });
      });
  }

  // 취소 유령 제거 + 완료/미완료 보정
  {
    const hasResp = {};        // 시작·완료 어디든 응답
    const didEndV = {};        // 완료투표(또는 이미지) 참여
    const startExistsByDate = {}; // 그 날짜에 시작투표가 존재하는지
    const endExistsByDate = {};   // 그 날짜에 완료투표가 존재하는지
    if(votes){
      Object.values(votes).forEach(v=>{
        if(!v || v.deleted || v.group!==gid || !v.date) return;
        const dd = getTitleDate(v) || v.date;
        const t = v.title||'';
        const isStart = t.includes('시작')||t.includes('출근');
        const isEnd = !isStart && (t.includes('완료')||t.includes('퇴근')||t.includes('마감')||v.imageUpload);
        if(isStart) startExistsByDate[dd]=true;
        if(isEnd) endExistsByDate[dd]=true;
        Object.keys(v.responses||{}).forEach(mkey=>{
          const nm=keyToName[mkey]||mkey;
          hasResp[`${dd}__${nm}`]=true;
          if(isEnd) didEndV[`${dd}__${nm}`]=true;
        });
        Object.keys(v.images||{}).forEach(mkey=>{
          const nm=keyToName[mkey]||mkey;
          hasResp[`${dd}__${nm}`]=true;
          if(isEnd) didEndV[`${dd}__${nm}`]=true;
        });
      });
    }
    const didStartV = {};      // 시작투표 참여
    const dutyStartV = {};     // 시작투표에서 당직 선택 (과거 데이터 '참여' 보정용)
    if(votes){
      Object.values(votes).forEach(v=>{
        if(!v || v.deleted || v.group!==gid || !v.date) return;
        const dd = getTitleDate(v) || v.date;
        if(!(v.title||'').includes('시작')&&!(v.title||'').includes('출근')) return;
        Object.entries(v.responses||{}).forEach(([mkey,idx])=>{
          const nm=keyToName[mkey]||mkey;
          didStartV[`${dd}__${nm}`]=true;
          if(((v.options||[])[idx]||'').toLowerCase().includes('당직')) dutyStartV[`${dd}__${nm}`]=true;
        });
      });
    }
    Object.entries(weeks).forEach(([mondayStr, wk])=>{
      Object.entries(wk.members).forEach(([mname,dmap])=>{
        Object.keys(dmap).forEach(date=>{
          // 수동으로 직접 지정한 칸은 절대 건드리지 않음 (카톡 사진인증 등 수동 출근 인정)
          if(attManual?.[mondayStr]?.[mname]?.[date]) return;
          const val=dmap[date];
          const k=`${date}__${mname}`;
          // 당직은 무조건 당직 (과거 '참여'로 저장된 데이터 보정) — 출근으로 집계
          if(dutyStartV[k]){ dmap[date]='당직'; return; }
          const noEndVote = !endExistsByDate[date]; // 그날 완료투표가 아예 없음
          if((val==='참여'||val==='시작')){
            if(!hasResp[k]){ delete dmap[date]; return; } // 취소 유령 → 빈칸
            // 시작투표 없는 날(옛 방식) 완료투표 응답자 → 완료
            if(!startExistsByDate[date] && didEndV[k]) dmap[date]='완료';
            // 시작+완료 둘 다 응답 → 완료 승격
            else if(didStartV[k] && didEndV[k]) dmap[date]='완료';
          } else if(['봉사','투피드','노피드'].includes(val)){
            // 완료투표 있는 날인데 완료투표 미참여 → 미완료(연하게)
            if(!noEndVote && !didEndV[k]) dmap[date] = val+'·미완료';
          }
        });
      });
    });
  }

  window._statusWeeksCache = window._statusWeeksCache || {};
  window._statusWeeksCache[gid] = weeks;

  if(Object.keys(weeks).length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>${gName} 데이터 없음</div>`;
    return;
  }

  const resultColor = {'완료':'#5DB88A','참여':'#5DB88A','지각':'#E8927C','당직':'#7C9CDB','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b','확인증':'#FF85C1','시작':'#c7b8e0','봉사·미완료':'#A78BFA','투피드·미완료':'#f59e0b','노피드·미완료':'#94a3b8'};
  const ADMIN_NAMES = ['고인물','에이스','경력직','불주먹','김월루','퇴사각','알잘딱'];
  let html = '';

  for(const [mondayStr, wdata] of Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0]))) {
    const wLabel = getWeekLabel(mondayStr);
    // 월요일~일요일 7일 전체 생성 (투표 없는 요일도 빈칸으로 표시)
    const dates = [];
    {
      const mk = parseYMDc(mondayStr) ?? (function(){ const m=String(mondayStr).match(/(\d{4})-(\d{2})-(\d{2})/); return m?new Date(+m[1],+m[2]-1,+m[3]).getTime():null; })();
      if(mk!=null){
        for(let i=0;i<7;i++){
          const d=new Date(mk + i*86400000);
          dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
        }
      } else {
        // 안전장치: mondayStr 파싱 실패 시 기존 방식
        [...wdata.dates].sort().forEach(x=>dates.push(x));
      }
    }
    const memberResults = wdata.members;
    // 인사팀 7명은 참여 안 해도 현황 윗줄에 항상 고정 표시 (없으면 빈 행으로 추가)
    ADMIN_NAMES.forEach(an=>{ if(!memberResults[an]) memberResults[an] = {}; });

    // 개근자(풀참) 미리 계산 — 헤더의 주식지급 버튼에서 쓰기 위해 멤버 루프보다 먼저 구함
    const _fullMembers = [];
    Object.entries(memberResults).forEach(([mname, mdates])=>{
      if(mname==='관리자' || ADMIN_NAMES.includes(mname)) return;
      const fc = dates.filter(d=>['완료','당직','공게','투피드','노피드','프패','확인증'].includes(mdates[d])).length;
      if(fc>=7) _fullMembers.push(mname);
    });
    const _fmJson = encodeURIComponent(JSON.stringify(_fullMembers));

    html += `<div style="background:white;border-radius:16px;margin:8px 14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.06)">`;
    html += `<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">`;
    html += `<div style="font-size:14px;font-weight:800">${wLabel}</div>`;
    // 가운데: 풀참 주식지급 버튼 (관리자 + 개근자 있을 때만)
    html += `<div style="flex:1;display:flex;justify-content:center;min-width:140px">`;
    if(CU?.role==='admin' && _fullMembers.length>0) html += `<button onclick="openFullAttPayout('${gid}','${mondayStr}','${escH(wLabel)}',decodeURIComponent('${_fmJson}'))" style="font-size:11px;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;background:#FFE066;color:#7a5a00;font-weight:800;white-space:nowrap">🎰 풀참 주식 지급(${_fullMembers.length}명)</button>`;
    html += `</div>`;
    // 오른쪽: 엑셀 / 수정
    html += `<div style="display:flex;gap:6px;align-items:center">`;
    html += `<button onclick="downloadWeekExcel('${gid}','${mondayStr}')" style="font-size:11px;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;background:var(--green);color:white;font-weight:700">⬇️ 엑셀</button>`;
    html += `</div></div>`;

    html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed">`;
    html += `<tr style="background:var(--surface2)"><th style="padding:4px 3px;text-align:center;font-weight:700;white-space:nowrap;width:calc(100% / 9)">멤버</th>`;
    dates.forEach(d => {
      const dd = new Date(d);
      const days = ['일','월','화','수','목','금','토'];
      const cnt = Object.entries(memberResults).filter(([n,md])=> n!=='관리자' && md[d] && md[d]!=='').length;
      html += `<th style="padding:4px 1px;text-align:center;font-weight:700;white-space:nowrap;width:calc(100% / 9)"><span style="font-size:9px">${dd.getMonth()+1}/${dd.getDate()}</span><br><span style="font-weight:400;color:var(--text3);font-size:9px">${days[dd.getDay()]}</span><br><span style="font-weight:700;color:var(--accent);font-size:8px">${cnt}</span></th>`;
    });
    html += `<th style="padding:4px 2px;text-align:center;font-weight:700;width:calc(100% / 9)">풀참</th></tr>`;

    // 필터 드롭다운 행
    html += `<tr class="filter-row">`;
    html += `<td style="width:calc(100% / 9)"></td>`;
    dates.forEach((d, dateIdx) => {
      html += `<td style="text-align:center;padding:2px;width:calc(100% / 9)">
        <select style="width:95%;font-size:8px" onchange="filterByDate(this, ${dateIdx}, '${mondayStr}')">
          <option value="">전체</option>
          <option>완료</option>
          <option>지각</option>
          <option>참여</option>
          <option>당직</option>
          <option>프패</option>
          <option>공게</option>
          <option>봉사</option>
          <option>노피드</option>
          <option>투피드</option>
          <option>확인증</option>
        </select>
      </td>`;
    });
    html += `<td style="width:calc(100% / 9)"></td></tr>`;

    // 통계 행
    html += `<tr style="background:#f9f9f9">`;
    html += `<td style="width:calc(100% / 9)">📊</td>`;
    dates.forEach(d => {
      const stats = {};
      Object.entries(memberResults).forEach(([n,md])=>{
        const r = md[d] || '';
        const key = (r==='시작'?'참여':r);
        if(!key) return;
        stats[key] = (stats[key]||0) + 1;
      });
      const statsText = Object.entries(stats).map(([k,v])=>`${k}${v}`).join(' ');
      html += `<td style="font-size:7px;text-overflow:ellipsis;text-align:center;width:calc(100% / 9)">${statsText}</td>`;
    });
    html += `<td style="width:calc(100% / 9)"></td></tr>`;

    // 정렬: 인사팀 먼저, 그다음 가나다 ('관리자' 계정은 현황에서 제외 — 관리만 함)
    const sortedMembers = Object.entries(memberResults)
      .filter(([n]) => n!=='관리자')
      // 취소 유령 빈 줄 제외: 그 주 7칸이 전부 비면 명단에서 뺌 (단, 관리자 7명은 항상 표시)
      .filter(([n,md]) => ADMIN_NAMES.includes(n) || dates.some(d => md[d] && md[d]!==''))
      .sort(([a],[b]) => {
        const aA = ADMIN_NAMES.includes(a), bA = ADMIN_NAMES.includes(b);
        if(aA && !bA) return -1; if(!aA && bA) return 1;
        if(aA && bA) return ADMIN_NAMES.indexOf(a) - ADMIN_NAMES.indexOf(b);
        return a.localeCompare(b, 'ko');
      });


    sortedMembers.forEach(([mname, mdates]) => {
      const fullCount = dates.filter(d => {
        const r = mdates[d];
        return ['완료','당직','공게','투피드','노피드','프패','확인증'].includes(r);
      }).length;
      const isFull = fullCount >= 7;
      const isAdminM = ADMIN_NAMES.includes(mname);
      html += `<tr id="statusRow_${mondayStr}_${mname.replace(/[^a-zA-Z0-9]/g,'_')}" style="border-top:1px solid var(--border);${isAdminM?'background:#fff8f5':''}">`;
      html += `<td style="padding:5px 3px;text-align:center;font-weight:${isAdminM?'800':'600'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${isAdminM?'var(--accent)':'inherit'};width:calc(100% / 9)">${escH(mname)}</td>`;
      dates.forEach(d => {
        let r = mdates[d] || '';
        if(r==='시작') r='참여';
        const isMiwan = r.endsWith('·미완료');
        const label = isMiwan ? r.replace('·미완료','') : r;
        const bg = resultColor[r] || '#f1f5f9';
        const isDim = (r==='참여'||r===''||isMiwan);
        const cellBg = !r ? '#ffffff' : (isDim ? bg+'18' : bg+'33');
        const cellFg = !r ? '#ffffff' : (isDim ? bg+'99' : bg);
        const cellWeight = isDim ? '600' : '800';
        const filterKey = (r==='참여'?'참여':r) || 'empty';
        if(CU?.role==='admin'){
          const editVal = isMiwan ? label : r; // 미완료 접미사 제거한 편집 기준값
          const stdOpts = ['','완료','당직','지각','프패','공게','봉사','노피드','투피드','확인증'];
          let optsHtml = '';
          if(editVal && !stdOpts.includes(editVal)) optsHtml += `<option value="${escH(editVal)}" selected>${escH(editVal)}</option>`;
          optsHtml += stdOpts.map(o=>`<option value="${o}" ${editVal===o?'selected':''}>${o||'-'}</option>`).join('');
          const nm = mname.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          html += `<td data-filter="${filterKey}" style="padding:3px 1px;text-align:center;width:calc(100% / 9)"><select onchange="selectAttResult('${gid}','${mondayStr}','${nm}','${d}',this)" style="width:100%;height:24px;border:none;border-radius:5px;background:${cellBg};color:${cellFg};font-weight:${cellWeight};font-size:9px;text-align:center;text-align-last:center;-webkit-appearance:none;appearance:none;padding:0;cursor:pointer">${optsHtml}</select></td>`;
        } else {
          html += `<td data-filter="${filterKey}" style="padding:3px 1px;text-align:center;width:calc(100% / 9)"><span style="display:inline-block;padding:2px 1px;border-radius:5px;background:${cellBg};color:${cellFg};font-weight:${cellWeight};font-size:9px;width:100%;box-sizing:border-box;overflow:hidden;white-space:nowrap;text-align:center">${label||'-'}</span></td>`;
        }
      });
      html += `<td style="padding:5px 2px;text-align:center;font-weight:800;font-size:10px;color:${isFull?'var(--green)':'var(--text3)'};width:calc(100% / 9)">${isFull?'✅':(fullCount+'/7')}</td>`;
      html += `</tr>`;
    });
    html += `</table></div>`;
    html += `</div>`;
  }

  el.innerHTML = html || '<div class="empty">데이터 없음</div>';
}

// ── 현황판 날짜별 필터링 (동적 행 정렬) ──
function filterByDate(select, dateIdx, mondayStr) {
  const filterValue = select.value;
  const table = select.closest('table');
  const statsRow = table.querySelector('.filter-row').nextElementSibling;
  const rows = Array.from(table.querySelectorAll('tr'))
    .filter(row => row.id && row.id.startsWith(`statusRow_${mondayStr}`));

  if (!table._origRowOrder) {
    table._origRowOrder = rows.slice();
  }

  if (!filterValue) {
    rows.forEach(row => {
      const cells = row.querySelectorAll('td[data-filter]');
      if (cells[dateIdx]) cells[dateIdx].style.opacity = '1';
    });
    let prev = statsRow;
    table._origRowOrder.forEach(row => {
      prev.parentNode.insertBefore(row, prev.nextElementSibling);
      prev = row;
    });
  } else {
    const matchingRows = [];
    const otherRows = [];
    const originalOrder = new Map();
    table._origRowOrder.forEach((row, idx) => originalOrder.set(row, idx));

    rows.forEach((row) => {
      const cells = row.querySelectorAll('td[data-filter]');
      const targetCell = cells[dateIdx];
      if (!targetCell) return;

      const cellFilter = targetCell.getAttribute('data-filter');
      if (cellFilter === filterValue) {
        matchingRows.push(row);
        targetCell.style.opacity = '1';
      } else {
        otherRows.push(row);
        targetCell.style.opacity = '0.2';
      }
    });

    matchingRows.sort((a, b) => originalOrder.get(a) - originalOrder.get(b));
    otherRows.sort((a, b) => originalOrder.get(a) - originalOrder.get(b));
    const sortedRows = [...matchingRows, ...otherRows];

    const filterRow = table.querySelector('.filter-row');
    let prev = filterRow;

    sortedRows.forEach(row => {
      prev.parentNode.insertBefore(row, prev.nextElementSibling);
      prev = row;
    });
  }
}


let _payoutData = null; // {gid, mondayStr, label, members[]}
async function openFullAttPayout(gid, mondayStr, label, membersJson){
  if(CU?.role!=='admin'){ showToast('관리자 전용'); return; }
  let members=[]; try{ members=JSON.parse(membersJson)||[]; }catch(e){}
  _payoutData = { gid, mondayStr, label, members };
  // 이미 지급된 사람 확인 — 안전한 게임키(gKey) 기준 + 옛 닉네임키 호환
  const [paidRec, gameMembers] = await Promise.all([
    dbGet(`stockPayout/${gid}/${mondayStr}`),
    gameGet('members')
  ]);
  const paid = paidRec||{};
  const gMembers = gameMembers||{};
  const gName = groups[gid]?.name || '';
  const entries = Object.entries(gMembers);
  const keyOf = (nm)=>{
    let hit = entries.find(([k,m])=>((m.name||'').replace(/^\*/,''))===(gName+nm));
    if(!hit) hit = entries.find(([k,m])=>((m.name||'').replace(/^\*/,''))===nm);
    return hit?hit[0]:null;
  };
  const isPaid = (nm)=>{ const gk=keyOf(nm); return (gk&&paid[gk]) || paid[nm]; }; // 게임키 또는 옛 닉네임
  _payoutData._keyOf = keyOf;
  let m=document.getElementById('payoutModal');
  if(!m){ m=document.createElement('div'); m.id='payoutModal'; m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10002;display:flex;align-items:center;justify-content:center;padding:20px'; document.body.appendChild(m); }
  const unpaidCount = members.filter(nm=>!isPaid(nm)).length;
  // 카톡 공지문 기본값: 개근자 전원 (관리자가 직접 수정 가능). 지급은 중복 안 되므로 안전.

  h+=`<textarea id="payoutNotice" style="width:100%;box-sizing:border-box;height:170px;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;line-height:1.7;color:var(--text);background:var(--surface2);resize:vertical;outline:none">${escH(noticeText)}</textarea>`;
  h+=`<button onclick="copyPayoutNotice()" style="width:100%;padding:11px;border:none;border-radius:10px;background:#FAE100;color:#3C1E00;font-size:13px;font-weight:800;cursor:pointer;margin:8px 0 4px">📋 공지문 복사하기</button>`;

  // ── 아래 영역: 지급 대상 닉네임 + 자동 지급 ──
  h+=`<div style="border-top:1px solid var(--border);margin:14px 0 0;padding-top:12px"></div>`;

  });

  h+=`<div style="font-size:11px;color:#FF9F43;margin-bottom:8px">⚠️ 누르면 오락실에서 아직 안 받은 ${unpaidCount}명에게 주식 1주씩 지급됩니다. (이미 받은 사람은 건너뜀)</div>`;

async function runStockPayout(){
  if(!_payoutData){ return; }
  if(CU?.role!=='admin'){ showToast('관리자 전용'); return; }
  const { gid, mondayStr, members, label } = _payoutData;
  const resEl=document.getElementById('payoutResult');
  if(resEl) resEl.innerHTML='<div style="text-align:center;color:var(--text3);font-size:12px">지급 중...</div>';
  try{
    const gameMembers = await gameGet('members');
    if(!gameMembers){ showToast('오락실 멤버를 불러올 수 없어요'); return; }
    const paidRec = await dbGet(`stockPayout/${gid}/${mondayStr}`) || {};
    let done=0, fail=[];
    const gName = groups[gid]?.name || '';
    const entries = Object.entries(gameMembers);
    const stockUpdates = {};   // "게임키/stock" -> 새 값
    const logUpdates = {};     // "게임키/로그id" -> stockLog 항목 (오락실 내역에 표시)
    const payoutUpdates = {};  // "닉네임" -> 크루 지급기록(중복방지)
    const nowT = Date.now();
    const kd = new Date(); kd.setHours(kd.getHours()+9); const kstDate = kd.toISOString().slice(0,10); // 오락실과 동일 KST YYYY-MM-DD
    const memo = `${label}차 풀참 보상`;   // 예: "6월 3주차 풀참 보상"
    let idx=0;
    for(const nm of members){
      // 연차/투피드와 동일한 검증된 매칭: 그룹명+닉네임 우선, 안 되면 닉네임만
      let hit = entries.find(([k,m])=>((m.name||'').replace(/^\*/,''))===(gName+nm));
      if(!hit) hit = entries.find(([k,m])=>((m.name||'').replace(/^\*/,''))===nm);
      if(!hit){ fail.push(nm); continue; }
      const [gKey, gM] = hit;
      if(paidRec[gKey] || paidRec[nm]) continue; // 이미 지급(게임키 또는 옛 닉네임 기준)
      const cur = Number(gM.stock)||0;
      stockUpdates[`${gKey}/stock`] = cur+1;
      logUpdates[`${gKey}/payout_${nowT}_${idx}`] = { type:'give', amount:1, date:kstDate, time:nowT, memo };
      payoutUpdates[gKey] = { nick:nm, at:nowT, by:CU.name, memo }; // 안전한 게임키로 기록(닉네임 특수문자 무관)
      done++; idx++;
    }
    if(done>0){
      // 1) 오락실 주식 적립 + 내역(stockLog) 먼저 — 성공해야 함
      const okStock = await gameUpdate('members', stockUpdates);
      const okLog   = await gameUpdate('stockLog', logUpdates);
      if(!okStock){
        if(resEl) resEl.innerHTML='<div style="background:#FDECEA;border-radius:10px;padding:12px;text-align:center;color:#E8927C;font-weight:700">⚠️ 오락실 주식 적립 실패 — 잠시 후 다시 시도해 주세요 (지급기록 남기지 않음)</div>';
        showToast('지급 실패: 다시 시도');
        return;
      }
      // 2) 적립 성공한 경우에만 크루 지급기록(중복방지) 저장
      await dbUpdate(`stockPayout/${gid}/${mondayStr}`, payoutUpdates);
      if(!okLog) showToast('주식은 지급됐는데 내역 기록은 실패했을 수 있어요');
    }
    let rh=`<div style="background:#E8F8EE;border-radius:10px;padding:12px;text-align:center"><div style="font-size:14px;font-weight:800;color:var(--green)">✅ ${done}명에게 주식 1주씩 지급 완료</div>`;
    if(fail.length>0) rh+=`<div style="font-size:11px;color:#E8927C;margin-top:6px">⚠️ 매칭 실패(오락실에 없음): ${fail.map(escH).join(', ')}</div>`;
    rh+=`</div>`;
    if(resEl) resEl.innerHTML=rh;
    showToast(`✅ ${done}명 지급 완료`);
    // 버튼 갱신 위해 모달 다시 그림
    setTimeout(()=>openFullAttPayout(gid, mondayStr, _payoutData.label, encodeURIComponent(JSON.stringify(members))),1500);
  }catch(e){
    if(resEl) resEl.innerHTML='<div style="color:#E8927C;text-align:center">지급 실패: '+escH(e.message)+'</div>';
  }
}

// ── 출석 자동 기록 (castVote 후 호출) ──
async function recordAttendance(vid, optIdx, voterKey) {
  try {
    const v = await dbGet(`votes/${vid}`);
    if(!v || !v.date || !v.group || v.group === 'all') return;

    const gid = v.group;
    const gName = groups[gid]?.name || '';

    // 시작 투표 → 선택지 기준, 완료 투표 선택지 → 결과 업데이트
    const isStartVote = (v.title||'').includes('시작')||(v.title||'').includes('출근');
    const isEndVote2 = (v.title||'').includes('완료')||(v.title||'').includes('퇴근')||v.imageUpload;
    if(!isStartVote && !isEndVote2) return;

    // 제목에서 날짜 추출 (예: 5월 27일 → 해당년도 기준)
    const titleMatch = (v.title||'').match(/(\d+)월\s*(\d+)일/);
    let date = v.date;
    if(titleMatch){
      const now = new Date();
      const mon = titleMatch[1].padStart(2,'0');
      const day = titleMatch[2].padStart(2,'0');
      date = `${now.getFullYear()}-${mon}-${day}`;
    }
    const mondayStr = getWeekKey(date);
    const myKey = voterKey || CU?.name || CU?.key || 'guest';

    // 그날·그룹의 시작/완료 투표 결과 수집
    const allVotes = await dbGet('votes') || {};
    let startResult=null, endResult=null, endVoteExists=false, startVoteExists=false;
    for(const sv of Object.values(allVotes)){
      if(!sv || sv.deleted || sv.group!==gid) continue;
      const sm = (sv.title||'').match(/(\d+)월\s*(\d+)일/);
      let sdate = sv.date;
      if(sm){ const n=new Date(); sdate=`${n.getFullYear()}-${sm[1].padStart(2,'0')}-${sm[2].padStart(2,'0')}`; }
      if(sdate!==date) continue;
      const idx = sv.responses?.[myKey];
      const sImgs = sv.images?.[myKey] || [];
      const title = sv.title||'';
      const sIsStart = title.includes('시작')||title.includes('출근');
      const sIsEnd = !sIsStart && (title.includes('완료')||title.includes('퇴근')||title.includes('마감'));
      if(sIsStart) startVoteExists=true;
      if(sIsEnd) endVoteExists=true;
      let r = (idx!==undefined&&idx!==null) ? mapVoteResult((sv.options||[])[idx]||'') : null;
      if(sIsEnd && sImgs.length>0 && !r) r='완료';
      if(sIsStart && r!==null) startResult=r;
      if(sIsEnd && r!==null) endResult=r;
    }

    let finalResult;
    if(startResult==='프패' || endResult==='프패'){
      finalResult='프패';                       // 연차는 즉시 확정
    } else if(startResult==='당직' || endResult==='당직'){
      finalResult='당직';                       // 당직도 즉시 확정 (완료투표 안 해도 출근 인정)
    } else if(startResult && endResult){
      const special=['봉사','노피드','투피드'].find(s=>s===endResult||s===startResult);
      finalResult = special || '완료';          // 둘 다 함 → 완료(또는 특수)
    } else if(!startVoteExists && endResult){
      // 시작투표 없는 날(옛 방식) → 완료투표만으로 확정
      const special=['봉사','노피드','투피드'].find(s=>s===endResult);
      finalResult = special || '완료';
    } else if(startResult || endResult){
      finalResult = '참여';                      // 둘 다 있는 날인데 하나만 → 미완료
    } else {
      finalResult = null;
    }
    if(finalResult) await dbSet(`attendance/${gid}/${mondayStr}/${myKey}/${date}`, finalResult);

    // ※ 연차/투피드 경품 차감은 castVote()에서 단일 처리함.
    //   (예전엔 여기서도 차감해 '중복 차감'·오작동이 있었으므로 제거)

    // [풀참 연차 자동지급 OFF] 운영자 의도와 무관한 '출처 불명 연차' 방지.
    //   풀참 보상은 주식으로 별도 지급함. (필요 시 아래 주석 해제)
    // checkFullAttendance(gid, mondayStr, myKey);
  } catch(e) { console.warn('recordAttendance error', e); }
}

async function checkFullAttendance(gid, mondayStr, memberKey) {
  try {
    const att = await dbGet(`attendance/${gid}/${mondayStr}/${memberKey}`);
    if(!att) return;
    const results = Object.values(att);
    // 봉사(열정페이)는 풀참 합산에서 제외
    const validCount = results.filter(r => ['완료','당직','공게','투피드','노피드','프패','확인증'].includes(r)).length;
    if(validCount >= 7) {
      // 연차 지급 (오락실 Firebase)
      const gameMembers = await gameGet('members');
      if(!gameMembers) return;
      // 이름으로 매칭
      const myName = CU?.name || '';
      const match = Object.entries(gameMembers).find(([k,m]) => {
        const clean = (m.name||'').replace(/^\*/,'');
        const realName = clean.replace(/^(좋아요|댓글|시크릿)/,'');
        return realName === myName;
      });
      if(!match) return;
      const [gameKey] = match;
      // 이미 지급됐는지 확인
      const alreadyKey = `fullAttendance/${gid}/${mondayStr}/${memberKey}`;
      const already = await dbGet(alreadyKey);
      if(already) return;
      // 연차 지급
      const cur = await gameGet(`memberLeave/${gameKey}`) || 0;
      await gameSet(`memberLeave/${gameKey}`, cur + 1);
      await dbSet(alreadyKey, true);
      showToast('🎉 풀참 연차 1일이 지급됐습니다!');
    }
  } catch(e) { console.warn('checkFullAttendance error', e); }
}

function fmtDateWd(s){
  if(!s) return '';
  const m=String(s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return String(s);
  const wd=['일','월','화','수','목','금','토'][new Date(+m[1],+m[2]-1,+m[3]).getDay()];
  return `${m[1]}-${m[2]}-${m[3]} ${wd}요일`;
}
const _attResultCycle = ['완료','당직','지각','프패','공게','봉사','노피드','투피드','확인증',''];
const _attResultColor = {'완료':'#5DB88A','당직':'#7C9CDB','지각':'#E8927C','프패':'#FFB347','공게':'#5B9BD5','봉사':'#A78BFA','노피드':'#94a3b8','투피드':'#f59e0b','확인증':'#FF85C1','':'#ddd'};

async function renderAttEditList(gid, mondayStr, dates, filter){
  const listEl = document.getElementById('attEditList');
  if(!listEl) return;
  const [crewMembers, gameMembers] = await Promise.all([
    dbGet('members'),
    gameGet('members')
  ]);
  const attData = await dbGet(`attendance/${gid}/${mondayStr}`) || {};
  const gName = groups[gid]?.name || '';

  // 이 그룹 소속 이름 집합 만들기
  const groupNames = new Set();
  // 1) 오락실 멤버 중 "그룹명+" 접두어를 가진 사람 → 접두어 뗀 이름
  if(gameMembers){
    Object.values(gameMembers).forEach(m=>{
      if(!m.name) return;
      const clean = m.name.replace(/^\*/,'');
      if(gName && clean.startsWith(gName)){
        groupNames.add(clean.slice(gName.length));
      }
    });
  }
  // 2) 이미 이 그룹 출석 기록이 있는 사람도 포함 (안전망)
  Object.keys(attData).forEach(n=>groupNames.add(n));

  // crew 멤버 중 이 그룹에 속한 사람만
  let members = crewMembers ? Object.values(crewMembers).filter(m=>m.name && groupNames.has(m.name)) : [];
  // 그룹 매칭이 하나도 안 되면(데이터 미비) 전체로 폴백하지 않고, 출석기록 가진 사람만이라도 보여줌
  if(members.length===0 && crewMembers){
    members = Object.values(crewMembers).filter(m=>m.name && attData[m.name]);
  }
  if(filter) members = members.filter(m=>m.name.includes(filter));
  members.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const opts = ['','완료','당직','지각','프패','공게','봉사','노피드','투피드','확인증'];
  const searchInput = document.querySelector('#attEditModal input');
  const scrollTop = listEl.scrollTop;
  listEl.innerHTML = members.map(m=>{
    const _merged = window._statusWeeksCache?.[gid]?.[mondayStr]?.members?.[m.name] || {};
    const mData = {..._merged, ...(attData[m.name]||{})};
    return `<div style="margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">${escH(m.name)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${dates.map(d=>{
          const cur = (mData[d]||'').replace('·미완료','');
          const dayLabel=['월','화','수','목','금','토','일'][new Date(d).getDay()===0?6:new Date(d).getDay()-1];
          const col = _attResultColor[cur]||'#ddd';
          return `<div style="text-align:center">
            <div style="font-size:9px;color:var(--text3);margin-bottom:3px">${dayLabel}<br>${d.slice(5)}</div>
            <select onchange="selectAttResult('${gid}','${mondayStr}','${m.name}','${d}',this)"
              style="width:48px;height:32px;border-radius:8px;border:2px solid ${col};background:${col};color:${cur?'white':'#888'};font-size:10px;font-weight:700;text-align:center;text-align-last:center;cursor:pointer;outline:none;padding:0">
              ${opts.map(o=>`<option value="${o}" ${cur===o?'selected':''} style="color:#333;background:white">${o||'-'}</option>`).join('')}

async function selectAttResult(gid, mondayStr, memberName, date, sel){
  const val = sel.value;
  if(val){
    await dbSet(`attendance/${gid}/${mondayStr}/${memberName}/${date}`, val);
    await dbSet(`attendanceManual/${gid}/${mondayStr}/${memberName}/${date}`, true);
  } else {
    // (-) 처리 = 그날 출근 안 함. 그날 그 사람의 시작·완료 투표를 취소해 경품/연차도 복구.
    await _cancelDayVotesFor(gid, date, memberName);
    await dbDelete(`attendance/${gid}/${mondayStr}/${memberName}/${date}`);
    await dbDelete(`attendanceManual/${gid}/${mondayStr}/${memberName}/${date}`);
  }
  const col = _attResultColor[val]||'#ddd';
  sel.style.borderColor = col;
  sel.style.background = col;
  sel.style.color = val?'white':'#888';
  showToast(`${memberName} ${date.slice(5)} → ${val||'삭제'}`);
}

// 특정 날짜·그룹에서 한 멤버의 시작/완료 투표 응답을 모두 취소 (경품/연차 복구 포함)
async function _cancelDayVotesFor(gid, date, memberName){
  try{
    const crew = await dbGet('members')||{};
    // memberName에 해당하는 응답 키 후보: 이름 자체 + members에서 name이 일치하는 key
    const keyCands = [memberName];
    Object.entries(crew).forEach(([k,m])=>{ if(m&&m.name===memberName) keyCands.push(k); });
    const votes = await dbGet('votes')||{};
    for(const [vid,v] of Object.entries(votes)){
      if(!v||v.deleted||v.group!==gid) continue;
      const dd = getTitleDate(v)||v.date;
      if(dd!==date) continue;
      // 이 투표에 이 멤버 응답이 있으면 취소
      const hitKey = keyCands.find(k=>v.responses?.[k]!==undefined);
      if(hitKey) await cancelVoteFor(vid, hitKey, hitKey);
    }
  }catch(e){}
}

async function cycleAttResult(gid, mondayStr, memberName, date, el){
  // 하위호환 유지
  const curEl = el.querySelector('div:last-child');
  const cur = curEl.textContent.trim()==='-' ? '' : curEl.textContent.trim();
  const idx = _attResultCycle.indexOf(cur);
  const next = _attResultCycle[(idx+1) % _attResultCycle.length];
  if(next){
    await dbSet(`attendance/${gid}/${mondayStr}/${memberName}/${date}`, next);
    await dbSet(`attendanceManual/${gid}/${mondayStr}/${memberName}/${date}`, true);
  } else {
    await _cancelDayVotesFor(gid, date, memberName);
    await dbDelete(`attendance/${gid}/${mondayStr}/${memberName}/${date}`);
    await dbDelete(`attendanceManual/${gid}/${mondayStr}/${memberName}/${date}`);
  }
  curEl.style.background = _attResultColor[next]||'#ddd';
  curEl.style.color = next?'white':'#bbb';
  curEl.textContent = next||'-';
  showToast(`${memberName} ${date.slice(5)} → ${next||'삭제'}`);
}

// ── 엑셀 다운로드 ──
async function downloadWeekExcel(gid, mondayStr) {
  showToast('⏳ 엑셀 생성 중...');
  try {
    const [votes, attendance, gameMembers, memberLeave] = await Promise.all([
      dbGet('votes'),
      dbGet(`attendance/${gid}`),
      gameGet('members'),
      gameGet('memberLeave')
    ]);

    const gName = groups[gid]?.name || gid;
    const wLabel = getWeekLabel(mondayStr);
    const att = attendance?.[mondayStr] || {};

    // 해당 주 날짜 목록 (월~일)
    const monday = new Date(mondayStr);
    const dates = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(monday.getDate()+i);
      dates.push(d.toISOString().slice(0,10));
    }

    // 오락실 멤버 목록 (해당 그룹만)
    const ADMIN_NAMES = ['고인물','에이스','경력직','불주먹','김월루','퇴사각','알잘딱'];
    const allMembers = [];
    if(gameMembers) {
      Object.entries(gameMembers).forEach(([k,m]) => {
        if(!m.name) return;
        const clean = m.name.replace(/^\*/,'');
        const group = ['좋아요','댓글','시크릿'].find(g=>clean.startsWith(g));
        if(groups[gid]?.name !== group) return;
        const realName = group ? clean.replace(group,'') : clean;
        allMembers.push({key:k, name:realName, leave:memberLeave?.[k]||0});
      });
    }
    // 인사팀 먼저, 나머지 가나다
    allMembers.sort((a,b)=>{
      const aA=ADMIN_NAMES.includes(a.name), bA=ADMIN_NAMES.includes(b.name);
      if(aA&&!bA)return -1; if(!aA&&bA)return 1;
      if(aA&&bA)return ADMIN_NAMES.indexOf(a.name)-ADMIN_NAMES.indexOf(b.name);
      return a.name.localeCompare(b.name,'ko');
    });

    // 멤버별 결과 (투표 + attendance 이전 데이터)
    const memberResults = {};
    // crew31 members key → name 매핑
    const crewMembers = await dbGet('members')||{};
    const keyToName = {};
    Object.entries(crewMembers).forEach(([k,m])=>{ if(m.name) keyToName[k]=m.name; });

    if(votes) {
      Object.entries(votes).filter(([,v])=>!v.deleted&&v.group===gid&&v.date&&getWeekKey(v.date)===mondayStr)
        .forEach(([,v])=>{
          const opts=v.options||[];
          Object.entries(v.responses||{}).forEach(([mkey,optIdx])=>{
            const mname=keyToName[mkey]||mkey;
            if(!memberResults[mname])memberResults[mname]={};
            const r=mapVoteResult(opts[optIdx]||'');
            if(!memberResults[mname][v.date]||r==='완료') memberResults[mname][v.date]=r;
          });
        });
    }
    Object.entries(att).forEach(([mname,dateMap])=>{
      if(!memberResults[mname])memberResults[mname]={};
      Object.assign(memberResults[mname], dateMap);
    });

    // SheetJS로 xlsx 생성
    const XLSX = await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');

    const RESULT_COLORS = {
      '완료': {bg:'C6EFCE', fg:'006100'},
      '프패': {bg:'FFEB9C', fg:'9C6500'},
      '공게': {bg:'BDD7EE', fg:'1F4E79'},
      '봉사': {bg:'E2EFDA', fg:'375623'},
      '노피드': {bg:'D9D9D9', fg:'595959'},
      '투피드': {bg:'FCE4D6', fg:'C55A11'},
      '누락': {bg:'FF0000', fg:'FFFFFF'},
    };
    const HEADER_COLOR = '1F4E46';

    const wb2 = XLSX.utils.book_new();
    const aoa = []; // array of arrays

    // 행1: 시작일
    aoa.push([null, '시작일']);
    // 행2: 날짜 + 참여수
    const row2 = [null, monday];
    dates.forEach(d => {
      const cnt = allMembers.filter(m => memberResults[m.name]?.[d]).length;
      row2.push(null, cnt); // 빈칸 + 참여수 (구조상 col D부터)
    });
    // 실제로는 col E~K에 참여수
    const row2b = [null, monday, null, null];
    dates.forEach(d => row2b.push(allMembers.filter(m=>memberResults[m.name]?.[d]).length));
    aoa.push(row2b);

    // 행3: 주차
    aoa.push([null, `${wLabel}차`]);
    // 행4: 현황 제목
    aoa.push([null, `${wLabel}차 현황`]);
    // 행5: 헤더
    const h5 = [null, 'NO', 'ID', 'INS ID'];
    dates.forEach(d => { const dd=new Date(d); h5.push(`${dd.getMonth()+1}/${dd.getDate()}`); });
    h5.push('프리패스');
    aoa.push(h5);
    // 행6: 열번호
    const h6 = [null, '1열', '2열', '3열'];
    for(let i=0;i<dates.length;i++) h6.push(`${i+4}열`);
    h6.push(`${dates.length+4}열`);
    aoa.push(h6);

    // 멤버 행
    allMembers.forEach((m, idx) => {
      const row = [null, idx+1, m.name, ''];
      // 봉사(열정페이)는 풀참 합산에서 제외
      const valid = ['완료','당직','공게','투피드','노피드','프패','확인증'];
      let ppCount = 0;
      dates.forEach(d => {
        const r = memberResults[m.name]?.[d] || '';
        row.push(r);
        if(valid.includes(r)) ppCount++;
      });
      row.push(ppCount >= 7 ? 'O' : '');
      aoa.push(row);
    });

    const ws2 = XLSX.utils.aoa_to_sheet(aoa, {dateNF:'YYYY-MM-DD'});

    // 열 너비
    ws2['!cols'] = [
      {wch:2},{wch:5},{wch:14},{wch:16},
      ...dates.map(()=>({wch:8})),
      {wch:8}
    ];

    XLSX.utils.book_append_sheet(wb2, ws2, wLabel);
    XLSX.writeFile(wb2, `${gName}_${wLabel}_현황.xlsx`);
    showToast('✅ 엑셀 다운로드 완료!');
  } catch(e) {
    console.error(e);
    showToast('다운로드 실패: '+e.message);
  }
}

async function searchDeletedVotes(){
  if(CU?.role!=='admin'){ showToast('관리자 전용'); return; }
  const name = document.getElementById('delVoteSearchName').value.trim();
  const resultEl = document.getElementById('delVoteSearchResult');
  if(!name){ showToast('닉네임을 입력하세요'); return; }
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try{
    const allVotes = await dbGet('votes');
    const hits = [];
    if(allVotes){
      Object.entries(allVotes).forEach(([vid,v])=>{
        if(!v || !v.deleted) return;
        const opts = v.options||[];
        const respIdx = v.responses ? v.responses[name] : undefined;
        const hadResp = respIdx !== undefined;
        const inCancelLog = v.cancelLog ? Object.values(v.cancelLog).filter(c=>c.nick===name) : [];
        const inImages = v.images && v.images[name];
        if(!hadResp && inCancelLog.length===0 && !inImages) return;
        const links = [];
        [name, name+'_1', name+'_2'].forEach(k=>{ const L=v.links?.[k]; if(L&&L.url) links.push(L.url); });
        hits.push({
          vid, title:v.title||'(제목없음)', group:groups[v.group]?.name||v.group||'',
          date:v.date||'', currentOpt: hadResp ? (opts[respIdx]||'') : null,
          cancelLog: inCancelLog, links, images: inImages||null
        });
      });
    }
    hits.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    if(hits.length===0){
      resultEl.innerHTML = `<div style="padding:14px;text-align:center;color:var(--text3);font-size:13px">"${escH(name)}" 관련 삭제된 투표 기록이 없습니다</div>`;
      return;
    }
    let h = '';
    hits.forEach(hit=>{
      h += `<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px">`;
      h += `<div style="font-size:13px;font-weight:800">${escH(hit.title)} <span style="font-size:11px;color:var(--text3);font-weight:600">(${escH(hit.group)}${hit.date?' · '+escH(hit.date):''})</span></div>`;
      if(hit.currentOpt) h += `<div style="font-size:12px;margin-top:4px">현재 응답: <b>${escH(hit.currentOpt)}</b></div>`;
      if(hit.links.length>0){
        h += `<div style="font-size:12px;margin-top:4px">현재 링크: ${hit.links.map(u=>`<a href="${escH(u)}" target="_blank" style="color:var(--accent);word-break:break-all">${escH(u)}</a>`).join(', ')}</div>`;
      }
      if(hit.images){
        h += `<div style="font-size:12px;margin-top:4px">업로드 이미지 ${Array.isArray(hit.images)?hit.images.length:1}장 있음</div>`;
      }
      if(hit.cancelLog.length>0){
        h += `<div style="font-size:11px;font-weight:700;color:var(--red);margin-top:6px">⚠️ 취소 이력</div>`;
        hit.cancelLog.sort((a,b)=>(b.at||0)-(a.at||0)).forEach(c=>{
          const dt = c.at ? new Date(c.at).toLocaleString('ko-KR') : '';
          h += `<div style="font-size:11px;color:var(--text2);margin-top:2px;padding-left:6px;border-left:2px solid var(--border)">`;
          h += `취소 전 선택지: <b>${escH(c.opt||'')}</b> · ${escH(dt)}`;
          if(c.links && c.links.length>0){
            h += `<br>취소 전 링크: ${c.links.map(l=>`<a href="${escH(l.url)}" target="_blank" style="color:var(--accent);word-break:break-all">${escH(l.url)}</a>`).join(', ')}`;
          }
          h += `</div>`;
        });
      }
      h += `</div>`;
    });
    resultEl.innerHTML = h;
  }catch(e){
    resultEl.innerHTML = `<div style="padding:10px;color:red;font-size:12px">오류: ${e.message}</div>`;
  }
}


async function setLeaveQuota(groupName, val){
  const n = parseInt(val,10);
  if(val===''||isNaN(n)){ await dbDelete(`leaveQuota/${groupName}`); showToast(`${groupName} 정원 → 기본(3명)`); }
  else { await dbSet(`leaveQuota/${groupName}`, Math.max(0,n)); showToast(`${groupName} 연차 정원 → ${Math.max(0,n)}명`); }
}

function toggleSettingSection(id){
  const el = document.getElementById('settingContent_'+id);
  const arrow = document.getElementById('settingArrow_'+id);
  if(!el) return;
  const open = el.style.display==='none';
  el.style.display = open ? 'block' : 'none';
  if(arrow) arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  localStorage.setItem('settingOpen_'+id, open?'1':'0');
}

async function addGroupMember(gid){
  const inp = document.getElementById(`newGMember_${gid}`);
  const name = inp?.value.trim();
  if(!name){showToast('닉네임을 입력하세요');return;}
  const cur = await dbGet(`groupMembers/${gid}`) || [];
  if(cur.includes(name)){showToast('이미 있는 멤버예요');return;}
  cur.push(name);
  await dbSet(`groupMembers/${gid}`, cur);
  showToast(`✅ ${name} 추가됨`);
  loadSettings();
}

async function removeGroupMember(gid, idx){
  const cur = await dbGet(`groupMembers/${gid}`) || [];
  const name = cur[idx];
  if(!confirm(`${name}을 삭제할까요?`))return;
  cur.splice(idx,1);
  await dbSet(`groupMembers/${gid}`, cur);
  showToast(`🗑️ ${name} 삭제됨`);
  loadSettings();
}

async function addVoteTemplate(){
  const name = document.getElementById('newTplName')?.value.trim();
  const membersRaw = document.getElementById('newTplMembers')?.value.trim();
  if(!name){showToast('템플릿 이름을 입력하세요');return;}
  const members2 = membersRaw ? membersRaw.split(',').map(m=>m.trim()).filter(Boolean) : [];
  await dbPush('voteTemplates',{name,members:members2});
  showToast('✅ 템플릿 추가됨');
  loadSettings();
}

async function deleteVoteTemplate(tid){
  if(!confirm('템플릿을 삭제할까요?'))return;
  await dbDelete(`voteTemplates/${tid}`);
  showToast('🗑️ 템플릿 삭제됨');
  loadSettings();
}

async function editVoteTemplate(tid){
  const t = await dbGet(`voteTemplates/${tid}`);
  if(!t)return;
  const name = prompt('템플릿 이름', t.name||'');
  if(name===null)return;
  const membersRaw = prompt('멤버 (쉼표로 구분)', (t.members||[]).join(', '));
  if(membersRaw===null)return;
  const members2 = membersRaw.split(',').map(m=>m.trim()).filter(Boolean);
  await dbSet(`voteTemplates/${tid}`,{name,members:members2});
  showToast('✅ 템플릿 수정됨');
  loadSettings();
}

async function applyVoteTemplate(sel){
  const tid = sel.value;
  if(!tid)return;
  const t = await dbGet(`voteTemplates/${tid}`);
  if(!t)return;
  document.getElementById('voteTplMembers').value = (t.members||[]).join(', ');
  showToast(`📋 ${t.name} 템플릿 적용됨`);
}

  if(!val) return;
  if(which==='start'){
    await dbSet(`groups/${gid}/startTime`, val);
    await dbSet(`autoVoteSchedule/groups/${gid}/startCloseTime`, val); // 자동생성 시작투표 마감
    groups[gid].startTime = val;
    showToast(`🌅 ${groups[gid].name} 시작투표 마감 → ${val}`);

    await dbSet(`groups/${gid}/endTime`, val);

async function syncGameMembers(){
  const resultEl=document.getElementById('syncResult');
  if(resultEl) resultEl.textContent='동기화 중...';
  try{
    const [gameMembers, crewMembers] = await Promise.all([
      gameGet('members'),
      dbGet('members')
    ]);
    if(!gameMembers){showToast('오락실 연결 실패');return;}

    const GROUPS=['좋아요','댓글','시크릿'];
    const existing=crewMembers||{};

    // 기존 사무실 멤버 닉네임 목록
    const existingNames=new Set(Object.values(existing).map(m=>m.name||''));

    let added=0, skipped=0;
    const toAdd=[];

    Object.values(gameMembers).forEach(m=>{
      if(!m.name)return;
      const clean=m.name.replace(/^\*/,'');
      const group=GROUPS.find(g=>clean.startsWith(g));
      const nick=group?clean.slice(group.length):clean;
      if(!nick)return;
      if(existingNames.has(nick)){skipped++;return;}
      // 중복 체크 (toAdd 안에도)
      if(toAdd.includes(nick)){skipped++;return;}
      toAdd.push(nick);
    });

    // 일괄 추가
    for(const nick of toAdd){
      await dbPush('members',{name:nick,role:'member'});
      added++;
    }

    const msg=`✅ ${added}명 추가됨, ${skipped}명 중복 스킵`;
    showToast(msg);
    if(resultEl) resultEl.textContent=msg;
    if(added>0) loadSettings();
  }catch(e){
    showToast('오류: '+e.message);
    if(resultEl) resultEl.textContent='오류: '+e.message;
  }
}

async function editMemberName(key,current){
  // current 예: "*좋아요알잘딱" 또는 "알잘딱". 그룹 접두사 분리.
  const cleanCur = current.replace(/^\*/,'');
  const hadStar = current.startsWith('*');
  // groups에서 접두사(그룹명) 찾기
  let prefix='', nickOnly=cleanCur;
  try{
    const groups = await dbGet('groups')||{};
    const gnames = Object.values(groups).map(g=>g.name).filter(Boolean).sort((a,b)=>b.length-a.length);
    for(const gn of gnames){ if(cleanCur.startsWith(gn)){ prefix=gn; nickOnly=cleanCur.slice(gn.length); break; } }
  }catch(e){}

  const newNick = prompt(`새 닉네임 입력:\n(현재: ${nickOnly}${prefix?` / 그룹: ${prefix}`:''})`, nickOnly);
  if(!newNick || !newNick.trim()) return;
  const nn = newNick.trim();

  const oldNick = prompt(`과거 기록에 쓰던 "예전 닉네임"을 입력하세요.\n(없으면 비우고 확인 — 현재 닉네임 기준)\n\n예: 닉네임을 먼저 바꿔서 과거 투표·출석이 옛 닉네임으로 남은 경우 그 옛 닉네임 입력.`, '');
  const on = (oldNick && oldNick.trim()) ? oldNick.trim() : nickOnly;

  const star = hadStar ? '*' : '';
  const newFull = `${star}${prefix}${nn}`;

  if(on===nn && current===newFull){ showToast('변경 사항 없음'); return; }
  if(!confirm(`"${on}" → "${nn}" (으)로 이름 바꾸기\n\n모든 기록에서 "${on}"이 들어간 이름을 "${nn}"으로 바꿉니다.\n(별표·그룹 표시는 그대로 유지, 연차·투피드도 유지)`)) return;
  showToast('🔄 데이터 이동 중... 잠시만요');
  try{
    const movedCnt = await migrateMemberName(key, on, nn, newFull);
    showToast(movedCnt>0 ? `✅ 닉네임 변경 + 기록 ${movedCnt}건 이동 완료!` : '⚠️ 옮긴 기록 0건 — 안내창을 확인하세요');
    loadSettings();
  }catch(e){
    showToast('변경 실패: '+(e.message||''));
  }
}

// 멤버 닉네임 변경: 이름에 oldNick이 들어간 모든 키를, oldNick→newNick만 치환한 새 키로 이동.
// 별표·그룹 접두사 등 형태는 그대로 유지됨. memberNewFull = members에 저장할 정식 이름.
async function migrateMemberName(key, oldNick, newNick, memberNewFull){
  // 한글 NFC/NFD(조합형/분해형) 차이를 흡수하기 위해 비교는 항상 NFC로 정규화해서 한다.
  const nrm = (s)=> (typeof s==='string' ? s.normalize('NFC') : s);
  const O  = nrm(oldNick);
  const NK = nrm(newNick);

  // 키 이름(nm)에 oldNick이 들어 있으면 바꿀 새 키를 돌려준다(아니면 null).
  //  - 닉네임 전체가 일치(접두사 없는 일반 멤버): 멤버 정식 이름(memberNewFull)을 그대로 사용
  //    → 다음 로그인 때 CU.name과 100% 일치하므로 읽기가 깨지지 않음
  //  - 접두사/부분 포함(드문 케이스): 정규화 공간에서 oldNick→newNick 치환
  const newKeyFor = (nm)=>{
    if(typeof nm!=='string') return null;
    const N = nrm(nm);
    if(!N.includes(O)) return null;
    if(N===O) return memberNewFull;
    const out = N.split(O).join(NK);
    return out===nm ? null : out;
  };

  // 한 번에 옮기는 대량 읽기: dbGet의 8초 타임아웃·조용한 null 반환을 피하려고 직접 fetch.
  // 실패하면 반드시 throw 해서 '아무것도 안 옮겼는데 성공처럼 보이는' 상황을 차단한다.
  const bigGet = async (path)=>{
    const c = new AbortController();
    const t = setTimeout(()=>c.abort(), 30000);
    let r;
    try{ r = await fetch(`${DB}/${path}.json`, {signal:c.signal}); }
    finally{ clearTimeout(t); }
    if(!r || !r.ok) throw new Error(`'${path}' 데이터를 불러오지 못했습니다(네트워크/용량). 다시 시도해 주세요.`);
    return (await r.json()) || {};
  };

  let moved = 0; // 실제로 옮긴 키 개수

  // 1) members 정식 이름
  await dbSet(`members/${key}/name`, memberNewFull);

  // 2) votes: responses, responseTimes, images, memos, leaveUsed (이름 키) + links (키+nick필드)
  const votes = await bigGet('votes');
  for(const vid in votes){
    const v = votes[vid]; if(!v || typeof v!=='object') continue;
    for(const field of ['responses','responseTimes','images','memos','leaveUsed']){
      const obj = v[field]; if(!obj || typeof obj!=='object') continue;
      for(const nm in obj){
        const nk = newKeyFor(nm);
        if(nk && nk!==nm){
          await dbSet(`votes/${vid}/${field}/${nk}`, obj[nm]);
          await dbDel(`votes/${vid}/${field}/${nm}`);
          moved++;
        }
      }
    }
    if(v.links && typeof v.links==='object'){
      for(const lk in v.links){
        const lkBase = lk.replace(/_[12]$/,'');
        const suffix = (lk.match(/_[12]$/)||[''])[0];
        const link = v.links[lk];
        const newBase = newKeyFor(lkBase);
        let nickChanged=false;
        if(link && typeof link.nick==='string'){
          const nn3 = newKeyFor(link.nick);
          if(nn3 && nn3!==link.nick){ link.nick = nn3; nickChanged=true; }
        }
        if(newBase && `${newBase}${suffix}`!==lk){
          await dbSet(`votes/${vid}/links/${newBase}${suffix}`, link);
          await dbDel(`votes/${vid}/links/${lk}`);
          moved++;
        } else if(nickChanged){
          await dbSet(`votes/${vid}/links/${lk}`, link);
          moved++;
        }
      }
    }
  }

  // 3) 출석(attendance, attendanceManual): gid/monday/이름/날짜
  for(const path of ['attendance','attendanceManual']){
    const root = await bigGet(path);
    for(const gid in root){
      const weeks = root[gid]||{};
      for(const wk in weeks){
        const names = weeks[wk]||{};
        for(const nm in names){
          const nk = newKeyFor(nm);
          if(nk && nk!==nm){
            await dbSet(`${path}/${gid}/${wk}/${nk}`, names[nm]);
            await dbDel(`${path}/${gid}/${wk}/${nm}`);
            moved++;
          }
        }
      }
    }
  }

  // 결과를 반드시 사람이 보게 한다(0건이면 닉네임을 잘못 입력했거나 이미 옮겨진 것).
  try{
    alert(moved>0
      ? `✅ "${oldNick}" → "${newNick}" 데이터 이동 완료\n옮긴 기록: ${moved}건`
      : `⚠️ "${oldNick}" 이름으로 옮길 기록을 찾지 못했습니다(0건).\n\n• "예전 닉네임"을 정확히 입력했는지\n• 이미 한 번 옮겨졌는지\n확인해 주세요.`);
  }catch(e){}
  return moved;
}

// 알림 저장 키 (localStorage)
const NOTI_KEY='crew31Noti';
const NOTI_READ_KEY='crew31NotiRead';
const NOTI_SEEN_KEY='crew31NotiSeen'; // 각 소스별 마지막 확인 시각

// 알림 읽기/쓰기
function getNotiList(){try{return JSON.parse(localStorage.getItem(NOTI_KEY)||'[]');}catch{return [];}}
function saveNotiList(list){localStorage.setItem(NOTI_KEY,JSON.stringify(list.slice(-100)));} // 최근 100개
const NOTI_BASE_KEY='crew31NotiBase'; // 이 기기에서 앱을 처음 켠 시각(이전 데이터는 알림 안 함)
function getNotiBaseTs(){
  try{
    let b=localStorage.getItem(NOTI_BASE_KEY);
    if(!b){ b=String(Date.now()); localStorage.setItem(NOTI_BASE_KEY,b); }
    return Number(b);
  }catch{ return Date.now(); }
}
function getSeenTs(key){try{const v=JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}')[key]; return (v!=null)?v:getNotiBaseTs();}catch{return getNotiBaseTs();}}
function setSeenTs(key,ts){try{const o=JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}');o[key]=ts;localStorage.setItem(NOTI_SEEN_KEY,JSON.stringify(o));}catch{}}
function getLastRead(){return parseInt(localStorage.getItem(NOTI_READ_KEY)||'0');}
function markAllRead(){localStorage.setItem(NOTI_READ_KEY,Date.now().toString());updateNotiBadge();}

// 배지 갱신
function updateNotiBadge(){
  const lastRead=getLastRead();
  const unread=getNotiList().filter(n=>n.ts>lastRead).length;
  const txt=unread>9?'9+':String(unread);
  ['notiBadge','notiBadgeTrig'].forEach(id=>{
    const badge=document.getElementById(id); if(!badge)return;
    if(unread>0){badge.textContent=txt;badge.style.display='inline-flex';}
    else{badge.style.display='none';}
  });
}

// 알림 추가 (내부 함수)
function pushNoti({icon,title,body,tab,ts}){
  const list=getNotiList();
  // 중복 차단: 같은 (ts+title+body) 알림이 이미 있으면 무시 (앱 열 때마다 폭탄 방지)
  const dupKey=`${ts||''}|${title||''}|${body||''}`;
  if(list.some(x=>`${x.ts||''}|${x.title||''}|${x.body||''}`===dupKey)) return;
  const id=`${ts}_${Math.random().toString(36).slice(2,6)}`;
  list.unshift({id,icon,title,body,tab,ts:ts||Date.now()});
  saveNotiList(list);
  updateNotiBadge();
  if(document.hidden&&Notification.permission==='granted'){
    try{new Notification(title,{body,icon:'/favicon.ico',tag:dupKey,silent:false});}catch{}
  }
  if(_currentTab!==tab){
    showBannerNoti(icon,title,body,tab);
  }
}

function showBannerNoti(icon,title,body,tab){
  const existing=document.getElementById('notiBanner');
  if(existing)existing.remove();
  const banner=document.createElement('div');
  banner.id='notiBanner';
  banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#FF85C1;color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(255,133,193,0.4);cursor:pointer;transform:translateY(-100%);transition:transform 0.3s ease;';
  banner.innerHTML=`<span style="font-size:20px">${icon}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(title)}</div><div style="font-size:11px;opacity:0.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(body)}</div></div><span style="font-size:18px;opacity:0.7">✕</span>`;
  banner.onclick=()=>{banner.remove();if(tab)goTab(tab);};
  document.body.appendChild(banner);
  requestAnimationFrame(()=>{banner.style.transform='translateY(0)';});
  setTimeout(()=>{banner.style.transform='translateY(-100%)';setTimeout(()=>banner.remove(),300);},4000);
}

// ── 새 공지 감지 ──
async function pollNotices(){
  if(!CU)return;
  const seenTs=getSeenTs('notice');
  const notices=await dbGetRecent('notices',20);
  if(!notices)return;
  Object.values(notices).forEach(n=>{
    if(!n||!n.createdAt)return;
    if(n.createdAt<=seenTs)return;
    if(n.createdBy===CU.name)return; // 내가 쓴 건 제외
    pushNoti({icon:'📢',title:'새 공지사항',body:n.title||'새 공지가 등록됐습니다',tab:'notice',ts:n.createdAt});
  });
  const maxTs=Math.max(...Object.values(notices).map(n=>n?.createdAt||0));
  if(maxTs>seenTs)setSeenTs('notice',maxTs);
}

  // 부서 채팅
  for(const [gid,g] of Object.entries(groups)){
    await pollChatRoom(`chat_dept_${gid}`,`${g.name} 채팅`,'chat');
  }
  // DM (내 key 포함된 room만)
  await pollDMs();
}

async function pollChatRoom(roomPath,roomName,tab){
  if(!CU)return;
  const seenTs=getSeenTs(roomPath);
  // 마지막 5개 메시지만 확인
  const msgs=await dbGet(roomPath);
  if(!msgs)return;
  const arr=Object.values(msgs).filter(m=>m&&m.time&&m.time>seenTs&&m.senderName!==CU.name);
  arr.forEach(m=>{
    pushNoti({icon:'💬',title:roomName,body:`${m.senderName}: ${(m.body||'').slice(0,40)}`,tab,ts:m.time});
  });
  const maxTs=Math.max(seenTs,...Object.values(msgs).map(m=>m?.time||0));
  if(maxTs>seenTs)setSeenTs(roomPath,maxTs);
}

async function pollDMs(){
  if(!CU||!CU.key)return;
  // 내 key가 포함된 DM 경로 목록 확인
  const allDMs=await dbGet('chat_dm');
  if(!allDMs)return;
  for(const [roomId,msgs] of Object.entries(allDMs)){
    if(!roomId.includes(CU.key))continue;
    if(!msgs)continue;
    const seenTs=getSeenTs('dm_'+roomId);
    const arr=Object.values(msgs).filter(m=>m&&m.time&&m.time>seenTs&&m.senderName!==CU.name);
    arr.forEach(m=>{
      pushNoti({icon:'💬',title:`DM · ${m.senderName}`,body:(m.body||'').slice(0,40),tab:'chat',ts:m.time});
    });
    const maxTs=Math.max(seenTs,...Object.values(msgs).map(m=>m?.time||0));
    if(maxTs>seenTs)setSeenTs('dm_'+roomId,maxTs);
  }
}

// ── 새 투표 감지 ──
async function pollVotes(){
  if(!CU)return;
  const seenTs=getSeenTs('votes');
  const votes=await dbGetRecent('votes',20);
  if(!votes)return;
  let notified={};
  try{ notified=JSON.parse(localStorage.getItem('crew31NotifiedVotes')||'{}'); }catch{}
  Object.entries(votes).forEach(([vid,v])=>{
    if(!v||!v.createdAt||v.deleted)return;
    if(v.createdAt<=seenTs)return;
    if(v.createdBy===CU.name)return;
    if(notified[vid])return;
    notified[vid]=Date.now();
    pushNoti({icon:'📋',title:'새 투표',body:v.title||'새 투표가 등록됐습니다',tab:'home',ts:v.createdAt});
  });
  try{
    const ent=Object.entries(notified).sort((a,b)=>b[1]-a[1]).slice(0,200);
    localStorage.setItem('crew31NotifiedVotes',JSON.stringify(Object.fromEntries(ent)));
  }catch{}
  const maxTs=Math.max(...Object.values(votes).map(v=>v?.createdAt||0));
  if(maxTs>seenTs)setSeenTs('votes',maxTs);
}

// ── 캘린더 일정 감지 ──
async function pollCalEvents(){
  if(!CU)return;
  const seenTs=getSeenTs('calEvents');
  const evts=await dbGet('calEvents');
  if(!evts)return;
  Object.values(evts).forEach(e=>{
    if(!e||!e.createdAt||e.deleted)return;
    if(e.createdAt<=seenTs)return;
    if(e.createdBy===CU.name)return;
    pushNoti({icon:'🗓',title:'새 일정',body:`${e.date} · ${e.title||''}`,tab:'calendar',ts:e.createdAt});
  });
  const maxTs=Math.max(...Object.values(evts).map(e=>e?.createdAt||0));
  if(maxTs>seenTs)setSeenTs('calEvents',maxTs);
}

// ── 경품 지급 감지 (경품 탭이 있는 오락실 → crew31 연동) ──
async function pollPrizes(){
  if(!CU||!CU.key)return;
  const seenTs=getSeenTs('prizes_'+CU.key);
  // 오락실 Firebase에서 내 경품 데이터 확인
  try{
    const GAME_DB='https://gacha-31-default-rtdb.firebaseio.com/members';
    const r=await fetch(`${GAME_DB}.json`);
    const gameMembers=await r.json();
    if(!gameMembers)return;
    // 내 이름으로 멤버 찾기
    const myEntry=Object.entries(gameMembers).find(([k,m])=>(m.name||'').replace(/^\*/,'').includes(CU.name));
    if(!myEntry)return;
    const [mk]=myEntry;
    const pr=await fetch(`https://gacha-31-default-rtdb.firebaseio.com/memberPrizes/${mk}.json`);
    const prizes=await pr.json();
    if(!prizes)return;
    const arr=Array.isArray(prizes)?prizes:Object.values(prizes);
    arr.forEach(p=>{
      if(!p||!p.time)return;
      if(p.time<=seenTs)return;
      pushNoti({icon:p.emoji||'🎁',title:'경품 지급!',body:`${p.emoji||''} ${p.name||'경품'}이 지급됐습니다`,tab:'leave',ts:p.time});
    });
    const maxTs=Math.max(seenTs,...arr.map(p=>p?.time||0));
    if(maxTs>seenTs)setSeenTs('prizes_'+CU.key,maxTs);
  }catch{}
}

// ── 폴링 시작 ──
let _notiPollInterval=null;

  if(_notiPollInterval)clearInterval(_notiPollInterval);
  getNotiBaseTs(); // 이 기기 기준 시각 먼저 확정 (이전 데이터는 알림 안 함)
  await _initSeenIfEmpty(); // seen 초기화가 끝난 뒤에 폴링 (과거 알림 폭탄 방지)

    // 알림은 공지·투표만 (DM·경품·채팅·일정 알림은 사용자 요청으로 끔)
    await Promise.allSettled([
      pollNotices(), pollVotes()
    ]);

  };
  // poll();  ← 앱 열 때 자동 알림 체크도 제거 (자동 알림 완전 중단). 헤더 '새 버전 알리기' 버튼은 별개로 동작.

  // _notiPollInterval=setInterval(poll,120000);
}

async function _initSeenIfEmpty(){
  // 한 번도 seen 설정 안 된 경우 현재 시각으로 초기화 (과거 데이터 알림 방지)
  const seen=JSON.parse(localStorage.getItem(NOTI_SEEN_KEY)||'{}');
  if(Object.keys(seen).length>0)return;
  const now=Date.now();
  const keys=['notice','votes','calEvents'];
  keys.forEach(k=>seen[k]=now);
  // 채팅 roomPath도 초기화
  seen['chat_all']=now;
  Object.keys(groups).forEach(gid=>seen[`chat_dept_${gid}`]=now);
  localStorage.setItem(NOTI_SEEN_KEY,JSON.stringify(seen));
}

}


let _imgViewerItems = [];   // [{url, nick}] (문자열도 허용)
let _imgViewerIdx = 0;
let _touchStartX = 0;

function _galItem(it){ return (it && typeof it==='object') ? it : {url:it, nick:''}; }

function openImgViewerKey(k, idx){
  const arr = (window._imgGalleries && window._imgGalleries[k]) || [];
  openImgViewer(arr, idx);
}
// 시크릿: 그 투표의 전체 갤러리(모든 참여자, 순번대로)에서 해당 닉의 localIdx번째 사진을 연다 → 좌우 슬라이드 시 다음 사람으로 계속 넘어감
async function openSecretViewerByNick(vid, nick, localIdx){
  let gal = window._voteGal && window._voteGal[vid];
  if(!gal || !gal.length){
    // 폴백: 통합 갤러리가 없으면 그 사람 사진만이라도 보여줌
    try{
      const v = await dbGet(`votes/${vid}`);
      const san = nick.replace(/[\.#$\/\[\]\s]/g,'_');
      const imgs = (((v&&v.images)&&(v.images[san]||v.images[nick]))||[]).filter(x=>x&&x.url&&x.url!=='연차').sort((a,b)=>(a.uploadedAt||0)-(b.uploadedAt||0));
      gal = imgs.map(x=>({url:(x.url.includes('/upload/')?x.url.replace('/upload/','/upload/q_auto,f_auto,w_800/'):x.url), nick}));
    }catch(e){ gal=[]; }
    openImgViewer(gal, localIdx||0);
    return;
  }
  // 통합 갤러리에서 이 닉의 localIdx번째 위치를 전체 인덱스로 변환
  let count=-1, gi=0;
  for(let i=0;i<gal.length;i++){ if(gal[i].nick===nick){ count++; if(count===(localIdx||0)){ gi=i; break; } } }
  openImgViewer(gal, gi);
}
function openImgViewer(items, idx){
  _imgViewerItems = (items||[]).map(_galItem);
  _imgViewerIdx = idx||0;
  const el = document.getElementById('imgViewer');
  el.style.display = 'flex';
  _showImgViewer();
  el.addEventListener('touchstart', _imgTouchStart, {passive:true});
  el.addEventListener('touchend', _imgTouchEnd, {passive:true});
}
function _showImgViewer(){
  const it = _imgViewerItems[_imgViewerIdx] || {url:'',nick:''};
  const img = document.getElementById('imgViewerImg');
  img.src = it.url;
  document.getElementById('imgViewerCount').textContent = (_imgViewerIdx+1)+'/'+_imgViewerItems.length;
  const nk = document.getElementById('imgViewerNick');
  if(nk){ nk.textContent = it.nick ? ('🔖 '+it.nick) : ''; nk.style.display = it.nick ? 'block' : 'none'; }
}
function closeImgViewer(){
  document.getElementById('imgViewer').style.display='none';
  document.getElementById('imgViewer').removeEventListener('touchstart',_imgTouchStart);
  document.getElementById('imgViewer').removeEventListener('touchend',_imgTouchEnd);
}
function prevImg(){if(_imgViewerIdx>0){_imgViewerIdx--;_showImgViewer();}}
function nextImg(){if(_imgViewerIdx<_imgViewerItems.length-1){_imgViewerIdx++;_showImgViewer();}}
function _imgTouchStart(e){_touchStartX=e.touches[0].clientX;}
function _imgTouchEnd(e){
  const dx=e.changedTouches[0].clientX-_touchStartX;
  if(Math.abs(dx)>50){dx<0?nextImg():prevImg();}
}

function clearNotiList(){
  if(!confirm('알림을 모두 삭제하시겠습니까?'))return;
  localStorage.removeItem(NOTI_KEY);
  updateNotiBadge();
  loadNotiPage();
}
